<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PhotoHR — Рабочая смена</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg1:#18181b;--bg2:#23232b;--bg3:#2d2d38;--border:#35354a;--text1:#e8e8f0;--text2:#b0b0c8;--text3:#7a7a96;--accent:#7c6aff;--accent2:#9d8cff;--rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg1);color:var(--text1);min-height:100vh;padding-bottom:80px}
.header{position:sticky;top:0;z-index:100;background:var(--bg1);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.header-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600}
.header-right{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn-ghost{background:transparent;border-color:transparent}
.btn-danger{background:var(--rank3);border-color:var(--rank3);color:#fff}
.btn-sm{padding:6px 10px;font-size:11px}
.section{padding:16px;border-bottom:1px solid var(--border)}
.section-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;margin-bottom:10px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg2);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.stat-value{font-size:16px;font-weight:700}
.stat-label{font-size:10px;color:var(--text3);margin-top:2px}
.sale-card{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
.sale-card:active{border-color:var(--accent)}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text3);margin-bottom:4px;display:block}
.fin{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text1);font-size:14px;font-family:inherit}
.fin:focus{outline:none;border-color:var(--accent)}
.fselect{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text1);font-size:14px;font-family:inherit;appearance:none}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:8px;margin-bottom:6px}
.cart-item-name{flex:1;font-size:13px}
.cart-qty{width:50px;text-align:center;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:14px}
.qr-display{text-align:center;padding:20px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--bg1);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px 16px 30px}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;background:var(--bg3);color:var(--text1);font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{border:1px solid var(--rank3)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state-icon{font-size:40px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.badge-paid{background:rgba(62,207,142,.15);color:var(--rank1)}
.badge-pending{background:rgba(245,166,35,.15);color:var(--rank2)}
.badge-presale{background:rgba(124,108,255,.15);color:var(--accent2)}
.shift-tabs{display:flex;gap:4px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.shift-tabs button{flex:0 0 auto;padding:8px 10px;font-size:11px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:inherit;cursor:pointer;white-space:nowrap}
.shift-tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-title">📸 Рабочая смена</div>
  <div class="header-right">
    <a href="my.html" class="btn btn-ghost btn-sm">Мой профиль</a>
  </div>
</div>

<div class="shift-tabs" id="shift-tabs" style="display:none">
  <button type="button" class="active" data-shift-tab="sales" onclick="switchShiftTab('sales')">📸 Продажи</button>
  <button type="button" data-shift-tab="zones" onclick="switchShiftTab('zones')">🗺 Зоны</button>
  <button type="button" data-shift-tab="chat" onclick="switchShiftTab('chat')">💬 Чат</button>
  <button type="button" data-shift-tab="actions" onclick="switchShiftTab('actions')">⚡ Действия</button>
  <button type="button" data-shift-tab="contest" onclick="switchShiftTab('contest')">📷 Конкурс</button>
</div>

<div id="shift-info" class="section">
  <div class="loading" style="color:var(--text3);font-size:13px">Загрузка смены...</div>
</div>

<div id="tab-zones" class="section" style="display:none">
  <div class="section-title">🗺 Расстановка по зонам</div>
  <div id="zone-timeline"></div>
</div>

<div id="tab-chat" class="section" style="display:none">
  <div class="section-title">💬 Чат смены</div>
  <div id="chat-messages" style="max-height:400px;overflow-y:auto;margin-bottom:10px;font-size:13px"></div>
  <div id="chat-pinned" style="display:none;padding:8px;background:rgba(255,200,0,.1);border-radius:8px;margin-bottom:8px;font-size:12px"></div>
  <div style="display:flex;gap:6px">
    <input class="fin" id="chat-input" placeholder="Сообщение..." style="flex:1" onkeydown="if(event.key==='Enter')sendChatMsg()">
    <button type="button" class="btn btn-primary" onclick="sendChatMsg()" style="font-size:12px">➤</button>
  </div>
</div>

<div id="tab-actions" class="section" style="display:none">
  <div class="section-title">⚡ Быстрые действия</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    <button type="button" class="btn btn-ghost" onclick="requestAction('break_request')">☕ Перерыв</button>
    <button type="button" class="btn btn-ghost" onclick="requestAction('help_request')">🆘 Помощь</button>
    <button type="button" class="btn btn-ghost" onclick="requestAction('replace_request')">🔄 Замена</button>
  </div>
  <div id="actions-list"></div>
</div>

<div id="tab-contest" class="section" style="display:none">
  <div class="section-title">📷 Фотоконкурс смены</div>
  <div id="contest-budget" style="font-size:12px;color:var(--text2);margin-bottom:10px">
    Осталось лайков: <strong id="budget-count">9</strong> из <strong id="budget-total">9</strong> (за сегодня по всем площадкам)
  </div>
  <div id="contest-form" style="margin-bottom:10px">
    <div style="margin-bottom:10px">
      <label style="display:inline-block;padding:10px 20px;background:var(--accent);color:#fff;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600">
        📷 Выбрать фото
        <input type="file" id="contest-file" accept="image/*" capture="environment" style="display:none" onchange="previewContestPhoto(this)">
      </label>
      <span id="contest-file-name" style="font-size:12px;color:var(--text2);margin-left:8px"></span>
    </div>
    <div id="contest-preview" style="display:none;margin-bottom:10px">
      <img id="contest-preview-img" alt="" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:cover">
    </div>
    <input class="fin" id="contest-caption" placeholder="Подпись (необязательно)" style="width:100%;margin-bottom:6px">
    <button type="button" class="btn btn-primary" onclick="submitContestPhoto()" style="font-size:12px">📷 Подать на конкурс</button>
  </div>
  <div id="contest-entries"></div>
</div>

<div id="sales-section" class="section" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="section-title" style="margin-bottom:0">🛒 Продажи сегодня</div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="openDeliverScanner()" style="font-size:11px">📦 Выдача</button>
      <button class="btn btn-primary btn-sm" onclick="openNewSale()">+ Продажа</button>
    </div>
  </div>
  <div id="sales-stats" class="stat-row"></div>
  <div id="sales-list"></div>
</div>

<div id="sale-modal" class="modal-bg" onclick="if(event.target===this)closeSaleModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="sale-modal-content"></div>
  </div>
</div>

<div id="qr-modal" class="modal-bg" onclick="if(event.target===this)closeQrModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="qr-modal-content"></div>
  </div>
</div>

<div id="deliver-modal" class="modal-bg" onclick="if(event.target===this)closeDeliverScanner()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="deliver-modal-content"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3001/api' : 'https://fotohr-server-production.up.railway.app/api';
const FRONTEND_URL = window.location.hostname === 'localhost' ? window.location.origin : 'https://likemestudio.github.io/photohr-frontend';
let accessToken = localStorage.getItem('fhr_access');
let refreshToken = localStorage.getItem('fhr_refresh');
let refreshLock = null;
let currentUser = null;
let currentShift = null;
let venueProducts = [];
let todaySales = [];
let currentEvent = null;
let shiftTab = 'sales';
let chatPollTimer = null;
let lastMsgTime = null;
let chatInitialized = false;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (accessToken) opts.headers['Authorization'] = `Bearer ${accessToken}`;
  if (body) opts.body = JSON.stringify(body);
  let res = await fetch(API + path, opts);
  if (res.status === 401) {
    if (!refreshLock) {
      refreshLock = (async () => {
        const rr = await fetch(API + '/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken }) });
        if (!rr.ok) throw new Error('refresh_failed');
        const data = await rr.json();
        accessToken = data.accessToken; refreshToken = data.refreshToken;
        localStorage.setItem('fhr_access', accessToken); localStorage.setItem('fhr_refresh', refreshToken);
      })();
    }
    try { await refreshLock; opts.headers['Authorization'] = `Bearer ${accessToken}`; res = await fetch(API + path, opts); }
    catch { doLogout(); return null; }
    finally { refreshLock = null; }
  }
  if (!res.ok) { const err = await res.json().catch(() => ({ error: 'Ошибка' })); throw new Error(err.error || 'Ошибка'); }
  return res.json();
}
function doLogout() { localStorage.removeItem('fhr_access'); localStorage.removeItem('fhr_refresh'); location.href = 'index.html'; }

function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fullUrl(path) {
  if (path == null || path === '') return '';
  const p = String(path).trim();
  if (/^https?:\/\//i.test(p)) return p;
  const base = API.replace(/\/api\/?$/, '');
  return base + (p.startsWith('/') ? p : '/' + p);
}
function toast(msg, err) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show' + (err ? ' error' : ''); setTimeout(() => t.className = 'toast', 3000); }

(async () => {
  if (!accessToken && !refreshToken) { location.href = 'index.html'; return; }
  try {
    currentUser = await api('GET', '/auth/me');
    if (!currentUser.photographer_id) {
      document.getElementById('shift-info').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🚫</div><div>Нет привязанного профиля фотографа</div></div>';
      return;
    }
    await loadShift();
  } catch { doLogout(); }
})();

async function loadShift() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const upcoming = await api('GET', '/my/upcoming-shifts?limit=30');
    const okStatus = (st) => st && !['cancelled', 'declined'].includes(st);
    const forDay = (upcoming || []).filter(s => {
      const d = (s.event_date || '').split('T')[0];
      return d === today && okStatus(s.status);
    });
    const todayShift = forDay.find(s => s.role_in_shift === 'photographer') || forDay[0];

    if (!todayShift || !todayShift.venue_id) {
      document.getElementById('shift-info').innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📅</div>
        <div style="font-size:14px;margin-bottom:8px">Нет смены на сегодня</div>
        <div style="font-size:12px;color:var(--text3)">Ваши предстоящие смены — в <a href="my.html" style="color:var(--accent)">личном кабинете</a></div>
      </div>`;
      return;
    }

    currentShift = todayShift;
    currentEvent = todayShift.event_id ? { id: todayShift.event_id } : null;

    const venueId = todayShift.venue_id;
    let productsFromScheme = [];
    try {
      const schemeData = await api('GET', `/venues/${venueId}/active-scheme?date=${today}`);
      if (schemeData.products && schemeData.products.length) productsFromScheme = schemeData.products;
    } catch (_) { /* fallback ниже */ }
    if (productsFromScheme.length) {
      venueProducts = productsFromScheme;
    } else {
      venueProducts = await api('GET', `/venues/${venueId}/products`).catch(() => []);
    }

    const phCard = await api('GET', `/photographers/${currentUser.photographer_id}`).catch(() => ({}));
    currentUser._cameraPrefix = phCard.camera_prefix || 'DSC_';

    renderShiftInfo(todayShift);
    document.getElementById('sales-section').style.display = '';
    const tabs = document.getElementById('shift-tabs');
    if (tabs) tabs.style.display = currentEvent?.id ? 'flex' : 'none';
    await loadTodaySales();
    if (currentEvent?.id) switchShiftTab(shiftTab, true);
  } catch (e) {
    document.getElementById('shift-info').innerHTML = `<div class="empty-state" style="color:var(--rank3)">${esc(e.message)}</div>`;
  }
}

function renderShiftInfo(shift) {
  const time = [shift.start_time, shift.end_time].filter(Boolean).map(t => String(t).slice(0, 5)).join(' – ');
  const ROLE_SHORT = { photographer: 'фото', print_operator: 'опер', manager: 'мен', mentor: 'наст', helper: 'пом' };
  const name = shift.shift_name || shift.event_name || '';
  const st = shift.status || '';
  let badgeCls = 'badge-pending';
  let badgeText = '⏳';
  if (st === 'checked_in' || st === 'confirmed') {
    badgeCls = 'badge-paid';
    badgeText = st === 'checked_in' ? '✓ Чекин' : '✓ Подтв.';
  } else if (st === 'pending_qr_join') {
    badgeText = '⏳ QR';
  } else if (st === 'pending_confirmation') {
    badgeText = '⏳ Подтв.';
  }

  document.getElementById('shift-info').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
      <div>
        <div style="font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600">${esc(shift.venue_name || shift.venue_short || '—')}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'long' }))}${time ? ' · ' + esc(time) : ''}</div>
      </div>
      <span class="badge ${badgeCls}">${esc(badgeText)}</span>
    </div>
    <div style="font-size:12px;color:var(--text2)">
      Роль: <b>${esc(ROLE_SHORT[shift.role_in_shift] || shift.role_in_shift)}</b>
      ${name ? ' · ' + esc(name) : ''}
    </div>
  `;
}

async function loadTodaySales() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const data = await api('GET', `/photo-sales?date=${encodeURIComponent(today)}&venue_id=${encodeURIComponent(currentShift.venue_id)}`);
    todaySales = data.sales || [];
    renderSalesStats();
    renderSalesList();
  } catch (e) {
    console.warn('loadTodaySales:', e.message);
    todaySales = [];
    renderSalesList();
  }
}

function renderSalesStats() {
  const total = todaySales.length;
  const revenue = todaySales.reduce((s, sale) => s + (parseFloat(sale.total_amount) || 0), 0);
  const paid = todaySales.filter(s => s.payment_status === 'paid').length;
  const delivered = todaySales.filter(s => s.is_delivered).length;

  document.getElementById('sales-stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Продаж</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--rank1)">${revenue.toLocaleString('ru-RU')}₽</div><div class="stat-label">Выручка</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent2)">${paid}/${total}</div><div class="stat-label">Оплачено</div></div>
    <div class="stat-card"><div class="stat-value">${delivered}/${total}</div><div class="stat-label">Выдано</div></div>
  `;
}

function renderSalesList() {
  const el = document.getElementById('sales-list');
  if (!todaySales.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📷</div><div style="font-size:13px">Пока нет продаж. Нажмите «+ Новая продажа»</div></div>`;
    return;
  }

  const STATUS_BADGE = { paid: '<span class="badge badge-paid">Оплачено</span>', pending: '<span class="badge badge-pending">Не оплачено</span>', partially_paid: '<span class="badge badge-pending">Частично</span>' };
  const TYPE_BADGE = { pre_sale: '<span class="badge badge-presale">Пред-продажа</span>' };

  el.innerHTML = todaySales.map(s => {
    const amt = parseFloat(s.total_amount) || 0;
    const time = new Date(s.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    return `<div class="sale-card" onclick="openSaleDetail('${s.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-weight:600;font-size:14px">${amt > 0 ? amt.toLocaleString('ru-RU') + '₽' : '—'}</span>
        <div style="display:flex;gap:4px">${TYPE_BADGE[s.sale_type] || ''}${STATUS_BADGE[s.payment_status] || ''}</div>
      </div>
      <div style="font-size:11px;color:var(--text3)">${time} · ${s.series_count || 0} серий · ${s.items_count || 0} товаров${s.guest_name ? ' · ' + esc(s.guest_name) : ''}${s.is_delivered ? ' · ✓ выдано' : ''}</div>
    </div>`;
  }).join('');
}

let newSaleState = { series: [], items: [], saleType: 'sale', paymentMethod: 'cash', guest: {} };
let detailSaleForQr = null;
let detailSaleIdForSeries = null;

function openNewSale() {
  newSaleState = {
    series: [{ camera_prefix: currentUser._cameraPrefix || 'DSC_', frame_start: '', frame_end: '' }],
    items: [],
    saleType: 'sale',
    paymentMethod: 'cash',
    guest: {},
  };
  renderSaleForm();
  document.getElementById('sale-modal').classList.add('open');
}
function closeSaleModal() { document.getElementById('sale-modal').classList.remove('open'); }

function renderSaleForm() {
  const s = newSaleState;
  let html = `<div class="section-title">📸 Новая продажа</div>`;

  html += `<div class="form-group"><label class="form-label">Тип</label>
    <div style="display:flex;gap:8px">
      <button type="button" class="btn btn-sm ${s.saleType === 'sale' ? 'btn-primary' : ''}" onclick="newSaleState.saleType='sale';renderSaleForm()">💰 Продажа</button>
      <button type="button" class="btn btn-sm ${s.saleType === 'pre_sale' ? 'btn-primary' : ''}" onclick="newSaleState.saleType='pre_sale';renderSaleForm()">👀 Пред-продажа</button>
    </div></div>`;

  html += `<div class="form-group"><label class="form-label">📷 Серии кадров</label>`;
  s.series.forEach((ser, si) => {
    html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <input class="fin" style="width:70px;font-size:12px;padding:8px" placeholder="DSC_" value="${esc(ser.camera_prefix)}" oninput="newSaleState.series[${si}].camera_prefix=this.value">
      <input class="fin" style="flex:1;font-size:14px;padding:8px" type="number" placeholder="Начало" value="${esc(ser.frame_start)}" oninput="newSaleState.series[${si}].frame_start=this.value" inputmode="numeric">
      <span style="color:var(--text3)">—</span>
      <input class="fin" style="flex:1;font-size:14px;padding:8px" type="number" placeholder="Конец" value="${esc(ser.frame_end)}" oninput="newSaleState.series[${si}].frame_end=this.value" inputmode="numeric">
      ${s.series.length > 1 ? `<button type="button" class="btn btn-ghost btn-sm" onclick="newSaleState.series.splice(${si},1);renderSaleForm()" style="color:var(--rank3);padding:4px">✕</button>` : ''}
    </div>`;
  });
  html += `<button type="button" class="btn btn-ghost btn-sm" onclick="newSaleState.series.push({camera_prefix:currentUser._cameraPrefix||'DSC_',frame_start:'',frame_end:''});renderSaleForm()">+ Ещё серия</button></div>`;

  html += `<div class="form-group"><label class="form-label">🛍 Товары</label>`;
  if (!s.items.length) {
    html += `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">Добавьте товары из списка ниже</div>`;
  }
  s.items.forEach((item, ii) => {
    html += `<div class="cart-item" style="flex-wrap:wrap">
      <div class="cart-item-name">${esc(item.name)}<br><span style="font-size:11px;color:var(--text3)">${Number(item.unit_price).toLocaleString('ru-RU')}₽</span></div>
      <button type="button" class="btn btn-ghost btn-sm" onclick="changeCartQty(${ii},-1)" style="padding:4px 8px">−</button>
      <input class="cart-qty" type="number" value="${item.quantity}" min="1" oninput="newSaleState.items[${ii}].quantity=Math.max(1,parseInt(this.value,10)||1);renderSaleForm()" inputmode="numeric">
      <button type="button" class="btn btn-ghost btn-sm" onclick="changeCartQty(${ii},1)" style="padding:4px 8px">+</button>
      <button type="button" class="btn btn-ghost btn-sm" onclick="newSaleState.items.splice(${ii},1);renderSaleForm()" style="color:var(--rank3);padding:4px">✕</button>
      <div style="width:100%;margin-top:4px">
        <input class="fin" style="font-size:12px;padding:6px 8px" placeholder="Кадры: 103, 105, 107" value="${esc(item.frames || '')}" oninput="newSaleState.items[${ii}].frames=this.value" inputmode="numeric">
      </div>
    </div>`;
  });

  const usedIds = new Set(s.items.map(it => it.product_id));
  const available = venueProducts.filter(vp => !usedIds.has(vp.product_id));
  if (available.length) {
    html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">`;
    available.forEach(vp => {
      const pid = String(vp.product_id || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      const prc = parseFloat(vp.price) || 0;
      html += `<button type="button" class="btn btn-ghost btn-sm" onclick="addToCartByProductId('${pid}')" style="font-size:11px">+ ${esc(vp.name || '')} ${Number(vp.price).toLocaleString('ru-RU')}₽</button>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  const totalAmount = s.items.reduce((sum, it) => sum + (parseFloat(it.unit_price) || 0) * (parseInt(it.quantity, 10) || 1), 0);
  html += `<div style="font-size:16px;font-weight:700;text-align:right;margin-bottom:14px;color:var(--rank1)">Итого: ${totalAmount.toLocaleString('ru-RU')}₽</div>`;

  if (s.saleType === 'sale') {
    html += `<div class="form-group"><label class="form-label">💳 Способ оплаты</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button type="button" class="btn btn-sm ${s.paymentMethod === 'cash' ? 'btn-primary' : ''}" onclick="newSaleState.paymentMethod='cash';renderSaleForm()">💵 Наличные</button>
        <button type="button" class="btn btn-sm ${s.paymentMethod === 'acquiring' ? 'btn-primary' : ''}" onclick="newSaleState.paymentMethod='acquiring';renderSaleForm()">💳 Эквайринг</button>
        <button type="button" class="btn btn-sm ${s.paymentMethod === 'mixed' ? 'btn-primary' : ''}" onclick="newSaleState.paymentMethod='mixed';renderSaleForm()">🔀 Смешанная</button>
      </div></div>`;
  }

  html += `<div class="form-group"><label class="form-label">👤 Контакты гостя (необязательно)</label>
    <div style="display:grid;gap:6px">
      <input class="fin" placeholder="Имя" value="${esc(s.guest.name || '')}" oninput="newSaleState.guest.name=this.value" style="font-size:13px;padding:8px">
      <input class="fin" placeholder="Email" type="email" value="${esc(s.guest.email || '')}" oninput="newSaleState.guest.email=this.value" style="font-size:13px;padding:8px">
      <input class="fin" placeholder="Телефон" type="tel" value="${esc(s.guest.phone || '')}" oninput="newSaleState.guest.phone=this.value" style="font-size:13px;padding:8px">
    </div></div>`;

  html += `<div style="display:flex;gap:8px;margin-top:16px">
    <button type="button" class="btn btn-ghost" onclick="closeSaleModal()" style="flex:1">Отмена</button>
    <button type="button" class="btn btn-primary" onclick="submitSale()" style="flex:2">${s.saleType === 'sale' ? '✅ Провести продажу' : '👁 Создать пред-продажу'}</button>
  </div>`;

  document.getElementById('sale-modal-content').innerHTML = html;
}

function addToCartByProductId(productId) {
  const vp = venueProducts.find((p) => String(p.product_id) === String(productId));
  if (!vp) { toast('Товар не найден', true); return; }
  addToCart(vp.product_id, vp.name || 'Товар', parseFloat(vp.price) || 0);
}

function addToCart(productId, name, price) {
  const existing = newSaleState.items.find((i) => String(i.product_id) === String(productId));
  if (existing) {
    existing.quantity = (parseInt(existing.quantity, 10) || 1) + 1;
  } else {
    newSaleState.items.push({ product_id: productId, name, unit_price: price, quantity: 1, frames: '' });
  }
  renderSaleForm();
}

function changeCartQty(index, delta) {
  const item = newSaleState.items[index];
  if (!item) return;
  item.quantity = Math.max(1, (item.quantity || 1) + delta);
  renderSaleForm();
}

async function submitSale() {
  const s = newSaleState;

  const validSeries = s.series.filter(ser => ser.frame_start && ser.frame_end);
  if (!validSeries.length) { toast('Укажите хотя бы одну серию кадров', true); return; }
  for (const ser of validSeries) {
    if (parseInt(ser.frame_end, 10) < parseInt(ser.frame_start, 10)) { toast('Конец серии не может быть меньше начала', true); return; }
  }
  if (s.saleType === 'sale' && !s.items.length) { toast('Добавьте хотя бы один товар', true); return; }

  const totalAmount = s.items.reduce((sum, it) => sum + (parseFloat(it.unit_price) || 0) * (parseInt(it.quantity, 10) || 1), 0);

  const multi = validSeries.length > 1;
  const itemPayload = s.items.map((it) => {
    const obj = { product_id: it.product_id, quantity: parseInt(it.quantity, 10) || 1, unit_price: parseFloat(it.unit_price) || 0 };
    if (it.frames && it.frames.trim()) {
      obj.frame_numbers = it.frames.split(/[,;\s]+/).map(n => parseInt(n.trim(), 10)).filter(n => !isNaN(n) && n > 0);
    }
    return obj;
  });
  const itemsForApi = multi
    ? validSeries.flatMap((_, si) => itemPayload.map((it) => ({ ...it, series_index: si })))
    : itemPayload;

  const body = {
    venue_id: currentShift.venue_id,
    event_id: currentShift.event_id || null,
    shift_id: currentShift.shift_id || null,
    sale_type: s.saleType,
    series: validSeries.map((ser) => ({ camera_prefix: ser.camera_prefix || 'DSC_', frame_start: parseInt(ser.frame_start, 10), frame_end: parseInt(ser.frame_end, 10) })),
    items: itemsForApi,
    guest: (s.guest.name || s.guest.email || s.guest.phone) ? s.guest : null,
    payment_method: s.saleType === 'sale' ? s.paymentMethod : null,
    paid_amount: s.saleType === 'sale' ? totalAmount : 0,
  };

  try {
    const result = await api('POST', '/photo-sales', body);
    closeSaleModal();
    toast('✅ Продажа создана');
    showQrCode(result);
    await loadTodaySales();
  } catch (e) {
    toast(e.message, true);
  }
}

function showQrCode(sale) {
  const qrUrl = sale.qr_url || `${FRONTEND_URL}/guest.html?t=${sale.qr_token}`;
  const amt = parseFloat(sale.total_amount) || 0;

  document.getElementById('qr-modal-content').innerHTML = `
    <div class="qr-display">
      <div style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;margin-bottom:12px">${sale.sale_type === 'pre_sale' ? '👁 Пред-продажа' : '✅ Продажа оформлена'}</div>
      <div id="qr-canvas-wrap" style="display:inline-block;border-radius:8px;overflow:hidden;background:#fff;padding:8px"></div>
      <div style="margin-top:12px;font-size:20px;font-weight:700;color:var(--rank1)">${amt > 0 ? amt.toLocaleString('ru-RU') + '₽' : ''}</div>
      <div style="margin-top:8px;font-size:12px;color:var(--text3)">Покажите QR-код гостю или оператору печати</div>
      <div style="margin-top:12px;font-size:10px;color:var(--text3);word-break:break-all">${esc(qrUrl)}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button type="button" class="btn btn-ghost" onclick="closeQrModal()" style="flex:1">Закрыть</button>
    </div>
  `;
  const wrap = document.getElementById('qr-canvas-wrap');
  if (wrap && typeof QRCode !== 'undefined') {
    new QRCode(wrap, { text: qrUrl, width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  } else if (wrap) {
    wrap.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}" alt="QR" style="width:200px;height:200px">`;

}
function closeQrModal() { document.getElementById('qr-modal').classList.remove('open'); }

async function addSeriesToSale(saleId) {
  if (!saleId) return;
  const prefix = prompt('Префикс камеры (DSC_, IMG_):', currentUser._cameraPrefix || 'DSC_');
  if (prefix === null) return;
  const start = prompt('Начало серии (номер кадра):');
  if (start === null || start === '') return;
  const end = prompt('Конец серии (номер кадра):');
  if (end === null || end === '') return;

  try {
    await api('POST', `/photo-sales/${saleId}/add-series`, {
      camera_prefix: prefix,
      frame_start: parseInt(start, 10),
      frame_end: parseInt(end, 10),
    });
    toast('✅ Серия добавлена');
    closeSaleModal();
    await loadTodaySales();
  } catch (e) {
    toast(e.message, true);
  }
}

let deliverScanToken = '';

function openDeliverScanner() {
  deliverScanToken = '';
  document.getElementById('deliver-modal-content').innerHTML = `
    <div style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;margin-bottom:14px">📦 Выдача фотографий</div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:4px">QR-токен или ссылка гостя</label>
      <div style="display:flex;gap:8px">
        <input id="deliver-scan-input" class="fin" placeholder="Вставьте ссылку или токен" style="flex:1;font-size:13px;padding:8px">
        <button type="button" class="btn btn-primary" onclick="lookupDeliverScan()" style="width:auto;padding:8px 14px">🔍</button>
      </div>
    </div>
    <div id="deliver-scan-result"></div>
  `;
  document.getElementById('deliver-modal').classList.add('open');
  setTimeout(() => document.getElementById('deliver-scan-input')?.focus(), 200);
}

function closeDeliverScanner() { document.getElementById('deliver-modal').classList.remove('open'); }

async function lookupDeliverScan() {
  let token = (document.getElementById('deliver-scan-input')?.value || '').trim();
  if (!token) { toast('Введите токен или ссылку', true); return; }
  if (/guest\.html|[?&]t=/.test(token)) {
    try {
      const u = token.startsWith('http') ? new URL(token) : new URL('https://x.invalid/' + token);
      const t = u.searchParams.get('t');
      if (t) token = t;
    } catch (_) {
      const m = token.match(/[?&]t=([^&]+)/);
      if (m) token = decodeURIComponent(m[1]);
    }
  }

  const el = document.getElementById('deliver-scan-result');
  el.innerHTML = '<div style="color:var(--text3);padding:10px;font-size:12px">Поиск...</div>';

  try {
    const data = await api('GET', `/photo-sales/by-token/${encodeURIComponent(token)}`);
    deliverScanToken = token;
    renderDeliverScanCard(data);
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rank3);padding:10px;font-size:13px">${esc(e.message)}</div>`;
  }
}

function renderDeliverScanCard(data) {
  const amt = parseFloat(data.total_amount) || 0;
  const paid = parseFloat(data.paid_amount) || 0;
  const isPaid = data.payment_status === 'paid';
  const isDelivered = data.is_delivered;

  let html = `<div style="background:var(--bg2);border-radius:10px;padding:12px;border-left:3px solid ${isDelivered ? 'var(--rank1)' : isPaid ? 'var(--accent)' : 'var(--rank2)'}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-weight:600;font-size:13px">📍 ${esc(data.venue_name)}</span>
      ${isDelivered ? '<span style="color:var(--rank1);font-size:11px">✅ Выдано</span>' : isPaid ? '<span style="color:var(--rank1);font-size:11px">💰 Оплачено</span>' : `<span style="color:var(--rank2);font-size:11px">⚠️ К оплате: ${(amt - paid).toLocaleString('ru-RU')}₽</span>`}
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">
      📸 ${esc(data.photographer_name)} · ${new Date(data.created_at).toLocaleDateString('ru-RU')}
      ${data.guest_name ? ' · 👤 ' + esc(data.guest_name) : ''}
    </div>`;

  if (data.items && data.items.length) {
    html += `<div style="margin-bottom:6px">`;
    for (const item of data.items) {
      const frames = item.frame_numbers && item.frame_numbers.length ? item.frame_numbers.join(', ') : '';
      html += `<div style="font-size:12px;padding:2px 0">
        <div style="display:flex;justify-content:space-between">
          <span>${esc(item.product_name)} × ${item.quantity}</span>
          <span>${Number(item.total || 0).toLocaleString('ru-RU')}₽</span>
        </div>
        ${frames ? `<div style="font-size:10px;color:var(--text3)">📷 кадры: ${esc(frames)}</div>` : ''}
      </div>`;
    }
    html += `</div>`;
  }

  if (data.series && data.series.length) {
    html += `<div style="font-size:10px;color:var(--text3);margin-bottom:6px">📷 ${data.series.map(s => esc(s.camera_prefix) + s.frame_start + '–' + s.frame_end).join(', ')}</div>`;
  }

  html += `<div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--rank1)">Итого: ${amt.toLocaleString('ru-RU')}₽</div>`;

  if (!isDelivered) {
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap">
      ${!isPaid ? `<button type="button" class="btn btn-sm" onclick="deliverScanPayAndDeliver()" style="background:var(--rank2);border-color:var(--rank2);color:#fff;flex:1;min-width:100px">💰 Оплата + Выдача</button>` : ''}
      <button type="button" class="btn btn-primary btn-sm" onclick="deliverScanMarkDelivered()" style="flex:1;min-width:100px">📦 Выдать фото</button>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('deliver-scan-result').innerHTML = html;
}

async function deliverScanMarkDelivered() {
  if (!deliverScanToken) { toast('Сначала найдите заказ', true); return; }
  try {
    await api('POST', `/photo-sales/by-token/${encodeURIComponent(deliverScanToken)}/deliver`);
    toast('✅ Фото выданы');
    closeDeliverScanner();
    await loadTodaySales();
  } catch (e) { toast(e.message, true); }
}

async function deliverScanPayAndDeliver() {
  if (!deliverScanToken) { toast('Сначала найдите заказ', true); return; }
  try {
    const data = await api('GET', `/photo-sales/by-token/${encodeURIComponent(deliverScanToken)}`);
    if (data.id) {
      await api('PATCH', `/photo-sales/${data.id}/pay`, { payment_method: 'cash', paid_amount: parseFloat(data.total_amount) || 0 });
    }
    await api('POST', `/photo-sales/by-token/${encodeURIComponent(deliverScanToken)}/deliver`);
    toast('✅ Оплачено и выдано');
    closeDeliverScanner();
    await loadTodaySales();
  } catch (e) { toast(e.message, true); }
}

async function deliverSale(saleId) {
  if (!confirm('Подтвердите выдачу фотографий гостю')) return;
  try {
    const sale = await api('GET', `/photo-sales/${saleId}`);
    if (!sale.qr_token) { toast('Нет QR-токена', true); return; }
    await api('POST', `/photo-sales/by-token/${encodeURIComponent(sale.qr_token)}/deliver`);
    toast('✅ Фото выданы');
    closeSaleModal();
    await loadTodaySales();
  } catch (e) { toast(e.message, true); }
}

async function payAndDeliverSale(saleId) {
  if (!confirm('Отметить оплату наличными и выдать фото?')) return;
  try {
    const sale = await api('GET', `/photo-sales/${saleId}`);
    if (!sale.qr_token) { toast('Нет QR-токена', true); return; }
    await api('PATCH', `/photo-sales/${saleId}/pay`, { payment_method: 'cash', paid_amount: parseFloat(sale.total_amount) || 0 });
    await api('POST', `/photo-sales/by-token/${encodeURIComponent(sale.qr_token)}/deliver`);
    toast('✅ Оплачено и выдано');
    closeSaleModal();
    await loadTodaySales();
  } catch (e) { toast(e.message, true); }
}

function stopChatPoll() {
  if (chatPollTimer) {
    clearInterval(chatPollTimer);
    chatPollTimer = null;
  }
}

function startChatPoll() {
  stopChatPoll();
  chatPollTimer = setInterval(() => { loadChat(false); }, 3000);
}

function switchShiftTab(name, force) {
  if (!currentEvent?.id) return;
  if (!force && shiftTab === name && name !== 'chat') return;
  if (shiftTab === 'chat' && name !== 'chat') stopChatPoll();
  shiftTab = name;
  document.querySelectorAll('#shift-tabs button').forEach((b) => {
    b.classList.toggle('active', b.getAttribute('data-shift-tab') === name);
  });
  const map = { sales: ['shift-info', 'sales-section'], zones: ['tab-zones'], chat: ['tab-chat'], actions: ['tab-actions'], contest: ['tab-contest'] };
  ['shift-info', 'sales-section', 'tab-zones', 'tab-chat', 'tab-actions', 'tab-contest'].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    const show = (map[name] || []).includes(id);
    el.style.display = show ? '' : 'none';
  });
  if (name === 'zones') loadZones();
  if (name === 'chat') {
    lastMsgTime = null;
    chatInitialized = false;
    loadChat(true).then(() => {
      startChatPoll();
    });
  }
  if (name === 'actions') loadActions();
  if (name === 'contest') loadContest();
}

async function loadZones() {
  if (!currentEvent?.id) return;
  try {
    const data = await api('GET', `/events/${currentEvent.id}/zone-assignments`);
    const zones = {};
    (data || []).forEach((za) => {
      const key = za.zone_name || '—';
      if (!zones[key]) zones[key] = [];
      zones[key].push(za);
    });
    const myId = currentUser?.photographer_id;
    let html = '';
    for (const [zoneName, assigns] of Object.entries(zones)) {
      const isMine = assigns.some((a) => a.photographer_id === myId);
      html += `<div style="padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid ${isMine ? 'var(--accent)' : 'var(--border)'};background:${isMine ? 'rgba(124,108,255,0.1)' : 'var(--bg3)'}">
        <div style="font-weight:600;font-size:13px;margin-bottom:4px">${esc(zoneName)}</div>
        ${assigns.map((a) => `<div style="font-size:12px;color:${a.photographer_id === myId ? 'var(--accent)' : 'var(--text2)'}">${esc(a.photographer_name)} · ${String(a.time_from || '').slice(0, 5)}–${String(a.time_to || '').slice(0, 5)}</div>`).join('')}
      </div>`;
    }
    const el = document.getElementById('zone-timeline');
    if (el) el.innerHTML = html || '<div style="font-size:12px;color:var(--text2)">Расстановка ещё не создана</div>';
  } catch (e) {
    toast(e.message, true);
  }
}

function renderChatMessages(msgs, append) {
  const el = document.getElementById('chat-messages');
  if (!el) return;
  const myId = currentUser?.id;
  const html = msgs.map((m) => {
    const isMine = m.sender_id === myId;
    const isSystem = m.message_type === 'system';
    if (isSystem) {
      return `<div style="text-align:center;font-size:11px;color:var(--text3);margin:6px 0">— ${esc(m.content)} —</div>`;
    }
    return `<div style="display:flex;flex-direction:column;align-items:${isMine ? 'flex-end' : 'flex-start'};margin-bottom:8px">
      <div style="font-size:10px;color:var(--text3);margin-bottom:2px">${esc(m.sender_name)} · ${new Date(m.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</div>
      <div style="padding:8px 12px;border-radius:12px;max-width:80%;font-size:13px;background:${isMine ? 'var(--accent)' : 'var(--bg3)'};color:${isMine ? '#fff' : 'var(--text1)'}">${esc(m.content)}</div>
    </div>`;
  }).join('');
  if (append) el.innerHTML += html;
  else el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

async function loadChat(reset) {
  if (!currentEvent?.id) return;
  const append = !reset && !!lastMsgTime;
  const params = lastMsgTime && !reset ? `?after=${encodeURIComponent(lastMsgTime)}` : '?limit=50';
  try {
    const msgs = await api('GET', `/events/${currentEvent.id}/messages${params}`);
    if (msgs && msgs.length) {
      lastMsgTime = msgs[msgs.length - 1].created_at;
      renderChatMessages(msgs, append);
    } else if (reset || !append) {
      if (!append) renderChatMessages([], false);
    }
  } catch (e) {
    console.error('chat poll error', e);
  }
}

async function sendChatMsg() {
  const input = document.getElementById('chat-input');
  const content = (input && input.value) ? input.value.trim() : '';
  if (!content || !currentEvent?.id) return;
  input.value = '';
  try {
    await api('POST', `/events/${currentEvent.id}/messages`, { content });
    await loadChat(true);
  } catch (e) {
    toast(e.message, true);
  }
}

async function requestAction(type) {
  if (!currentEvent?.id) return;
  const labels = { break_request: 'перерыв', help_request: 'помощь', replace_request: 'замену' };
  if (!confirm(`Запросить ${labels[type] || type}?`)) return;
  try {
    await api('POST', `/events/${currentEvent.id}/actions`, { action_type: type });
    toast('Запрос отправлен');
    loadActions();
  } catch (e) {
    toast(e.message, true);
  }
}

async function loadActions() {
  if (!currentEvent?.id) return;
  try {
    const actions = await api('GET', `/events/${currentEvent.id}/actions`);
    const statusIcon = { pending: '⏳', approved: '✅', rejected: '❌', completed: '✅', cancelled: '🚫' };
    const typeLabel = {
      break_request: '☕ Перерыв', help_request: '🆘 Помощь', replace_request: '🔄 Замена',
      task: '📋 Задача', alert: '⚠️ Оповещение',
    };
    const el = document.getElementById('actions-list');
    if (!el) return;
    el.innerHTML = (actions || []).map((a) => `
    <div style="padding:8px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg3)">
      <div style="display:flex;justify-content:space-between">
        <span style="font-weight:600;font-size:12px">${esc(typeLabel[a.action_type] || a.action_type)}</span>
        <span style="font-size:11px">${statusIcon[a.status] || ''} ${esc(a.status)}</span>
      </div>
      <div style="font-size:11px;color:var(--text2)">${esc(a.requested_by_name)} · ${new Date(a.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</div>
    </div>
  `).join('') || '<div style="font-size:12px;color:var(--text2)">Нет действий</div>';
  } catch (e) {
    toast(e.message, true);
  }
}

function contestImgError(img) {
  const p = img && img.parentElement;
  if (!p) return;
  img.remove();
  const d = document.createElement('div');
  d.style.cssText = 'display:flex;align-items:center;justify-content:center;position:absolute;top:0;left:0;width:100%;height:100%;color:var(--text3);font-size:12px';
  d.textContent = 'Фото недоступно';
  p.appendChild(d);
}

function openContestLightbox(url) {
  if (!url) return;
  const lb = document.getElementById('contest-lightbox');
  const im = document.getElementById('contest-lightbox-img');
  if (!lb || !im) return;
  im.src = url;
  lb.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeContestLightbox() {
  const lb = document.getElementById('contest-lightbox');
  if (lb) lb.style.display = 'none';
  document.body.style.overflow = '';
}

function renderContestEntries(entries, budgetRemaining, budgetTotal) {
  const myPhId = currentUser && currentUser.photographer_id;
  const bc = document.getElementById('budget-count');
  if (bc && budgetRemaining !== undefined) bc.textContent = String(budgetRemaining);
  const bt = document.getElementById('budget-total');
  if (bt && budgetTotal !== undefined) bt.textContent = String(budgetTotal);

  const el = document.getElementById('contest-entries');
  if (!el) return;
  if (!entries.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text2);padding:20px;text-align:center">Пока нет участников</div>';
    return;
  }
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">${entries.map((e, idx) => {
    const isMine = String(e.photographer_id) === String(myPhId);
    const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
    const eid = String(e.id || '').replace(/'/g, "\\'");
    const fullPhoto = fullUrl(e.photo_url);
    const myWeight = Number(e.my_vote_weight) || 0;
    const voteBlock = isMine
      ? '<span style="font-size:11px;color:var(--text3)">Ваше фото</span>'
      : `<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
    ${[1, 2, 3].map((w) => `<button type="button" class="btn btn-ghost" style="font-size:12px;padding:3px 8px;${myWeight === w ? 'background:var(--accent);color:#fff;border-color:var(--accent)' : ''}" onclick="event.stopPropagation(); voteContest('${eid}', ${w})">${'❤️'.repeat(w)}</button>`).join('')}
    ${myWeight > 0 ? `<button type="button" class="btn btn-ghost" style="font-size:11px;padding:3px 6px;color:var(--rank3)" onclick="event.stopPropagation(); removeVoteContest('${eid}')">✕</button>` : ''}
  </div>`;
    return `<div style="border-radius:12px;overflow:hidden;border:1px solid ${isMine ? 'var(--accent)' : 'var(--border)'};background:var(--bg3);position:relative">
      <div style="position:relative;width:100%;padding-top:75%;overflow:hidden;background:#111">
        <img src="${esc(fullPhoto)}" alt="" data-full-url="${esc(fullPhoto)}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;cursor:zoom-in" onerror="contestImgError(this)" onclick="event.stopPropagation(); openContestLightbox(this.getAttribute('data-full-url'))">
        ${medal ? `<div style="position:absolute;top:8px;left:8px;font-size:24px;pointer-events:none">${medal}</div>` : ''}
        ${isMine ? `<button type="button" onclick="event.stopPropagation(); deleteContestEntry('${eid}')" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.7);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2" title="Удалить">✕</button>` : ''}
      </div>
      <div style="padding:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:13px;font-weight:600">${esc(e.photographer_name)}</span>
          <span style="font-size:11px;color:var(--text3)">${e.caption ? esc(e.caption) : ''}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:15px">❤️ ${e.votes_count != null ? e.votes_count : 0}</span>
          ${voteBlock}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function loadContest() {
  if (!currentEvent?.id) return;
  try {
    const data = await api('GET', `/events/${currentEvent.id}/contest`);
    const list = Array.isArray(data) ? data : (data.entries || []);
    const budgetRemaining = Array.isArray(data) ? 9 : (data.budget_remaining ?? 9);
    const budgetTotal = Array.isArray(data) ? 9 : (data.budget_total ?? 9);
    const sorted = [...list].sort((a, b) => {
      const va = (parseInt(b.votes_count, 10) || 0) - (parseInt(a.votes_count, 10) || 0);
      if (va !== 0) return va;
      return new Date(a.submitted_at || 0) - new Date(b.submitted_at || 0);
    });
    renderContestEntries(sorted, budgetRemaining, budgetTotal);
    const myPhId = currentUser && currentUser.photographer_id;
    const myEntries = list.filter((e) => String(e.photographer_id) === String(myPhId));
    const formEl = document.getElementById('contest-form');
    if (formEl) formEl.style.display = myEntries.length >= 3 ? 'none' : '';
  } catch (e) {
    toast(e.message, true);
  }
}

async function voteContest(entryId, weight) {
  try {
    const result = await api('POST', `/contest-entries/${entryId}/vote`, { weight });
    if (result && result.remaining !== undefined) {
      const bc = document.getElementById('budget-count');
      if (bc) bc.textContent = String(result.remaining);
      if (result.budget_total !== undefined) {
        const btt = document.getElementById('budget-total');
        if (btt) btt.textContent = String(result.budget_total);
      }
    }
    loadContest();
  } catch (e) {
    toast(e.message, true);
  }
}

async function removeVoteContest(entryId) {
  try {
    const result = await api('DELETE', `/contest-entries/${entryId}/vote`);
    if (result && result.remaining !== undefined) {
      const bc = document.getElementById('budget-count');
      if (bc) bc.textContent = String(result.remaining);
      if (result.budget_total !== undefined) {
        const btt = document.getElementById('budget-total');
        if (btt) btt.textContent = String(result.budget_total);
      }
    }
    loadContest();
  } catch (e) {
    toast(e.message, true);
  }
}

async function deleteContestEntry(entryId) {
  if (!confirm('Удалить фото с конкурса?')) return;
  try {
    await api('DELETE', `/contest-entries/${entryId}`);
    toast('Фото удалено');
    loadContest();
  } catch (e) {
    toast(e.message, true);
  }
}

function previewContestPhoto(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  document.getElementById('contest-file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('contest-preview-img').src = e.target.result;
    document.getElementById('contest-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function submitContestPhoto() {
  const fileInput = document.getElementById('contest-file');
  const file = fileInput && fileInput.files[0];
  const caption = (document.getElementById('contest-caption').value || '').trim();
  if (!file || !currentEvent?.id) { toast('Выберите фото', true); return; }

  try {
    toast('Загружаем фото...');
    const formData = new FormData();
    formData.append('photo', file);
    const uploadRes = await fetch(API + '/contest-photos/upload', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken },
      body: formData,
    });
    if (!uploadRes.ok) {
      const err = await uploadRes.json().catch(() => ({ error: 'Ошибка загрузки' }));
      throw new Error(err.error || 'Ошибка загрузки');
    }
    const { photo_url } = await uploadRes.json();

    await api('POST', `/events/${currentEvent.id}/contest`, { photo_url, caption: caption || null });

    fileInput.value = '';
    document.getElementById('contest-file-name').textContent = '';
    document.getElementById('contest-preview').style.display = 'none';
    document.getElementById('contest-caption').value = '';
    toast('Фото подано на конкурс');
    loadContest();
  } catch (e) {
    toast(e.message, true);
  }
}
</script>

<div id="contest-lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center" onclick="closeContestLightbox()">
  <img id="contest-lightbox-img" alt="" style="max-width:95%;max-height:90vh;object-fit:contain;border-radius:8px;cursor:default" onclick="event.stopPropagation()">
  <button type="button" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer" onclick="event.stopPropagation(); closeContestLightbox()">✕</button>
</div>
</body>
