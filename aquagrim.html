<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PhotoHR — Аквагрим</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--card-h:#1f1f2a;
  --border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  /* Аквагрим accent — бирюзовый вместо фиолетового */
  --aq-accent:#3ecfb4;--aq-accent2:#5ee8d0;
  --accent:var(--aq-accent);--accent2:var(--aq-accent2);
  --rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555;
  --love:#3ecf8e;--dislike:#f25555;--can:#9090a8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

.header{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600}.logo span{color:var(--accent2)}
.nav-links{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.nav-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Golos Text',sans-serif;transition:all .15s}
.nav-btn:hover{color:var(--text)}.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.header-stats{display:flex;gap:16px;flex:1}
.stat{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.user-pill{padding:5px 10px;border-radius:16px;background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;font-family:'Golos Text',sans-serif}

.toolbar{max-width:1400px;margin:0 auto;padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-btn:hover{color:var(--text)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search-in{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;outline:none;width:220px;transition:border-color .15s}
.search-in::placeholder{color:var(--text3)}
.search-in:focus{border-color:var(--accent)}
.fin{padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;outline:none}
.fin:focus{border-color:var(--accent)}
.fselect{padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer}
.fselect option{background:var(--bg2)}
.btn{padding:8px 16px;border-radius:10px;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.spacer{flex:1}

.main{max-width:1400px;margin:0 auto;padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.empty{text-align:center;padding:60px;color:var(--text3);grid-column:1/-1}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all .18s}
.card:hover{background:var(--card-h);border-color:var(--border2);transform:translateY(-2px)}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;flex-shrink:0;border:1px solid var(--border2)}
.cn{font-weight:600;font-size:14px}
.cd{font-size:11px;color:var(--text3);margin-top:2px}
.rb{padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600;flex-shrink:0;background:rgba(62,207,180,.10);border:1px solid rgba(62,207,180,.35);color:var(--accent2)}

/* score */
.ss{margin:10px 0}
.slr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.slbl{font-size:11px;color:var(--text2)}
.sv{display:flex;align-items:center;gap:5px}
.sn{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600}
.sc{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500}
.sc-t{background:rgba(62,207,142,.15);color:var(--rank1)}
.sc-m{background:rgba(245,166,35,.15);color:var(--rank2)}
.sc-w{background:rgba(242,85,85,.15);color:var(--rank3)}
.sc-z{background:rgba(90,90,114,.15);color:var(--text3)}
.strack{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden}
.sfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--aq-accent),var(--aq-accent2))}
.dots{display:flex;gap:3px;margin-top:6px}
.d{width:20px;height:20px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text3)}
.d.dt{background:rgba(62,207,142,.2);border-color:rgba(62,207,142,.4);color:var(--rank1)}
.d.dm{background:rgba(245,166,35,.2);border-color:rgba(245,166,35,.4);color:var(--rank2)}
.d.dw{background:rgba(242,85,85,.2);border-color:rgba(242,85,85,.4);color:var(--rank3)}

.comment-preview{background:var(--bg3);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text2);line-height:1.5;margin-top:10px;border-left:2px solid var(--accent)}
.no-comment{font-size:11px;color:var(--text3);margin-top:8px;font-style:italic}
.comment-count{font-size:11px;color:var(--text3);margin-top:4px}

.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.pill{padding:2px 8px;border-radius:7px;font-size:11px;border:1px solid var(--border);background:var(--bg3);color:var(--text2)}
.pill.ok{border-color:rgba(62,207,142,.25);background:rgba(62,207,142,.12);color:#5ddba6}
.pill.warn{border-color:rgba(245,166,35,.25);background:rgba(245,166,35,.10);color:var(--rank2)}
.pill.bad{border-color:rgba(242,85,85,.25);background:rgba(242,85,85,.10);color:var(--rank3)}

.vs{margin-top:10px}
.vl{font-size:11px;color:var(--text2);margin-bottom:4px}
.vps{display:flex;flex-wrap:wrap;gap:4px}
.vp{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.vp-love{background:rgba(62,207,142,.12);color:#5ddba6;border:1px solid rgba(62,207,142,.25)}
.vp-can{background:rgba(144,144,168,.1);color:var(--text2);border:1px solid var(--border)}
.vp-dis{background:rgba(242,85,85,.1);color:var(--rank3);border:1px solid rgba(242,85,85,.25)}

/* Drawer */
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;backdrop-filter:blur(3px)}
.drawer-bg.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:100%;max-width:600px;background:var(--bg2);border-left:1px solid var(--border2);overflow-y:auto;z-index:101;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.drawer.open{transform:translateX(0)}
.drh{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.drh-left{display:flex;align-items:center;gap:14px}
.dr-name{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.dr-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;border-radius:8px;padding:4px 8px}
.dr-close:hover{color:var(--text)}
.dr-body{padding:20px 24px}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:16px}
.tab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.tab.active{background:var(--card);color:var(--text)}

.field-row{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.field{flex:1;min-width:140px}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fv{font-size:14px;color:var(--text)}
.photo-zone{position:relative;width:52px;height:52px;border-radius:50%;cursor:pointer}
.photo-zone img{width:52px;height:52px;border-radius:50%;object-fit:cover;display:block;border:2px solid var(--border2)}
.photo-zone .photo-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;border:2px solid var(--border2)}
.photo-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:10px;color:#fff;font-weight:600}
.photo-zone:hover .photo-overlay{opacity:1}

.comment-input-wrap{display:flex;gap:8px;margin-bottom:16px}
.comment-ta{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;outline:none;resize:none;min-height:70px;line-height:1.5}
.comment-ta:focus{border-color:var(--accent)}
.comment-list{display:flex;flex-direction:column;gap:10px}
.citem{background:var(--bg3);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.citem-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cauthor{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.cdate{font-size:11px;color:var(--text3)}
.cbody{font-size:13px;color:var(--text2);line-height:1.6}
.cdel{font-size:11px;color:var(--rank3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px}
.cdel:hover{background:rgba(242,85,85,.1)}

/* Modals/Toast */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
.loading{text-align:center;padding:40px;color:var(--text3)}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="index.html">Photo<span>HR</span></a>
  <div class="nav-links" id="nav-links">
    <a class="nav-btn" href="index.html">Сотрудники</a>
    <a class="nav-btn" href="recruiting.html">Рекрутинг</a>

  </div>
  <div class="header-stats" id="hstats"></div>
  <div class="header-right">
    <div class="user-pill" id="user-pill"></div>

  </div>
</div>

<div class="toolbar">
  <input class="search-in" id="search" placeholder="🔍 Поиск по имени..." oninput="render()" style="flex:1;min-width:220px;max-width:360px"/>
  <button class="f-btn active" id="fb-all" onclick="resetFilters()">Все</button>
  <button class="f-btn" id="fb-r1" onclick="setFilter('rank',1)">1★</button>

    <option value="">Площадка</option>
  </select>
  <span class="spacer"></span>
  <div id="toolbar-actions" style="display:flex;gap:8px"></div>
</div>

<div class="main">
  <div class="grid" id="grid"><div class="empty">Загрузка...</div></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="document.getElementById('lightbox').classList.remove('open')">
  <img id="lightbox-img" src="" alt=""/>
</div>

<!-- Drawer -->
<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drh">
    <div class="drh-left">
      <div class="photo-zone" id="dr-photo-zone" style="cursor:default" onclick="onDrawerPhotoClick(event)">
        <div class="photo-av" id="dr-av"></div>
        <div class="photo-overlay" id="dr-photo-overlay" style="display:none">Заменить</div>

  <div class="dr-body">

      <button class="tab" id="tab-2" onclick="switchTab(2)">История</button>

</div>

<!-- New aquagrimer modal -->
<div class="overlay" id="new-aq-modal" onclick="if(event.target===this)this.classList.remove('open')">
<div class="modal">
  <div class="modal-title"><span>Новый аквагримёр</span><button class="dr-close" onclick="document.getElementById('new-aq-modal').classList.remove('open')">×</button></div>
  <div class="field" style="margin-bottom:12px">
    <div class="fl">Имя *</div>
    <input class="fin" id="na-name" placeholder="Анна Иванова" autocomplete="off"/>
  </div>
  <div class="field-row">
    <div class="field">
      <div class="fl">Телефон</div>
      <input class="fin" id="na-phone" placeholder="+7..." autocomplete="off"/>
    </div>
    <div class="field">
      <div class="fl">Email</div>
      <input class="fin" id="na-email" placeholder="anna@mail.ru" autocomplete="off"/>
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <div class="fl">Роль</div>
      <select class="fselect" id="na-role" style="width:100%">
        <option value="aquagrim">Аквагримёр</option>
        <option value="senior_aquagrim">Старший аквагримёр</option>
        <option value="aquagrim_manager">Менеджер</option>
      </select>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="document.getElementById('new-aq-modal').classList.remove('open')">Отмена</button>
    <button class="btn btn-primary" onclick="createAquagrimer()">Создать</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname==='localhost'
  ? 'http://localhost:3001/api'
  : 'https://fotohr-server-production.up.railway.app/api';

let accessToken = localStorage.getItem('fhr_access') || null;
let refreshToken = localStorage.getItem('fhr_refresh') || null;
let currentUser = null;
let refreshLock = null;

let aquagrimers = [];
let venues = [];
let filters = { rank:null, sales:null, gender:null, venue:null };

const AQ_ROLE_LABELS = {
  aquagrim: 'Аквагример',
  senior_aquagrim: 'Старший аквагример',
  aquagrim_manager: 'Менеджер'
};

const AQ_PAGE_ROLES = ['aq_manager','hr_director','exec_director','admin','cashier'];
const AQ_EDIT_ROLES = ['aq_manager','hr_director','exec_director','admin'];

const roleNow = () => currentUser?.role || '';
const canSeePage = () => AQ_PAGE_ROLES.includes(roleNow());
const canEdit = () => AQ_EDIT_ROLES.includes(roleNow());
const canDeleteComments = (c) => roleNow()==='admin' || String(c.author_id)===String(currentUser?.id);

function esc(s){
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showToast(m,isErr){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.className='toast show'+(isErr?' error':'');
  setTimeout(()=>t.className='toast',2500);
}
function doLogout(){
  localStorage.removeItem('fhr_refresh');
  localStorage.removeItem('fhr_access');
  window.location.href='index.html';
}

async function api(method, path, body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(accessToken) opts.headers['Authorization']=`Bearer ${accessToken}`;
  if(body) opts.body=JSON.stringify(body);
  let res=await fetch(API+path,opts);
  if(res.status===401 && refreshToken){
    try{
      if(!refreshLock){
        refreshLock=(async()=>{
          const rr=await fetch(API+'/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken})});
          if(!rr.ok) throw new Error('refresh_failed');
          const d=await rr.json();
          accessToken=d.accessToken; refreshToken=d.refreshToken;
          localStorage.setItem('fhr_refresh',refreshToken);
          localStorage.setItem('fhr_access',accessToken);
          if(d.user) currentUser=d.user;
        })();
      }
      await refreshLock;
      opts.headers['Authorization']=`Bearer ${accessToken}`;
      res=await fetch(API+path,opts);
    } catch {
      doLogout();
      return null;
    } finally { refreshLock=null; }
  }
  if(!res.ok){
    const err=await res.json().catch(()=>({error:'Ошибка'}));
    throw new Error(err.error||'Ошибка');
  }
  return res.json();
}

function ini(n){ return String(n||'').split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2) || 'AQ'; }
const AV_COLORS=[{bg:'#1a2a4a',fg:'#6aa6e8'},{bg:'#1a3028',fg:'#4ecb8a'},{bg:'#2e1a08',fg:'#e8a04e'},{bg:'#2e0a1a',fg:'#e86aa6'},{bg:'#1a1a3a',fg:'#8a7aee'},{bg:'#2a1a1a',fg:'#e87a6a'}];
function avC(name){ let h=0; for(const c of String(name||'')) h=(h*31+c.charCodeAt(0))%AV_COLORS.length; return AV_COLORS[h]; }

function pillHireStatus(s){
  const v=String(s||'').toLowerCase();
  if(v==='active') return {cls:'ok', txt:'Активен'};
  if(v==='paused') return {cls:'warn', txt:'Пауза'};
  if(v==='fired') return {cls:'bad', txt:'Уволен'};
  return {cls:'', txt:s||'—'};
}

function calcAge(birth_date){
  if(!birth_date) return null;
  const b = new Date(birth_date);
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  if(today.getMonth() < b.getMonth() || (today.getMonth()===b.getMonth() && today.getDate()<b.getDate())) age--;
  return age;
}
function scoreInfo(s){
  if(s===0) return{cat:'Стажёр',sc:'sc-z'};
  if(s<=4)  return{cat:'Новичок',sc:'sc-w'};
  if(s<=7)  return{cat:'Молодцы',sc:'sc-m'};
  return{cat:'Топ',sc:'sc-t'};
}
function dotCls(i,score){
  const s = Number(score||0);
  const base = 'd';
  if(i<=s){
    if(s>=8) return base+' dt';
    if(s>=5) return base+' dm';
    if(s>=1) return base+' dw';
  }
  return base;
}
function rankStars(r){
  const n = Number(r||0);
  if(!n) return '☆';
  if(n===1) return '★';
  if(n===2) return '★★';
  return '★★★';
}

function setFilter(kind, value){
  if(kind==='venue') value = value || null;
  if(filters[kind] === value){
    filters[kind] = null;
  } else {
    filters[kind] = value;
  }
  // UI toggles
  const map = {
    rank: {1:'fb-r1',2:'fb-r2',3:'fb-r3'},
    sales:{zero:'fb-zero',weak:'fb-weak',mid:'fb-mid',top:'fb-top'},
    gender:{male:'fb-male',female:'fb-female'}
  };
  if(map[kind]){
    Object.values(map[kind]).forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.remove('active'); });
    const id = map[kind][value];
    if(id){ const el=document.getElementById(id); if(el) el.classList.add('active'); }
  }
  document.getElementById('fb-all')?.classList.toggle('active', !filters.rank && !filters.sales && !filters.gender && !filters.venue && !(document.getElementById('search')?.value||'').trim());
  render();
}
function resetFilters(){
  filters = { rank:null, sales:null, gender:null, venue:null };
  ['fb-r1','fb-r2','fb-r3','fb-zero','fb-weak','fb-mid','fb-top','fb-male','fb-female'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  const s = document.getElementById('search'); if(s) s.value='';
  const v = document.getElementById('f-venue'); if(v) v.value='';
  document.getElementById('fb-all')?.classList.add('active');
  render();
}

function filterAq(){
  const q = (document.getElementById('search')?.value || '').trim().toLowerCase();
  return aquagrimers.filter(a => {
    if(q && !String(a.name||'').toLowerCase().includes(q)) return false;
    if(filters.rank && String(a.rank) !== String(filters.rank)) return false;
    if(filters.sales){
      const s = a.sales_score ?? 0;
      if(filters.sales==='zero' && s !== 0) return false;
      if(filters.sales==='weak' && !(s >= 1 && s <= 4)) return false;
      if(filters.sales==='mid'  && !(s >= 5 && s <= 7)) return false;
      if(filters.sales==='top'  && s < 8) return false;
    }
    if(filters.gender && a.gender !== filters.gender) return false;
    if(filters.venue){
      const hasVenue = (a.venues||[]).some(v =>
        String(v.venue_id) === String(filters.venue) && (v.attitude==='loves' || v.attitude==='can')
      );
      if(!hasVenue) return false;
    }
    return true;
  });
}

function render(){
  const list = filterAq();
  const grid = document.getElementById('grid');
  const active = list.filter(a => a.is_active === true || a.is_active === 'true');
  const inactive = list.filter(a => a.is_active === false || a.is_active === 'false' || a.is_active == null);

  const hasFilter = filters.rank||filters.sales||filters.gender||filters.venue||(document.getElementById('search')?.value||'').trim();
  const total = active.length;
  const tops = active.filter(a=>(a.sales_score??0)>=8).length;
  const avg = total ? (active.reduce((s,a)=>s+(a.sales_score||0),0)/total).toFixed(1) : '—';
  document.getElementById('hstats').innerHTML = `
    <div class="stat"><div class="stat-num" style="color:var(--accent2)">${total}</div><div class="stat-lbl">${hasFilter?'Найдено':'Всего'}</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--rank1)">${tops}</div><div class="stat-lbl">Топ</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--rank2)">${avg}</div><div class="stat-lbl">Средний балл</div></div>
  `;

  if(!list.length){ grid.innerHTML = `<div class="empty">Нет аквагримёров по фильтру</div>`; return; }
  let html = active.map(cardHtml).join('');
  if(inactive.length){
    html += `<div style="grid-column:1/-1;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);color:var(--text3);font-size:12px">⏸ Неактивные (${inactive.length})</div>`;
    html += inactive.map(cardHtml).join('');
  }
  grid.innerHTML = html;
}

        ${infoInput('aq-grade','Грейд',drawerData.grade)}
      </div>
      <div class="field-row">
        ${infoInput('aq-grade-score','grade_score',drawerData.grade_score,'number')}
        ${infoSelect('aq-sq','Мастерство',drawerData.score_quality??0,[
          {value:'0',label:'не оценено'},
          {value:'1',label:'★'},
          {value:'2',label:'★★'},
          {value:'3',label:'★★★'},
          {value:'4',label:'★★★★'},
          {value:'5',label:'★★★★★'}
        ])}
      </div>
      <div class="field-row">
        ${infoSelect('aq-sl','Внешний вид',drawerData.score_looks??0,[
          {value:'0',label:'не оценено'},
          {value:'1',label:'★'},
          {value:'2',label:'★★'},
          {value:'3',label:'★★★'},
          {value:'4',label:'★★★★'},
          {value:'5',label:'★★★★★'}
        ])}
        ${infoSelect('aq-ss','Общительность',drawerData.score_social??0,[
          {value:'0',label:'не оценено'},
          {value:'1',label:'★'},
          {value:'2',label:'★★'},
          {value:'3',label:'★★★'},
          {value:'4',label:'★★★★'},
          {value:'5',label:'★★★★★'}
        ])}
      </div>
      <div class="field" style="margin-bottom:12px">
        <div class="fl">Описание</div>
        <textarea class="comment-ta" id="aq-summary" placeholder="Коротко..." style="min-height:90px">${esc(drawerData.summary||'')}</textarea>
      </div>
      <div class="field" style="margin-bottom:12px">
        <div class="fl">Заметки на следующую смену</div>
        <textarea class="comment-ta" id="aq-notes" placeholder="Важно..." style="min-height:70px">${esc(drawerData.notes_for_next_shift||'')}</textarea>
      </div>
      ${venuesEditor}
      <div style="display:flex;gap:8px;justify-content:flex-end">
        ${drawerData.photo_url ? `<button class="btn btn-ghost" onclick="deletePhoto()">Удалить фото</button>` : ''}
        <button class="btn btn-ghost" onclick="deactivateAq()">Деактивировать</button>
        <button class="btn btn-primary" onclick="saveInfo()">Сохранить</button>
      </div>
    `;
    return;
  }

  if(drawerTab===1){
    const comments = (drawerData.comments||[]).filter(c=>c.is_deleted===false);
    el.innerHTML = `
      <div class="comment-input-wrap">
        <textarea class="comment-ta" id="c-body" placeholder="Комментарий..."></textarea>
        <button class="btn btn-primary" onclick="addComment()">Добавить</button>
      </div>
      <div class="comment-list">
        ${comments.length ? comments.map(c=>`
          <div class="citem">
            <div class="citem-head">
              <div class="cauthor"><span>${esc(c.author_name||'—')}</span></div>
              <div style="display:flex;align-items:center;gap:8px">
                <span class="cdate">${c.created_at?new Date(c.created_at).toLocaleString('ru-RU'):'—'}</span>
                ${canDeleteComments(c)?`<button class="cdel" onclick="deleteComment('${c.id}')">Удалить</button>`:''}
              </div>
            </div>
            <div class="cbody">${esc(c.body||'')}</div>
          </div>
        `).join('') : `<div class="empty" style="padding:24px 0">Комментариев нет</div>`}
      </div>
    `;
    return;
  }

  if(drawerTab===2){
    el.innerHTML = `<div style="color:var(--text3);font-size:14px;line-height:1.6;padding:12px">
      История изменений пока недоступна для аквагримёров.
    </div>`;
    return;
  }

  if(drawerTab===3){
    el.innerHTML = `<div style="color:var(--text3);font-size:14px;line-height:1.6;padding:12px">
      🏆 Достижения пока недоступны для аквагримёров.
    </div>`;
    return;
  }
}

async function addComment(){
  try{
    const body = document.getElementById('c-body').value.trim();
    if(!body){ showToast('Комментарий пустой', true); return; }
    await api('POST', `/aq/staff/${drawerId}/comments`, { body });
    showToast('Комментарий добавлен');
    drawerData = await api('GET', `/aq/staff/${drawerId}`);
    renderDrawerTab();
    await reloadAll();
  } catch(e){ showToast(e.message, true); }
}

async function deleteComment(id){
  try{
    await api('DELETE', `/aq/comments/${id}`);
    showToast('Комментарий удалён');
    drawerData = await api('GET', `/aq/staff/${drawerId}`);
    renderDrawerTab();
    await reloadAll();
  } catch(e){ showToast(e.message, true); }
}

async function addVenue(){
  try{
    const venue_id = document.getElementById('v-add').value;
    const attitude = document.getElementById('v-att').value;
    if(!venue_id){ showToast('Выберите площадку', true); return; }
    await api('POST', `/aq/staff/${drawerId}/venues`, { venue_id, attitude });
    showToast('Площадка добавлена');
    drawerData = await api('GET', `/aq/staff/${drawerId}`);
    renderDrawerTab();
    await reloadAll();
  } catch(e){ showToast(e.message, true); }
}

async function removeVenue(venueId){
  try{
    await api('DELETE', `/aq/staff/${drawerId}/venues/${venueId}`);
    showToast('Площадка убрана');
    drawerData = await api('GET', `/aq/staff/${drawerId}`);
    renderDrawerTab();
    await reloadAll();
  } catch(e){ showToast(e.message, true); }
}

async function uploadPhoto(ev){
  try{
    if(!canEdit()) return;
    const file = ev.target.files?.[0];
    if(!file){ return; }
    const fd = new FormData();
    fd.append('photo', file);
    const res = await fetch(API + `/aq/staff/${drawerId}/photo`, {
      method:'POST',
      headers: { 'Authorization': `Bearer ${accessToken}` },
      body: fd
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || 'Ошибка загрузки');
    showToast('Фото обновлено');
    drawerData = await api('GET', `/aq/staff/${drawerId}`);
    updateDrawerPhoto(drawerData);
    await reloadAll();
  } catch(e){ showToast(e.message, true); }
  finally{
    ev.target.value='';
  }
}

async function deletePhoto(){
  try{
    await api('DELETE', `/aq/staff/${drawerId}/photo`);
    showToast('Фото удалено');
    drawerData = await api('GET', `/aq/staff/${drawerId}`);
    updateDrawerPhoto(drawerData);
    await reloadAll();
  } catch(e){ showToast(e.message, true); }
}

async function deactivateAq(){
  try{
    if(!canEdit()) return;
    if(!confirm('Деактивировать аквагримёра?')) return;
    await api('PATCH', `/aq/staff/${drawerId}`, { is_active: false });
    showToast('Деактивирован');
    await reloadAll();
    drawerData = await api('GET', `/aq/staff/${drawerId}`);
    updateDrawerPhoto(drawerData);
    renderDrawerTab();
  } catch(e){ showToast(e.message, true); }
}

function openNewAq(){
  document.getElementById('na-name').value='';
  document.getElementById('na-phone').value='';
  document.getElementById('na-email').value='';
  document.getElementById('na-role').value='aquagrim';
  document.getElementById('new-aq-modal').classList.add('open');
}

async function createAquagrimer(){
  try{
    const name = document.getElementById('na-name').value.trim();
    const phone = document.getElementById('na-phone').value.trim();
    const email = document.getElementById('na-email').value.trim();
    const employee_role = document.getElementById('na-role').value;
    if(!name){ showToast('Имя обязательно', true); return; }
    await api('POST','/aq/staff',{ name, phone: phone||null, email: email||null, employee_role });
    document.getElementById('new-aq-modal').classList.remove('open');
    showToast('Аквагримёр добавлен');
    await reloadAll();
  } catch(e){ showToast(e.message, true); }
}

async function reloadAll(){
  await loadAquagrimers();
  render();
}

function setupToolbarActions(){
  const el = document.getElementById('toolbar-actions');
  if(!el) return;
  const btns = [];
  if(canEdit()) btns.push(`<button class="btn btn-primary" onclick="openNewAq()">+ Аквагример</button>`);
  btns.push(`<button class="btn btn-ghost" onclick="exportAquagrimers()">↓ Экспорт</button>`);
  el.innerHTML = btns.join('');
}

function exportAquagrimers(){
  showToast('Экспорт пока не подключен', true);
}

(async function init(){
  if(!accessToken && !refreshToken){ window.location.href='index.html'; return; }
  try{
    currentUser = await api('GET','/auth/me');
    if(!canSeePage()){
      window.location.href='index.html';
      return;
    }
    document.getElementById('user-pill').innerHTML = `<span>${esc(currentUser.name)}</span>`;
    setupToolbarActions();
    await Promise.all([loadVenues(), reloadAll()]);
  } catch(e){
    document.getElementById('grid').innerHTML = `<div class="empty" style="color:var(--rank3)">${esc(e.message)}</div>`;
  }
})();
</script>
</body>
</html>
