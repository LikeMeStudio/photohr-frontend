<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PhotoHR — Команда</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--card-h:#1f1f2a;
  --border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --accent:#7c6cff;--accent2:#9b8dff;
  --rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555;
  --love:#3ecf8e;--dislike:#f25555;--can:#9090a8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px}
.login-logo{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:600;margin-bottom:8px}
.login-logo span{color:var(--accent2)}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.login-error{background:rgba(242,85,85,.1);border:1px solid rgba(242,85,85,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--rank3);margin-bottom:16px;display:none}
.login-success{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--rank1);margin-bottom:16px;display:none}
.login-tabs{display:flex;gap:0;margin-bottom:24px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.login-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;background:transparent;color:var(--text2);border:none;cursor:pointer;font-family:'Golos Text',sans-serif;transition:all .15s}
.login-tab.active{background:var(--accent);color:#fff}
.login-tab:hover:not(.active){color:var(--text)}
.or-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-size:12px}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.google-btn:hover{border-color:var(--border2);background:var(--card-h)}
.google-btn svg{width:18px;height:18px}
.pending-screen{text-align:center;padding:60px 20px}
.pending-icon{font-size:48px;margin-bottom:16px}
.pending-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;margin-bottom:8px}
.pending-text{color:var(--text2);font-size:14px;line-height:1.6;max-width:360px;margin:0 auto 24px}
.pending-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500}
.pending-badge.verified{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);color:var(--rank1)}
.pending-badge.unverified{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--rank2)}
.approve-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);margin-bottom:8px}
.approve-row .badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500}
.badge-verified{background:rgba(62,207,142,.15);color:var(--rank1)}
.badge-google{background:rgba(124,108,255,.15);color:var(--accent2)}
.badge-pending{background:rgba(245,166,35,.15);color:var(--rank2)}

/* ── MAIN APP ── */
#app{display:none}
.header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-right:8px}
.logo span{color:var(--accent2)}
.header-stats{display:flex;gap:16px;flex:1}
.stat{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.user-pill{padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%}
.nav-links{display:flex;gap:6px;margin-left:12px}

/* ── FILTERS ── */
.toolbar{padding:12px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-btn:hover{color:var(--text)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#fb-r1.active{background:#3d2000;color:#e8a060;border-color:#b87333}
#fb-r2.active{background:#1a2030;color:#b8cce0;border-color:#8a9bb0}
#fb-r3.active{background:#2a2000;color:#d4b840;border-color:#c9a84c}
.f-zero.active{background:#3a3a4a;border-color:#5a5a72;color:var(--text)}
.f-weak.active{background:rgba(242,85,85,.8);border-color:var(--rank3);color:#fff}
.f-mid.active{background:rgba(62,207,142,.8);border-color:var(--rank1);color:#0a2e1e}
.f-top.active{background:linear-gradient(135deg,#f5a623,#e8830a);border-color:#f5a623;color:#1a0a00}
#fb-p1.active,#fb-p2.active,#fb-p3.active,#fb-p4.active,#fb-p5.active{background:rgba(245,166,35,.2);border-color:#f5a623;color:#f5a623}
.search-in{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;outline:none;width:200px;transition:border-color .15s}
.search-in::placeholder{color:var(--text3)}
.search-in:focus{border-color:var(--accent)}

/* ── GRID ── */
.main{padding:24px 28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.empty{text-align:center;padding:60px;color:var(--text3);grid-column:1/-1}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all .18s;animation:fi .25s ease both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
/* Toast — центр снизу, как на index.html */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s ease;max-width:min(90vw,420px);text-align:center}
.toast.show{opacity:1;pointer-events:auto}
.toast.error{background:rgba(242,85,85,.15);border-color:rgba(242,85,85,.35);color:#fca5a5}
.card:hover:not(.birthday-card){background:var(--card-h);border-color:var(--border2);transform:translateY(-2px)}
.card.birthday-card:hover{background:var(--card-h);transform:translateY(-2px)}

@keyframes birthday-glow {
  0%   { border-color: #f5a623; box-shadow: 0 0 8px rgba(245,166,35,.2); }
  25%  { border-color: #ff6b9d; box-shadow: 0 0 12px rgba(255,107,157,.15); }
  50%  { border-color: #c084fc; box-shadow: 0 0 8px rgba(192,132,252,.15); }
  75%  { border-color: #67e8f9; box-shadow: 0 0 12px rgba(103,232,249,.15); }
  100% { border-color: #f5a623; box-shadow: 0 0 8px rgba(245,166,35,.2); }
}

.birthday-card {
  animation: birthday-glow 4s ease-in-out infinite, fi .25s ease both;
  border-width: 2px;
  border-style: solid;
  position: relative;
}

/* ── PHOTO UPLOAD ── */
.photo-zone{position:relative;width:80px;height:80px;border-radius:50%;margin:0 auto 16px;cursor:pointer}
.photo-zone img{width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;border:2px solid var(--border2)}
.photo-zone .photo-av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600;border:2px solid var(--border2)}
.photo-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;gap:2px}
.photo-zone:hover .photo-overlay{opacity:1}
.photo-overlay-icon{font-size:18px;line-height:1}
.photo-overlay-txt{font-size:10px;color:#fff;font-weight:500}
.photo-uploading{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;flex-shrink:0}
.cn{font-weight:600;font-size:14px}
.cd{font-size:11px;color:var(--text3);margin-top:2px}
.rb{border-radius:6px;padding:2px 10px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.rb1{background:rgba(184,115,51,.2) !important;color:#d4955a !important;border:1px solid rgba(184,115,51,.5) !important}
.rb2{background:rgba(138,155,176,.2) !important;color:#a8bcce !important;border:1px solid rgba(138,155,176,.5) !important}
.rb3{background:rgba(201,168,76,.2) !important;color:#c9a84c !important;border:1px solid rgba(201,168,76,.5) !important}

/* score */
.ss{margin:10px 0}
.slr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.slbl{font-size:11px;color:var(--text2)}
.sv{display:flex;align-items:center;gap:5px}
.sn{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600}
.sc{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500}
.sc-t{background:rgba(62,207,142,.15);color:var(--rank1)}
.sc-m{background:rgba(245,166,35,.15);color:var(--rank2)}
.sc-w{background:rgba(242,85,85,.15);color:var(--rank3)}
.sc-z{background:rgba(90,90,114,.15);color:var(--text3)}
.strack{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden}
.sfill{height:100%;border-radius:2px}
.sf-t{background:linear-gradient(90deg,#1fa86b,#3ecf8e)}
.sf-m{background:linear-gradient(90deg,#c47b10,#f5a623)}
.sf-w{background:linear-gradient(90deg,#a02020,#f25555)}
.sf-z{background:var(--border)}
.dots{display:flex;gap:3px;margin-top:6px}
.d{width:20px;height:20px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text3)}
.d.dt{background:rgba(62,207,142,.2);border-color:rgba(62,207,142,.4);color:var(--rank1)}
.d.dm{background:rgba(245,166,35,.2);border-color:rgba(245,166,35,.4);color:var(--rank2)}
.d.dw{background:rgba(242,85,85,.2);border-color:rgba(242,85,85,.4);color:var(--rank3)}

/* venues pills */
.vs{margin:8px 0}
.vl{font-size:11px;color:var(--text2);margin-bottom:4px}
.vps{display:flex;flex-wrap:wrap;gap:4px}
.vp{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.vp-love{background:rgba(62,207,142,.12);color:#5ddba6;border:1px solid rgba(62,207,142,.25)}
.vp-can{background:rgba(144,144,168,.1);color:var(--text2);border:1px solid var(--border)}
.vp-dis{background:rgba(242,85,85,.1);color:var(--rank3);border:1px solid rgba(242,85,85,.25)}

.comment-preview{background:var(--bg3);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text2);line-height:1.5;margin-top:10px;border-left:2px solid var(--accent)}
.no-comment{font-size:11px;color:var(--text3);margin-top:8px;font-style:italic}
.comment-count{font-size:11px;color:var(--text3);margin-top:4px}

/* ── DRAWER (карточка фотографа) ── */
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;backdrop-filter:blur(3px)}
.drawer-bg.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:100%;max-width:600px;background:var(--bg2);border-left:1px solid var(--border2);z-index:101;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;height:100%;max-height:100dvh}
.drawer.open{transform:translateX(0)}
.dr-head-sticky{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.15);padding-bottom:12px;position:sticky;top:0;z-index:10}
.drh{padding:20px 24px 12px;border-bottom:none;display:flex;align-items:center;justify-content:space-between}
.dr-earned{padding:0 24px 4px;min-height:0}
.dr-tabs-wrap{padding:0 24px 12px}
.dr-body{flex:1;min-height:0;overflow-y:auto;padding:16px 24px 24px}
.drh-left{display:flex;align-items:center;gap:14px}
.dr-name{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.dr-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;border-radius:8px;padding:4px 8px}
.dr-close:hover{color:var(--text)}
/* drawer avatar — компактный размер в шапке */
#dr-photo-zone{width:52px;height:52px;flex-shrink:0}
#dr-photo-zone img.dr-photo-img{width:52px;height:52px}
#dr-photo-zone .photo-av{width:52px;height:52px;font-size:14px}
#dr-photo-zone .photo-overlay-txt{display:none}
#dr-photo-zone .photo-del-btn{width:17px;height:17px;font-size:9px;top:-1px;right:-1px}

/* tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:0}
.tab{flex:1;min-width:0;padding:7px 4px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:3px;line-height:1.2;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff}

/* fields */
.field-row{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.field{flex:1;min-width:140px}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fv{font-size:14px;color:var(--text)}
.fin{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;outline:none}
.fin:focus{border-color:var(--accent)}
.fselect{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;outline:none;cursor:pointer}
.fselect option{background:var(--bg2)}

/* rank selector — металлические цвета */
.rank-opts{display:flex;gap:8px}
.rank-opt{flex:1;padding:10px 6px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;text-align:center;transition:all .2s}
.rank-opt.sel-1{
  border-color:#cd7f32;
  color:#f4a460;
  background:linear-gradient(135deg,#3d1f00 0%,#5c2e00 40%,#3d1f00 100%);
  box-shadow:0 0 12px rgba(205,127,50,.3),inset 0 1px 0 rgba(255,200,100,.15);
  text-shadow:0 0 8px rgba(244,164,96,.6);
}
.rank-opt.sel-2{
  border-color:#a8b8c8;
  color:#d8e8f8;
  background:linear-gradient(135deg,#1a2030 0%,#2a3545 40%,#1a2030 100%);
  box-shadow:0 0 12px rgba(168,184,200,.25),inset 0 1px 0 rgba(220,235,255,.15);
  text-shadow:0 0 8px rgba(216,232,248,.5);
}
.rank-opt.sel-3{
  border-color:#c9a84c;
  color:#ffd700;
  background:linear-gradient(135deg,#2a1f00 0%,#3d2e00 40%,#2a1f00 100%);
  box-shadow:0 0 12px rgba(201,168,76,.35),inset 0 1px 0 rgba(255,230,100,.2);
  text-shadow:0 0 8px rgba(255,215,0,.7);
}

/* score slider */
.score-wrap{display:flex;align-items:center;gap:12px}
.frank{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bg3);outline:none;border:none;cursor:pointer}
.frank::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg2)}
.score-disp{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600;min-width:30px;text-align:center}
.score-hints{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px}

/* venue picker */
.venue-picker{display:flex;flex-direction:column;gap:6px}
.venue-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)}
.venue-row-name{flex:1;font-size:13px}
.att-btns{display:flex;gap:4px}
.att-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;color:var(--text2)}
.att-btn.ab-love.sel{background:rgba(62,207,142,.2);border-color:var(--love);color:var(--love)}
.att-btn.ab-can.sel{background:rgba(144,144,168,.15);border-color:var(--can);color:var(--can)}
.att-btn.ab-dis.sel{background:rgba(242,85,85,.2);border-color:var(--dislike);color:var(--dislike)}

/* comments feed */
.comment-input-wrap{display:flex;gap:8px;margin-bottom:16px}
.comment-ta{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;outline:none;resize:none;min-height:70px;line-height:1.5}
.comment-ta:focus{border-color:var(--accent)}
.comment-ta::placeholder{color:var(--text3)}
.comment-list{display:flex;flex-direction:column;gap:10px}
.citem{background:var(--bg3);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.citem-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cauthor{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.cdate{font-size:11px;color:var(--text3)}
.cbody{font-size:13px;color:var(--text2);line-height:1.6}
.cdel{font-size:11px;color:var(--rank3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px}
.cdel:hover{background:rgba(242,85,85,.1)}
.deleted-msg{font-style:italic;color:var(--text3)}

/* admin panel */
.admin-section{margin-bottom:28px}
.admin-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);margin-bottom:6px}
.user-row-name{flex:1;font-size:14px;font-weight:500}
.user-row-email{font-size:12px;color:var(--text3)}
.role-badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.rb-viewer{background:rgba(144,144,168,.1);color:var(--text2);border:1px solid var(--border)}
.rb-manager{background:rgba(245,166,35,.1);color:var(--rank2);border:1px solid rgba(245,166,35,.2)}
.rb-editor{background:rgba(124,108,255,.1);color:var(--accent2);border:1px solid rgba(124,108,255,.2)}
.rb-admin{background:rgba(62,207,142,.1);color:var(--rank1);border:1px solid rgba(62,207,142,.2)}
.inactive-row{opacity:.5}

/* modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1}}
.modal-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* buttons */
.btn{padding:9px 18px;border-radius:10px;font-family:'Golos Text',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff;font-weight:600}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn-danger{background:transparent;color:var(--rank3);border:1px solid rgba(242,85,85,.3)}
.btn-danger:hover{background:rgba(242,85,85,.1)}
.btn-save-float{position:sticky;bottom:0;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Golos Text',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:24px;transition:background .15s}
.btn-save-float:hover{background:var(--accent2)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:768px){
  .header{padding:10px 14px;gap:8px}
  .nav-links{order:3;width:100%;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
  .nav-links::-webkit-scrollbar{display:none}
  .header-stats{display:none}
  .logo{font-size:16px}
  .toolbar{padding-left:12px;padding-right:12px;flex-wrap:wrap}
  .main{padding:10px 12px}
  .grid{gap:10px}
  .drawer{width:100vw;max-width:100vw}
  .drawer .field-row{grid-template-columns:1fr}
  .overlay{align-items:flex-end;padding:0}
  .modal{border-radius:18px 18px 0 0;max-height:88vh;width:100%;max-width:100%}
}

/* Team-specific */
.fbtn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'Golos Text',sans-serif}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#team-drawer #dr-photo-zone{ width:56px;height:56px; }
#team-drawer #dr-photo-zone img.dr-photo-img,
#team-drawer #dr-photo-zone .photo-av{ width:56px;height:56px; font-size:15px; }
#team-drawer .field-row.team-fr{ gap:12px; }

</style>
</head>
<body>
<div class="header">
  <div class="logo">Photo<span>HR</span></div>
  <div class="nav-links" id="nav-links"></div>
  <div class="header-stats" id="hstats"></div>
  <div class="header-right">
    <div class="user-pill" id="user-pill" onclick="openProfile()" style="cursor:pointer" title="Мой профиль"></div>
    <button class="btn btn-ghost" onclick="doLogout()" style="font-size:13px;padding:6px 12px">Выйти</button>
  </div>
</div>
<div style="border-bottom:1px solid var(--border);background:var(--bg)">
  <div style="padding:10px 28px;display:flex;align-items:center;gap:8px">
    <input class="search-in" id="q" placeholder="🔍 Поиск по имени..." oninput="render()" style="flex:1;max-width:320px"/>
    <button class="f-btn active" id="fb-all" onclick="resetTeamFilters()" style="white-space:nowrap">Все</button>
    <div style="flex:1"></div>
    <div id="team-toolbar-actions" style="display:flex;gap:8px">
      <button class="btn btn-primary" id="btn-add" style="display:none" onclick="openNewMember()">+ Член команды</button>
      <button class="btn btn-ghost" onclick="openAchievementsPanel()">🏆 Достижения</button>
      <button class="btn btn-ghost" onclick="openBirthdaysPanel()">🎂 Дни рождения</button>
      <button class="btn btn-ghost" onclick="openLikesPanel()">❤️ Лайки</button>
      <button class="btn btn-ghost" onclick="exportTeam()" title="Экспорт">↓ Экспорт</button>
      <button class="btn btn-ghost" onclick="openTeamManagement()" title="Управление">⊙ Управление</button>
    </div>
  </div>
  <div style="padding:0 28px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px">
      <span style="font-size:10px;color:var(--text3);margin-right:3px">РАНГ</span>
      <button type="button" id="fb-r1" onclick="toggleTeamFilter('rank','1',this)"
        style="border:none;background:none;padding:3px 9px;font-size:12px;border-radius:10px;cursor:pointer;transition:all .15s"
        onmouseover="rankHover(this,'1')" onmouseout="rankOut(this,'1')">
        <span style="color:#e8a060;font-weight:600">1</span><span id="rs-1" style="color:var(--border2);transition:color .15s"> ★</span>
      </button>
      <button type="button" id="fb-r2" onclick="toggleTeamFilter('rank','2',this)"
        style="border:none;background:none;padding:3px 9px;font-size:12px;border-radius:10px;cursor:pointer;transition:all .15s"
        onmouseover="rankHover(this,'2')" onmouseout="rankOut(this,'2')">
        <span style="color:#b8cce0;font-weight:600">2</span><span id="rs-2" style="color:var(--border2);transition:color .15s"> ★★</span>
      </button>
      <button type="button" id="fb-r3" onclick="toggleTeamFilter('rank','3',this)"
        style="border:none;background:none;padding:3px 9px;font-size:12px;border-radius:10px;cursor:pointer;transition:all .15s"
        onmouseover="rankHover(this,'3')" onmouseout="rankOut(this,'3')">
        <span style="color:#d4b840;font-weight:600">3</span><span id="rs-3" style="color:var(--border2);transition:color .15s"> ★★★</span>
      </button>
    </div>
    <span style="color:var(--border);user-select:none">|</span>
    <div style="display:flex;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;flex-wrap:wrap;max-width:100%">
      <span style="font-size:10px;color:var(--text3);margin-right:3px">ОТДЕЛЫ</span>
      <span id="team-dept-buttons" style="display:flex;align-items:center;gap:2px;flex-wrap:wrap"></span>
    </div>
    <span style="color:var(--border);user-select:none">|</span>
    <div style="display:flex;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px">
      <span style="font-size:10px;color:var(--text3);margin-right:3px">ПОЛ</span>
      <button type="button" id="fb-male" onclick="toggleTeamFilter('gender','male',this)"
        style="border:none;background:none;padding:3px 9px;font-size:15px;border-radius:10px;cursor:pointer;color:var(--text2);transition:all .15s"
        onmouseover="this.style.color='#6ab0e8'" onmouseout="if(teamFilters.gender!=='male')this.style.color='var(--text2)'">♂</button>
      <button type="button" id="fb-female" onclick="toggleTeamFilter('gender','female',this)"
        style="border:none;background:none;padding:3px 9px;font-size:15px;border-radius:10px;cursor:pointer;color:var(--text2);transition:all .15s"
        onmouseover="this.style.color='#e88ab0'" onmouseout="if(teamFilters.gender!=='female')this.style.color='var(--text2)'">♀</button>
    </div>
  </div>
</div>
<div class="main"><div class="grid" id="grid"><div class="empty">Загрузка…</div></div></div>

<div class="lightbox" id="lightbox" onclick="document.getElementById('lightbox').classList.remove('open')">
  <img id="lightbox-img" src="" alt=""/>
</div>

<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<div class="drawer" id="team-drawer">
  <div class="dr-head-sticky">
    <div class="drh">
      <div class="drh-left">
        <div class="photo-zone" id="dr-photo-zone" style="cursor:default">
          <div class="photo-av" id="dr-av"></div>
        </div>
        <input type="file" id="photo-input" accept="image/jpeg,image/png,image/webp,image/*" style="display:none" onchange="uploadPhoto(event)"/>
        <div>
          <div class="dr-name" id="dr-name"></div>
          <div style="font-size:12px;color:var(--text3)" id="dr-role-hint"></div>
        </div>
      </div>
      <button type="button" class="dr-close" onclick="closeDrawer()">×</button>
    </div>
    <div id="dr-earned" class="dr-earned"></div>
    <div class="dr-tabs-wrap">
      <div class="tabs" id="tabs"></div>
    </div>
  </div>
  <div class="dr-body">
    <div id="tab-content"></div>
  </div>
</div>

<div class="overlay" id="ov-new"><div class="modal" onclick="event.stopPropagation()">
  <div class="modal-title"><span>Новый член команды</span><button type="button" class="dr-close" onclick="document.getElementById('ov-new').classList.remove('open')">×</button></div>
  <div class="field"><div class="fl">Имя *</div><input class="fin" id="nm-name"/></div>
  <div class="field"><div class="fl">Должность</div><input class="fin" id="nm-pos"/></div>
  <div class="field"><div class="fl">Отдел</div><select class="fselect" id="nm-dep" style="width:100%"></select></div>
  <div class="field"><div class="fl">Телефон</div><input class="fin" id="nm-phone"/></div>
  <div class="field"><div class="fl">Email</div><input class="fin" id="nm-email" type="email"/></div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="document.getElementById('ov-new').classList.remove('open')">Отмена</button>
    <button class="btn btn-primary" onclick="createMember()">Создать</button>
  </div>
  <div id="nm-sync-footer" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);text-align:center">
    <button type="button" class="btn btn-ghost" style="font-size:11px" onclick="syncFromUsers()" title="Создать карточки из существующих пользователей-управленцев">🔄 Синхронизировать из пользователей</button>
  </div>
</div></div>

<div class="overlay" id="ov-ach"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title"><span>🏆 Выдать достижение</span><button type="button" class="dr-close" onclick="document.getElementById('ov-ach').classList.remove('open')">×</button></div>
  <div class="field"><div class="fl">Член команды</div><select class="fselect" id="ga-member" style="width:100%"></select></div>
  <div class="field"><div class="fl">Тип достижения</div><select class="fselect" id="ga-type" style="width:100%"></select></div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="document.getElementById('ov-ach').classList.remove('open')">Закрыть</button>
    <button class="btn btn-primary" onclick="grantAchievement()">Выдать</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3001/api' : 'https://fotohr-server-production.up.railway.app/api';
let accessToken = localStorage.getItem('fhr_access') || null;
let refreshToken = localStorage.getItem('fhr_refresh') || null;
let currentUser = null;
let teamList = [];
let teamFilters = { rank: null, department: null, gender: null };
let departments = (() => {
  try {
    const s = localStorage.getItem('photohr_departments');
    if (!s) return null;
    const p = JSON.parse(s);
    return Array.isArray(p) ? p : null;
  } catch { return null; }
})() || ['HR', 'Технический', 'Финансовый', 'Служба заботы', 'Управление'];
let drawerId = null;
let drawerData = null;
let editMode = false;
let tabIdx = 0;
let refreshLock = null;

const AV_COLORS = [
  { bg: '#1a2a4a', fg: '#6aa6e8' }, { bg: '#1a3028', fg: '#4ecb8a' },
  { bg: '#2e1a08', fg: '#e8a04e' }, { bg: '#2e0a1a', fg: '#e86aa6' },
  { bg: '#1a1a3a', fg: '#8a7aee' }, { bg: '#2a1a1a', fg: '#e87a6a' },
];
function avC(name) { let h = 0; for (const c of String(name || '')) h = (h * 31 + c.charCodeAt(0)) % AV_COLORS.length; return AV_COLORS[h]; }
function ini(n) { return String(n || '').split(' ').filter(Boolean).map((w) => w[0]).join('').toUpperCase().slice(0, 2); }
function calcAge(birthDate) {
  if (!birthDate) return null;
  const b = new Date(birthDate);
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  if (today.getMonth() < b.getMonth() || (today.getMonth() === b.getMonth() && today.getDate() < b.getDate())) age--;
  return age;
}
let _monthlyData = [];
const LIKES_MAX_PER_TRANSACTION = 5;
const ROLES = { photographer_user:0, aq_user:0, recruiter:1, hr_manager:1, tech_director:1, site_specialist:1, aq_manager:1, cashier:2, hr_director:2, exec_director:3, admin:4 };
const roleNow = () => currentUser?.role || 'photographer_user';
const hasAnyRole = (a) => a.includes(roleNow());
const canManageComments = () => hasAnyRole(['hr_manager', 'hr_director', 'exec_director', 'admin']);

function rankHover(btn, r) {
  btn.style.background = r === '1' ? 'rgba(184,115,51,.2)' : r === '2' ? 'rgba(138,155,176,.2)' : 'rgba(201,168,76,.2)';
  const stars = document.getElementById('rs-' + r);
  const colors = { '1': '#e8a060', '2': '#b8cce0', '3': '#d4b840' };
  if (stars) stars.style.color = colors[r];
}
function rankOut(btn, r) {
  if (teamFilters.rank !== r) {
    btn.style.background = 'none';
    const stars = document.getElementById('rs-' + r);
    if (stars) stars.style.color = 'var(--border2)';
  }
}
function applyRankActiveStyle(r) {
  const colors = { '1': 'rgba(184,115,51,.2)', '2': 'rgba(138,155,176,.2)', '3': 'rgba(201,168,76,.2)' };
  const starColors = { '1': '#e8a060', '2': '#b8cce0', '3': '#d4b840' };
  const btn = document.getElementById('fb-r' + r);
  if (btn) btn.style.background = colors[r] || 'none';
  const stars = document.getElementById('rs-' + r);
  if (stars) stars.style.color = starColors[r];
}
function clearRankStyle(r) {
  const btn = document.getElementById('fb-r' + r);
  if (btn) btn.style.background = 'none';
  const stars = document.getElementById('rs-' + r);
  if (stars) stars.style.color = 'var(--border2)';
}
function applyGenderActiveStyle(g) {
  const btn = document.getElementById('fb-' + g);
  if (btn) btn.style.color = g === 'male' ? '#6ab0e8' : '#e88ab0';
}
function clearGenderStyle(g) {
  const btn = document.getElementById('fb-' + g);
  if (btn) btn.style.color = 'var(--text2)';
}
function updateTeamAllBtn() {
  const hasFilter = teamFilters.rank || teamFilters.department || teamFilters.gender;
  const allBtn = document.getElementById('fb-all');
  if (allBtn) allBtn.classList.toggle('active', !hasFilter);
}
function resetTeamFilters() {
  if (teamFilters.rank) clearRankStyle(teamFilters.rank);
  if (teamFilters.gender) clearGenderStyle(teamFilters.gender);
  teamFilters = { rank: null, department: null, gender: null };
  ['fb-r1', 'fb-r2', 'fb-r3', 'fb-male', 'fb-female'].forEach((id) => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  document.querySelectorAll('.team-fb-dep').forEach((el) => el.classList.remove('active'));
  const fbAll = document.getElementById('fb-all');
  if (fbAll) fbAll.classList.add('active');
  const qi = document.getElementById('q');
  if (qi) qi.value = '';
  ['1', '2', '3'].forEach((r) => clearRankStyle(r));
  render();
}
function toggleTeamFilter(category, value, btn) {
  if (teamFilters[category] === value) {
    teamFilters[category] = null;
    btn.classList.remove('active');
    if (category === 'rank') clearRankStyle(value);
    if (category === 'gender') clearGenderStyle(value);
  } else {
    if (teamFilters[category]) {
      if (category === 'rank') clearRankStyle(teamFilters[category]);
      if (category === 'gender') clearGenderStyle(teamFilters[category]);
      if (category === 'department') {
        document.querySelectorAll('.team-fb-dep').forEach((el) => el.classList.remove('active'));
      }
    }
    teamFilters[category] = value;
    if (category === 'rank') {
      ['fb-r1', 'fb-r2', 'fb-r3'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('active');
      });
    }
    if (category === 'gender') {
      ['fb-male', 'fb-female'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('active');
      });
    }
    if (category === 'department') {
      document.querySelectorAll('.team-fb-dep').forEach((el) => el.classList.remove('active'));
    }
    btn.classList.add('active');
    if (category === 'rank') applyRankActiveStyle(value);
    if (category === 'gender') applyGenderActiveStyle(value);
  }
  updateTeamAllBtn();
  render();
}
const can = (r) => (ROLES[roleNow()] ?? -1) >= (ROLES[r] ?? 999);

const ROLE_LABELS = {
  admin: 'Администратор',
  exec_director: 'Исполнительный директор',
  hr_director: 'HR-директор',
  hr_manager: 'HR-менеджер',
  recruiter: 'Рекрутер',
  tech_director: 'Тех-директор',
  site_specialist: 'Специалист по сайту',
  cashier: 'Инкассация',
  photographer_user: 'Сотрудник',
  aq_user: 'Аквагримёр',
  aq_manager: 'Менеджер аквагрима',
  archived: 'Архив',
};
const ROLE_COLORS = {
  admin: '#ffd700',
  exec_director: '#f5a623',
  hr_director: '#3ecf8e',
  hr_manager: '#4ecb8a',
  recruiter: '#e86aa6',
  tech_director: '#8a7aee',
  site_specialist: '#6aa6e8',
  cashier: '#e87a6a',
  photographer_user: '#9090a8',
  aq_user: '#3ecfb4',
  aq_manager: '#5ee8d0',
  archived: '#5a5a72',
};

function openProfile() { window.location.href = 'index.html?profile=1'; }

function setupUserPill() {
  const color = ROLE_COLORS[currentUser.role] || '#9090a8';
  document.getElementById('user-pill').innerHTML =
    `<div class="role-dot" style="background:${color}"></div>
     <span>${esc(currentUser.name)}</span>
     <span style="color:var(--text3);font-size:11px">${ROLE_LABELS[currentUser.role] || currentUser.role}</span>`;
}

function setupTeamNav() {
  const nav = document.getElementById('nav-links');
  const navBtns = ['<a class="f-btn" href="index.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Фотографы</a>'];
  if (currentUser.role !== 'photographer_user' && currentUser.role !== 'aq_user') {
    navBtns.push('<a class="f-btn active" href="team.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Команда</a>');
  }
  if (hasAnyRole(['recruiter', 'hr_manager', 'hr_director', 'exec_director', 'admin'])) {
    navBtns.push('<a class="f-btn" href="recruiting.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Рекрутинг</a>');
  }
  if (hasAnyRole(['photographer_user', 'hr_manager', 'cashier', 'hr_director', 'tech_director', 'site_specialist', 'exec_director', 'admin'])) {
    navBtns.push('<a class="f-btn" href="venue.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Площадка</a>');
  }
  if (hasAnyRole(['tech_director', 'hr_director', 'exec_director', 'admin'])) {
    navBtns.push('<a class="f-btn" href="stock.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Склад</a>');
  }
  if (hasAnyRole(['hr_manager', 'hr_director', 'exec_director', 'admin', 'photographer_user'])) {
    navBtns.push('<a class="f-btn" href="calendar.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Календарь</a>');
  }
  if (hasAnyRole(['hr_manager', 'hr_director', 'exec_director', 'admin'])) {
    navBtns.push('<a class="f-btn" href="schedule.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Расписание</a>');
  }
  if (currentUser.role === 'photographer_user' && currentUser.photographer_id) {
    navBtns.push('<a class="f-btn" href="checkin.html" style="text-decoration:none;padding:5px 12px;font-size:12px">📍 Чекин</a>');
  }
  if (hasAnyRole(['aq_manager', 'hr_director', 'exec_director', 'admin', 'cashier'])) {
    navBtns.push('<span style="width:1px;height:18px;background:var(--border);margin:0 6px;align-self:center"></span>');
    navBtns.push('<a class="f-btn" href="aquagrim.html" style="text-decoration:none;padding:5px 12px;font-size:12px">Аквагрим</a>');
  }
  if (currentUser.role === 'photographer_user' && currentUser.photographer_id) {
    navBtns.push('<a class="f-btn" href="my.html" style="text-decoration:none;padding:5px 12px;font-size:12px">📷 Мой профиль</a>');
  }
  nav.innerHTML = navBtns.join('');
}

function parseAchievements(m) {
  let ach = m.achievements;
  if (ach == null) ach = [];
  else if (typeof ach === 'string') { try { ach = JSON.parse(ach); } catch { ach = []; } }
  return Array.isArray(ach) ? ach : [];
}

function updateTeamHeaderStats() {
  const q = (document.getElementById('q').value || '').trim().toLowerCase();
  const all = teamList.filter((r) => r.is_active !== false);
  const totalAll = all.length;
  let rows = all.slice();
  if (q) rows = rows.filter((r) => (r.name || '').toLowerCase().includes(q));
  if (teamFilters.rank) rows = rows.filter((r) => String(r.rank ?? '') === String(teamFilters.rank));

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>'); }
function openLightbox(url) {

function cardPhotoUrl(url) {
  if (!url) return '';
  if (/^https?:\/\//i.test(url)) return url;
  return API.replace('/api', '') + url;
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (accessToken) opts.headers['Authorization'] = 'Bearer ' + accessToken;
  if (body) opts.body = JSON.stringify(body);
  let res = await fetch(API + path, opts);
  if (res.status === 401 && refreshToken) {
    try {
      if (!refreshLock) {
        refreshLock = (async () => {
          const rr = await fetch(API + '/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken }) });
          if (!rr.ok) throw new Error('refresh_failed');
          const d = await rr.json();
          accessToken = d.accessToken; refreshToken = d.refreshToken;
          localStorage.setItem('fhr_refresh', refreshToken);
          localStorage.setItem('fhr_access', accessToken);
        })();
      }
      await refreshLock;
      opts.headers['Authorization'] = 'Bearer ' + accessToken;
      res = await fetch(API + path, opts);
    } catch { doLogout(); return null; }
    finally { refreshLock = null; }
  }
  if (!res.ok) { const e = await res.json().catch(() => ({ error: 'Ошибка' })); throw new Error(e.error || 'Ошибка'); }
  return res.json();
}

function doLogout() { localStorage.removeItem('fhr_refresh'); localStorage.removeItem('fhr_access'); location.href = 'index.html'; }
let toastTimer;
function showToast(msg, isErr = false) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.className = isErr ? 'toast show error' : 'toast show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

function isBirthdayToday(birthDate) {
  if (!birthDate) return false;
  const str = String(birthDate).slice(0, 10);
  const m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return false;
  const today = new Date();
  return Number(m[2]) === today.getMonth() + 1 && Number(m[3]) === today.getDate();
}

function rankStyle(rank) {
  const r = String(rank);
  if (r === '1') return 'background:#3d2000;color:#e8a060;border:1px solid #b87333;border-radius:6px';
  if (r === '2') return 'background:#1a2030;color:#b8cce0;border:1px solid #8a9bb0;border-radius:6px';
  if (r === '3') return 'background:#2a2000;color:#d4b840;border:1px solid #c9a84c;border-radius:6px';
  return 'background:var(--bg3);color:var(--text3);border:1px solid var(--border);border-radius:6px';
}
function rankStars(rank) {
  const r = parseInt(rank, 10) || 0;
  return r > 0 ? '★'.repeat(r) : '';
}

function buildTeamTabs() {
  const tabs = [
    { label: '📋 Информация' },
    { label: '💬 Комментарии' },
    { label: '📜 История' },
    { label: '👥 Кураторство' },
    { label: '🏆 Достижения' },
  ];
  const el = document.getElementById('tabs');
  if (!el) return;
  el.innerHTML = tabs.map((t, i) =>
    `<button type="button" class="tab ${i === tabIdx ? 'active' : ''}" onclick="switchTab(${i})">${t.label}</button>`
  ).join('');
}

function closeDrawer() {
  document.getElementById('drawer-bg').classList.remove('open');
  document.getElementById('team-drawer').classList.remove('open');
  const de = document.getElementById('dr-earned');
  if (de) de.innerHTML = '';
  drawerId = null;
  drawerData = null;
}

async function openDrawer(id) {
  drawerId = id;
  tabIdx = 0;
  editMode = can('hr_director');
  document.getElementById('drawer-bg').classList.add('open');
  document.getElementById('team-drawer').classList.add('open');
  try {
    drawerData = await api('GET', '/team/' + id);
    updateTeamDrawerPhoto(drawerData);
    await updateTeamDrawerEarned(drawerData);
    const age = calcAge(drawerData.birth_date);
    document.getElementById('dr-name').innerHTML = `<span style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700">${esc(drawerData.name)}</span>${age !== null ? ` <span style="color:var(--text3);font-size:14px;font-weight:400">${age} л</span>` : ''}`;

}

async function saveTeamCard() {
  if (!drawerId || !editMode) return;
  try {
    const rkEl = document.getElementById('edit-tm-rank');
    const rkVal = rkEl && rkEl.value !== '' ? parseInt(rkEl.value, 10) : null;
    const body = {
      name: document.getElementById('edit-tm-name').value,
      position_title: document.getElementById('edit-tm-position').value || null,
      department: document.getElementById('edit-tm-department').value || null,
      phone: document.getElementById('edit-tm-phone').value || null,
      email: document.getElementById('edit-tm-email').value || null,
      gender: document.getElementById('edit-tm-gender').value || null,
      birth_date: document.getElementById('edit-tm-birth').value || null,
      start_date: document.getElementById('edit-tm-start').value || null,
      summary: document.getElementById('edit-tm-summary').value || null,
      is_active: document.getElementById('edit-tm-active').checked,
      rank: rkVal === 1 || rkVal === 2 || rkVal === 3 ? rkVal : null,
    };
    await api('PATCH', '/team/' + drawerId, body);
    showToast('Сохранено');
    await loadTeam();
    render();
    closeDrawer();
  } catch (e) { showToast(e.message, true); }
}
async function saveDrawer() { return saveTeamCard(); }

async function postTeamComment() {
  const ta = document.getElementById('new-team-comment');
  const body = ta?.value?.trim();
  if (!body || !drawerId) return;
  try {
    await api('POST', '/team/' + drawerId + '/comments', { body, comment_type: 'general' });
    if (ta) ta.value = '';
    drawerData = await api('GET', '/team/' + drawerId);
    switchTab(1);
    showToast('Комментарий добавлен');
  } catch (e) { showToast(e.message, true); }
}

async function deleteTeamComment(cid) {
  if (!confirm('Удалить комментарий?')) return;
  try {
    await api('DELETE', '/comments/' + cid);
    drawerData = await api('GET', '/team/' + drawerId);
    switchTab(1);
  } catch (e) { showToast(e.message, true); }
}

async function uploadPhoto(event) {
  const file = event.target.files && event.target.files[0];
  if (!file || !drawerId) return;
  event.target.value = '';
  const zone = document.getElementById('dr-photo-zone');
  const loading = document.createElement('div');
  loading.className = 'photo-uploading';
  loading.textContent = '...';
  if (zone) zone.appendChild(loading);
  try {
    const formData = new FormData();
    formData.append('photo', file);
    const res = await fetch(API + '/team/' + drawerId + '/photo', { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: formData });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Ошибка загрузки');
    }
    drawerData = await api('GET', '/team/' + drawerId);
    updateTeamDrawerPhoto(drawerData);
    await updateTeamDrawerEarned(drawerData);
    const age = calcAge(drawerData.birth_date);
    document.getElementById('dr-name').innerHTML = `<span style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700">${esc(drawerData.name)}</span>${age !== null ? ` <span style="color:var(--text3);font-size:14px;font-weight:400">${age} л</span>` : ''}`;
    document.getElementById('dr-role-hint').textContent = [drawerData.position_title, drawerData.department].filter(Boolean).join(' · ') || '—';
    await loadTeam();
    if (tabIdx === 0) switchTab(0);
    showToast('Фото обновлено');
  } catch (e) {
    showToast(e.message, true);
  } finally {
    loading.remove();
  }
}

function openNewMember() {
  document.getElementById('nm-name').value = '';
  document.getElementById('nm-pos').value = '';
  document.getElementById('nm-dep').innerHTML = buildDepartmentOptionsHtml('');
  document.getElementById('nm-phone').value = '';
  document.getElementById('nm-email').value = '';
  document.getElementById('ov-new').classList.add('open');
}

async function createMember() {
  const name = document.getElementById('nm-name').value.trim();
  if (!name) { showToast('Укажите имя', true); return; }
  try {
    const row = await api('POST', '/team', {
      name,
      position_title: document.getElementById('nm-pos').value || null,
      department: document.getElementById('nm-dep').value || null,
      phone: document.getElementById('nm-phone').value || null,
      email: document.getElementById('nm-email').value || null,
    });
    document.getElementById('ov-new').classList.remove('open');
    showToast('Создано');
    await loadTeam();
    openDrawer(row.id);
  } catch (e) { showToast(e.message, true); }
}

async function syncFromUsers() {
  if (!confirm('Создать карточки команды из существующих пользователей-управленцев?')) return;
  try {
    const res = await api('POST', '/team/sync-from-users');
    showToast(`Создано ${res.created} карточек`);
    await loadTeam();
  } catch (e) { showToast(e.message, true); }
}

function exportTeam() { showToast('Экспорт в разработке'); }
function openTeamManagement() { showToast('Управление в разработке'); }

async function openAchievementsPanel() {
  if (!can('hr_director')) { showToast('Недостаточно прав', true); return; }
  let ov = document.getElementById('achievements-panel-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'achievements-panel-overlay';
    ov.className = 'overlay';
    ov.addEventListener('click', (e) => { if (e.target === ov) ov.classList.remove('open'); });
    document.body.appendChild(ov);
  }
  ov.classList.add('open');
  ov.innerHTML = '<div class="modal" style="max-width:700px;width:95vw;max-height:85vh;overflow-y:auto;padding:0" onclick="event.stopPropagation()"><div style="padding:24px;text-align:center;color:var(--text3)">Загрузка...</div></div>';

  try {
    await api('POST', '/achievements/seed-defaults').catch(() => {});
    await api('POST', '/achievements/cleanup-duplicates').catch(() => {});
    const stats = await api('GET', '/achievements/tenure-stats');
    _monthlyData = stats.monthly || [];
    const achStats = stats.achievement_stats || [];
    const recent = stats.recent || [];
    const cats = { sales: 'Продажи', discipline: 'Дисциплина', milestone: 'Стаж', social: 'Команда' };
    const grouped = {};
    achStats.forEach(a => {
      const cat = (a.code && String(a.code).startsWith('veteran_')) ? 'milestone' : (cats[a.category] ? a.category : 'other');
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(a);
    });
    if (grouped.milestone) {
      const order = ['veteran_6m', 'veteran_1y', 'veteran_3y', 'veteran_5y', 'veteran_10y', 'veteran_15y'];
      grouped.milestone.sort((a, b) => {
        const ia = order.indexOf(a.code);
        const ib = order.indexOf(b.code);
        return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
      });
    }
    const catOrder = ['sales', 'discipline', 'milestone', 'social', 'other'];
    const groupKeys = catOrder.filter(k => grouped[k] && grouped[k].length).concat(
      Object.keys(grouped).filter(k => !catOrder.includes(k) && grouped[k].length)
    );

    const resetBtn = can('admin')
      ? `<button type="button" class="btn btn-ghost" style="flex:1" onclick="runResetVeterans()">🔄 Пересчитать стаж</button>`
      : '';

    ov.innerHTML = `<div class="modal" style="max-width:700px;width:95vw;max-height:85vh;overflow-y:auto;padding:0" onclick="event.stopPropagation()">
      <div style="padding:20px 24px 16px;border-bottom:1px solid rgba(245,166,35,.15);background:linear-gradient(135deg, rgba(245,166,35,.06), transparent)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:#f5a623">🏆 Достижения</div>
          <button type="button" class="btn btn-ghost" onclick="document.getElementById('achievements-panel-overlay').classList.remove('open')" style="font-size:18px">✕</button>
        </div>
      </div>
      <div style="padding:16px 24px">
        <div style="font-size:13px;font-weight:600;color:#f5a623;margin-bottom:12px">🏆 Достижения месяца</div>
        ${(stats.monthly && stats.monthly.length) ? `
        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(100px, 1fr));gap:10px;margin-bottom:8px">
          ${stats.monthly.map((m, idx) => `
            <div style="background:linear-gradient(135deg, rgba(245,166,35,.1), rgba(245,166,35,.02));border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:transform .15s"
              onclick="toggleMonthlyRecipients(${idx})"
              onmouseenter="this.style.transform='scale(1.03)'" onmouseleave="this.style.transform='scale(1)'">
              <div style="font-size:32px;margin-bottom:6px">${esc(m.icon)}</div>
              <div style="font-size:11px;color:var(--text);font-weight:500;line-height:1.3;margin-bottom:6px">${esc(m.achievement_name)}</div>
              <div style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:#f5a623">${m.count}</div>
            </div>
          `).join('')}
        </div>
        <div id="monthly-recipients" style="margin-bottom:16px"></div>
        ` : `
        <div style="padding:16px;text-align:center;color:var(--text3);font-size:13px;background:var(--bg3);border-radius:10px;border:1px dashed rgba(245,166,35,.15);margin-bottom:20px">
          За этот месяц пока нет новых достижений
        </div>
        `}
        <div style="font-size:13px;font-weight:600;color:#f5a623;margin-bottom:10px">🎯 Статистика по типам</div>
        ${groupKeys.map(cat => `
          <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${esc(cats[cat] || cat)}</div>
            ${grouped[cat].map(a => `
              <div onclick="this.querySelector('.ach-desc').style.display=this.querySelector('.ach-desc').style.display==='block'?'none':'block'" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;cursor:pointer">
                <div style="display:flex;align-items:center;gap:10px;padding:8px 10px">
                  <span style="font-size:20px;width:28px;text-align:center">${a.icon || '🏅'}</span>
                  <span style="flex:1;font-size:13px;color:var(--text)">${esc(a.name)}</span>
                  <span style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;color:${Number(a.count) > 0 ? '#f5a623' : 'var(--text3)'}">${a.count != null ? a.count : 0}</span>
                </div>
                <div class="ach-desc" style="display:none;padding:0 10px 8px 48px;font-size:11px;color:var(--text3)">${esc(a.description || 'Нет описания')}</div>
              </div>
            `).join('')}
          </div>
        `).join('')}
        <div style="font-size:13px;font-weight:600;color:#f5a623;margin-top:16px;margin-bottom:10px">🕐 Последние выданные</div>
        <div style="max-height:200px;overflow-y:auto">
          ${recent.length ? recent.map(r => `
            <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:12px;border-bottom:1px solid var(--border)">
              <span style="font-size:16px">${r.icon || '🏅'}</span>
              <span style="flex:1;color:var(--text)">${esc(r.photographer_name)}</span>
              <span style="color:var(--text3)">${esc(r.name)}</span>
              <span style="color:var(--text3);font-size:10px">${r.earned_at ? new Date(r.earned_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: '2-digit' }) : ''}</span>
            </div>
          `).join('') : '<div style="color:var(--text3);font-size:12px;padding:8px">Пока нет выданных достижений</div>'}
        </div>
        <div style="display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
          <button type="button" class="btn btn-primary" style="background:linear-gradient(135deg, #f5a623, #d4941e);flex:1" onclick="runAutoCheck()">▶ Проверить за месяц</button>
          ${resetBtn}
        </div>
      </div>
    </div>`;
  } catch (e) {
    ov.innerHTML = `<div class="modal" style="max-width:500px;padding:24px" onclick="event.stopPropagation()"><div style="color:var(--rank3)">${esc(e.message)}</div><button type="button" class="btn btn-ghost" onclick="document.getElementById('achievements-panel-overlay').classList.remove('open')" style="margin-top:12px">Закрыть</button></div>`;
  }
}

function birthdayNavigateFromPanel(id, source) {
  const ov = document.getElementById('birthdays-panel-overlay');
  if (ov) ov.classList.remove('open');
  setTimeout(() => {
    if (source === 'team') {
      if (location.pathname.endsWith('team.html')) openDrawer(id);
      else location.href = 'team.html?open=' + encodeURIComponent(id);
    } else {
      location.href = 'index.html';
    }
  }, 200);
}

async function openBirthdaysPanel() {
  let ov = document.getElementById('birthdays-panel-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'birthdays-panel-overlay';
    ov.className = 'overlay';
    ov.addEventListener('click', (e) => { if (e.target === ov) ov.classList.remove('open'); });
    document.body.appendChild(ov);
  }
  ov.classList.add('open');
  ov.innerHTML = '<div class="modal" style="max-width:600px;width:95vw;max-height:85vh;overflow-y:auto;padding:0" onclick="event.stopPropagation()"><div style="padding:24px;text-align:center;color:var(--text3)">Загрузка...</div></div>';

  const photoSrc = (url) => {
    if (!url) return '';
    if (/^https?:\/\//i.test(url)) return url;
    return API.replace('/api', '') + url;
  };

  try {
    const data = await api('GET', '/birthdays');

    const todayStr = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

    function renderPerson(p) {
      const bdDate = p.birthday_this_year ? new Date(p.birthday_this_year).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) : '';
      const daysText = p.days_until === 0 ? 'Сегодня!'
        : p.days_until > 0 ? `через ${p.days_until} дн.`
        : `${Math.abs(p.days_until)} дн. назад`;

      return `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s"
          onclick="birthdayNavigateFromPanel('${String(p.id)}', '${p.source || 'photographer'}')"
          onmouseenter="this.style.borderColor='rgba(245,166,35,.3)'" onmouseleave="this.style.borderColor='var(--border)'">
          ${p.photo_url
            ? `<img src="${photoSrc(p.photo_url)}" alt="" style="width:40px;height:40px;border-radius:50%;object-fit:cover"/>`
            : `<div style="width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;color:var(--bg)">${esc((p.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2))}</div>`
          }
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px;color:var(--text)">${esc(p.name)}</div>
            <div style="font-size:12px;color:var(--text3)">${esc(bdDate)} · исполняется ${esc(String(p.age))} лет</div>
          </div>
          <div style="font-size:11px;color:${p.days_until === 0 ? '#f5a623' : 'var(--text3)'};font-weight:${p.days_until === 0 ? '600' : '400'}">${esc(daysText)}</div>
        </div>
      `;
    }

    function renderSection(title, icon, items, emptyText) {
      if (!items || !items.length) {
        return `<div style="margin-bottom:16px">
          <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${icon} ${esc(title)}</div>
          <div style="padding:12px;text-align:center;color:var(--text3);font-size:12px;background:var(--bg3);border-radius:8px;border:1px dashed var(--border)">${esc(emptyText)}</div>
        </div>`;
      }
      return `<div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${icon} ${esc(title)}</div>
        ${items.map(renderPerson).join('')}
      </div>`;
    }

    ov.innerHTML = `<div class="modal" style="max-width:600px;width:95vw;max-height:85vh;overflow-y:auto;padding:0" onclick="event.stopPropagation()">

      <div style="padding:20px 24px 16px;border-bottom:1px solid rgba(245,166,35,.15);background:linear-gradient(135deg, rgba(245,166,35,.06), transparent)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:#f5a623">🎂 Дни рождения</div>
          <button type="button" class="btn btn-ghost" onclick="document.getElementById('birthdays-panel-overlay').classList.remove('open')" style="font-size:18px">✕</button>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(todayStr)}</div>
      </div>

      <div style="padding:16px 24px">

        ${data.today && data.today.length ? `
        <div style="margin-bottom:20px;padding:16px;background:linear-gradient(135deg, rgba(245,166,35,.12), rgba(245,166,35,.03));border:2px solid rgba(245,166,35,.3);border-radius:14px">
          <div style="font-size:14px;font-weight:700;color:#f5a623;margin-bottom:10px">🎉 Сегодня день рождения!</div>
          ${data.today.map(p => `
            <div style="display:flex;align-items:center;gap:14px;padding:8px 0;transition:transform .15s;cursor:pointer"
              onclick="birthdayNavigateFromPanel('${String(p.id)}', '${p.source || 'photographer'}')"
              onmouseenter="this.style.transform='scale(1.02)'" onmouseleave="this.style.transform='scale(1)'">
              ${p.photo_url
                ? `<img src="${photoSrc(p.photo_url)}" alt="" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #f5a623"/>`
                : `<div style="width:48px;height:48px;border-radius:50%;background:#f5a623;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;color:var(--bg)">${esc((p.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2))}</div>`
              }
              <div>
                <div style="font-weight:700;font-size:16px;color:var(--text)">${esc(p.name)}</div>
                <div style="font-size:13px;color:#f5a623">🎂 Исполняется ${esc(String(p.age))} лет!</div>
              </div>
            </div>
          `).join('')}
        </div>

        ${renderSection('Прошлая неделя', '⏪', data.last_week || [], 'Не было')}
        ${renderSection('Следующая неделя', '⏩', data.next_week || [], 'Нет предстоящих')}

      </div>
    </div>`;

  } catch (e) {
    ov.innerHTML = `<div class="modal" style="max-width:500px;padding:24px" onclick="event.stopPropagation()"><div style="color:var(--rank3)">${esc(e.message)}</div><button type="button" class="btn btn-ghost" onclick="document.getElementById('birthdays-panel-overlay').classList.remove('open')" style="margin-top:12px">Закрыть</button></div>`;
  }
}

function toggleMonthlyRecipients(idx) {
  const container = document.getElementById('monthly-recipients');
  if (!container) return;
  const m = _monthlyData[idx];
  if (!m) return;

  if (container.dataset.openIdx === String(idx)) {
    container.innerHTML = '';
    container.dataset.openIdx = '';
    return;
  }

  container.dataset.openIdx = String(idx);
  const recipients = m.recipients || [];

  container.innerHTML = `
    <div style="background:var(--bg3);border:1px solid rgba(245,166,35,.15);border-radius:10px;padding:12px;margin-top:8px">
      <div style="font-size:12px;font-weight:600;color:#f5a623;margin-bottom:8px">${esc(m.icon)} ${esc(m.achievement_name)} — ${recipients.length} чел.</div>
      ${recipients.map(r => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid var(--border);font-size:13px">
          <span style="color:var(--text)">${esc(r.name || '—')}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--text3)">${r.earned_at ? new Date(r.earned_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) : ''}</span>
            ${r.id != null && r.id !== '' ? `<button type="button" class="btn btn-ghost" style="font-size:10px;padding:2px 8px" onclick="document.getElementById('achievements-panel-overlay').classList.remove('open'); setTimeout(() => openFromMonthlyRecipient('${r.id}'), 200)">Карточка →</button>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function openFromMonthlyRecipient(id) {
  api('GET', '/team/' + id).then(() => {
    if (location.pathname.endsWith('team.html')) openDrawer(id);
    else location.href = 'team.html?open=' + encodeURIComponent(id);
  }).catch(() => { location.href = 'index.html'; });
}

let _selectedLikeAmount = 1;
let _selectedLikeCategory = 'general';

function selectLikeAmount(n) {
  _selectedLikeAmount = n;
  document.querySelectorAll('[id^="like-amt-"]').forEach(el => {
    el.style.background = '';
    el.style.color = '';
    el.style.borderColor = '';
  });
  const el = document.getElementById('like-amt-' + n);
  if (el) {
    el.style.background = 'rgba(229,62,62,.15)';
    el.style.color = '#e53e3e';
    el.style.borderColor = 'rgba(229,62,62,.3)';
  }
}

function selectLikeCategory(cat) {
  _selectedLikeCategory = cat;
  document.querySelectorAll('[id^="like-cat-"]').forEach(el => {
    el.style.background = '';
    el.style.color = '';
    el.style.borderColor = '';
  });
  const el = document.getElementById('like-cat-' + cat);
  if (el) {
    el.style.background = 'rgba(229,62,62,.1)';
    el.style.color = '#e53e3e';
    el.style.borderColor = 'rgba(229,62,62,.2)';
  }
}

async function sendLike(toId) {
  try {
    const comment = document.getElementById('like-comment')?.value.trim() || null;
    await api('POST', '/peer-likes', {
      to_id: toId,
      amount: _selectedLikeAmount,
      category: _selectedLikeCategory,
      comment,
    });
    document.getElementById('like-modal-overlay')?.classList.remove('open');
    showToast(`❤️ Отправлено ${_selectedLikeAmount} лайк(ов)!`);
    _selectedLikeAmount = 1;
    _selectedLikeCategory = 'general';
    if (drawerId && String(drawerId) === String(toId)) {
      try {
        drawerData = await api('GET', '/team/' + drawerId);
        await updateTeamDrawerEarned(drawerData);
      } catch (e) { /* ignore */ }
    }
  } catch (e) {
    showToast(e.message, true);
  }
}

async function openSendLikeModal(toId, toName) {
  let budget;
  try {
    budget = await api('GET', '/peer-likes/my-budget');
  } catch (e) {
    showToast('Не удалось загрузить бюджет лайков', true);
    return;
  }

  if (budget.remaining <= 0) {
    showToast('У вас не осталось лайков в этом месяце (0/' + budget.total + ')', true);
    return;
  }

  const alreadyToThis = (budget.by_person || []).find(p => String(p.to_id) === String(toId));
  const remainingForPerson = budget.max_per_person - (alreadyToThis ? parseInt(alreadyToThis.total, 10) : 0);

  if (remainingForPerson <= 0) {
    showToast(`Этому коллеге уже отдано максимум (${budget.max_per_person}) лайков`, true);
    return;
  }

  const maxAmount = Math.min(budget.remaining, remainingForPerson, LIKES_MAX_PER_TRANSACTION || 5);

  let ov = document.getElementById('like-modal-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'like-modal-overlay';
    ov.className = 'overlay';
    document.body.appendChild(ov);
  }
  ov.classList.add('open');

  const CATS = {
    help: '💪 Помощь',
    professional: '⭐ Профессионализм',
    positive: '😊 Позитив',
    result: '🎯 Результат',
    congrats: '🎂 Поздравление',
    general: '❤️ Общее',
  };

  ov.innerHTML = `<div class="modal" style="max-width:420px;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;color:#e53e3e">❤️ Отправить лайк</div>
      <button class="btn btn-ghost" onclick="document.getElementById('like-modal-overlay').classList.remove('open')" style="font-size:16px">✕</button>
    </div>

    <div style="font-size:14px;margin-bottom:16px">Кому: <b>${esc(toName)}</b></div>

    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">
      Ваш баланс: <span style="color:#e53e3e;font-weight:600">${budget.remaining}</span> из ${budget.total} лайков
      ${alreadyToThis ? ` · Этому коллеге: ${alreadyToThis.total}/${budget.max_per_person}` : ''}
    </div>

    <div style="margin-bottom:14px">
      <div class="fl" style="margin-bottom:6px">Сколько ❤️</div>
      <div style="display:flex;gap:8px" id="like-amount-btns">
        ${[1,2,3,4,5].filter(n => n <= maxAmount).map(n => `
          <button class="btn btn-ghost" style="flex:1;font-size:16px;padding:8px;${n===1?'background:rgba(229,62,62,.15);color:#e53e3e;border-color:rgba(229,62,62,.3)':''}"
            onclick="selectLikeAmount(${n})" id="like-amt-${n}">
            ${'❤️'.repeat(n)}
          </button>
        `).join('')}
      </div>
    </div>

    <div style="margin-bottom:14px">
      <div class="fl" style="margin-bottom:6px">За что?</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${Object.entries(CATS).map(([k, v]) => `
          <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px;${k==='general'?'background:rgba(229,62,62,.1);color:#e53e3e;border-color:rgba(229,62,62,.2)':''}"
            onclick="selectLikeCategory('${k}')" id="like-cat-${k}">${v}</button>
        `).join('')}
      </div>
    </div>

    <div style="margin-bottom:16px">
      <div class="fl" style="margin-bottom:6px">Комментарий (необязательно)</div>
      <input class="fin" id="like-comment" placeholder="Спасибо за..." style="width:100%"/>
    </div>

    <button class="btn btn-primary" style="width:100%;background:linear-gradient(135deg, #e53e3e, #f5a623);font-size:14px"
      onclick="sendLike('${String(toId).replace(/'/g, "\\'")}')">Отправить ❤️</button>
  </div>`;
}

async function openLikesPanel() {
  let ov = document.getElementById('likes-panel-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'likes-panel-overlay';
    ov.className = 'overlay';
    ov.addEventListener('click', (e) => { if (e.target === ov) ov.classList.remove('open'); });
    document.body.appendChild(ov);
  }
  ov.classList.add('open');
  ov.innerHTML = '<div class="modal" style="max-width:600px;width:95vw;max-height:85vh;overflow-y:auto;padding:0"><div style="padding:24px;text-align:center;color:var(--text3)">Загрузка...</div></div>';

  try {
    const photoSrc = (url) => {
      if (!url) return '';
      if (/^https?:\/\//i.test(url)) return url;
      return API.replace('/api', '') + url;
    };

    const [topData, budget] = await Promise.all([
      api('GET', '/peer-likes/top').catch(() => ({ month: '', top: [] })),
      api('GET', '/peer-likes/my-budget').catch(() => null),
    ]);

    ov.innerHTML = `<div class="modal" style="max-width:600px;width:95vw;max-height:85vh;overflow-y:auto;padding:0">

      <div style="padding:20px 24px 16px;border-bottom:1px solid rgba(229,62,62,.15);background:linear-gradient(135deg, rgba(229,62,62,.06), transparent)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:#e53e3e">❤️ Любимцы народа</div>
          <button class="btn btn-ghost" onclick="document.getElementById('likes-panel-overlay').classList.remove('open')" style="font-size:18px">✕</button>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(topData.month || '')}</div>
      </div>

      <div style="padding:16px 24px">

        ${budget ? `
        <div style="margin-bottom:16px;padding:12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)">
          <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Ваш баланс лайков</div>
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-family:'Unbounded',sans-serif;font-size:24px;font-weight:700;color:#e53e3e">${esc(String(budget.remaining))}</div>
            <div style="font-size:12px;color:var(--text3)">из ${esc(String(budget.total))} осталось в этом месяце</div>
          </div>
          ${budget.by_person && budget.by_person.length ? `
          <div style="font-size:11px;color:var(--text3);margin-top:8px">
            Отдано: ${budget.by_person.map(p => esc(p.to_name) + ' (' + p.total + ')').join(', ')}
          </div>` : ''}
        </div>` : ''}

        <div style="font-size:13px;font-weight:600;color:#e53e3e;margin-bottom:12px">🏆 Топ за ${esc(topData.month || 'месяц')}</div>

        ${topData.top && topData.top.length ? topData.top.map((p, idx) => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:${idx < 3 ? 'linear-gradient(135deg, rgba(229,62,62,.08), transparent)' : 'var(--bg3)'};border:1px solid ${idx < 3 ? 'rgba(229,62,62,.15)' : 'var(--border)'};border-radius:10px;margin-bottom:6px;cursor:pointer"
            onclick="likesTopNavigateToId('${String(p.to_id)}')">
            <div style="font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;color:${idx === 0 ? '#f5a623' : idx === 1 ? '#c0c0c0' : idx === 2 ? '#cd7f32' : 'var(--text3)'};width:28px;text-align:center">#${p.position}</div>
            ${p.photo_url
              ? `<img src="${photoSrc(p.photo_url)}" style="width:40px;height:40px;border-radius:50%;object-fit:cover"/>`
              : `<div style="width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--bg)">${esc((p.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2))}</div>`
            }
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${esc(p.name)}</div>
              <div style="font-size:11px;color:var(--text3)">${esc(String(p.unique_fans))} фанат(ов)</div>
            </div>
            <div style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:#e53e3e">${esc(String(p.total_likes))} ❤️</div>
          </div>
        `).join('') : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;background:var(--bg3);border-radius:10px;border:1px dashed rgba(229,62,62,.15)">Пока никто не получал лайков в этом месяце</div>'}

      </div>
    </div>`;

  } catch (e) {
    ov.innerHTML = `<div class="modal" style="max-width:500px;padding:24px"><div style="color:var(--rank3)">${esc(e.message)}</div><button class="btn btn-ghost" onclick="document.getElementById('likes-panel-overlay').classList.remove('open')" style="margin-top:12px">Закрыть</button></div>`;
  }
}

function likesTopNavigateToId(id) {
  document.getElementById('likes-panel-overlay').classList.remove('open');
  setTimeout(() => {
    api('GET', '/team/' + id).then(() => openDrawer(id)).catch(() => { location.href = 'index.html'; });
  }, 200);
}

async function runAutoCheck() {
  const month = prompt('Месяц (YYYY-MM, пусто = текущий):', new Date().toISOString().slice(0, 7));
  if (month === null) return;
  const m = month.trim();
  try {
    const body = m ? { month: m } : {};
    const res = await api('POST', '/achievements/auto-check', body);
    if (!res) return;
    let msg = `Проверка за ${esc(String(res.period || '?'))}:\nВыдано: ${Number(res.total_awarded) || 0}`;
    if (res.results && res.results.length) {
      msg += '\n\n' + res.results.map(r => `${esc(String(r.icon || ''))} ${esc(String(r.achievement || ''))}: ${Number(r.awarded) || 0}`).join('\n');
    }
    alert(msg);
    openAchievementsPanel();
  } catch (e) {
    showToast(e.message, true);
  }
}

async function runResetVeterans() {
  if (!confirm('Удалить все veteran-достижения и перевыдать с правильными датами?\n\nЭто безопасно — после нужно нажать «Проверить за месяц».')) return;
  try {
    const res = await api('POST', '/achievements/reset-veterans');
    showToast(`Удалено ${res.deleted} записей. Теперь нажмите «Проверить за месяц».`);
    openAchievementsPanel();
  } catch (e) {
    showToast(e.message, true);
  }
}

async function grantAchievement() {
  const achievement_type_id = document.getElementById('ga-type').value;
  const photographer_id = document.getElementById('ga-member').value;
  try {
    await api('POST', '/achievements', { photographer_id, achievement_type_id });
    showToast('Достижение выдано');
    document.getElementById('ov-ach').classList.remove('open');
    await loadTeam();
    if (drawerId === photographer_id) { drawerData = await api('GET', '/team/' + drawerId); await updateTeamDrawerEarned(drawerData); switchTab(4); }
  } catch (e) { showToast(e.message, true); }
}

function openGrantAch() {
  if (!drawerId || !can('hr_director')) return;
  document.getElementById('ga-member').innerHTML = `<option value="${drawerId}">${esc(drawerData.name)}</option>`;
  api('GET', '/achievement-types').then((types) => {
    const allow = new Set(['milestone', 'social']);
    const sel = document.getElementById('ga-type');
    sel.innerHTML = types.filter((t) => allow.has(t.category)).map((t) => `<option value="${t.id}">${esc(t.icon || '')} ${esc(t.name)}</option>`).join('');
    document.getElementById('ov-ach').classList.add('open');
  }).catch((e) => showToast(e.message, true));
}

(async function init() {
  if (!accessToken && !refreshToken) { location.href = 'index.html'; return; }
  try {
    currentUser = await api('GET', '/auth/me');
    if (currentUser.role === 'photographer_user' || currentUser.role === 'aq_user') { location.href = 'index.html'; return; }
    setupUserPill();
    setupTeamNav();

    if (hasAnyRole(['exec_director', 'admin'])) document.getElementById('btn-add').style.display = 'inline-block';
    if (currentUser.role === 'admin') document.getElementById('nm-sync-footer').style.display = 'block';

    await loadTeam();
    const params = new URLSearchParams(location.search);
    const op = params.get('open');
    if (op) openDrawer(op);
  } catch (e) {
    showToast(e.message, true);
    document.getElementById('grid').innerHTML = '<div class="empty">' + esc(e.message) + '</div>';
  }
})();
</script>
</body>
