<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PhotoHR — Команда</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--card-h:#1f1f2a;
  --border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --accent:#f5a623;--accent2:#ffc14d;
  --rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
.header{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600}.logo span{color:var(--accent2)}
.nav-links{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.nav-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Golos Text',sans-serif;transition:all .15s}
.nav-btn:hover{color:var(--text)}.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#1a0a00}
.user-pill{padding:5px 10px;border-radius:16px;background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;margin-left:auto}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;font-family:'Golos Text',sans-serif}
.toolbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:10px;border:none;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#1a0a00}.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.search-in{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;outline:none;width:200px}
.search-in:focus{border-color:var(--accent)}
.fselect{padding:6px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer}
.main{padding:24px 28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.empty{text-align:center;padding:60px;color:var(--text3);grid-column:1/-1}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all .18s}
.card:hover:not(.birthday-card){background:var(--card-h);border-color:var(--border2);transform:translateY(-2px)}
.card.birthday-card:hover{background:var(--card-h);transform:translateY(-2px)}
@keyframes birthday-glow{
  0%{border-color:#f5a623;box-shadow:0 0 8px rgba(245,166,35,.2)}
  25%{border-color:#ff6b9d;box-shadow:0 0 12px rgba(255,107,157,.15)}
  50%{border-color:#c084fc;box-shadow:0 0 8px rgba(192,132,252,.15)}
  75%{border-color:#67e8f9;box-shadow:0 0 12px rgba(103,232,249,.15)}
  100%{border-color:#f5a623;box-shadow:0 0 8px rgba(245,166,35,.2)}
}
.birthday-card{animation:birthday-glow 4s ease-in-out infinite;border-width:2px;border-style:solid;position:relative}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;flex-shrink:0;border:2px solid rgba(245,166,35,.35)}
.av img{width:52px;height:52px;border-radius:50%;object-fit:cover}
.cn{font-weight:600;font-size:14px;color:var(--text)}
.cd{font-size:11px;color:var(--text3);margin-top:2px}
.pos-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(245,166,35,.15);color:#f5a623;border:1px solid rgba(245,166,35,.2)}
.sum{font-size:12px;color:var(--text2);line-height:1.45;margin-top:10px;max-height:3.2em;overflow:hidden}
.ach-icons{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;font-size:16px}
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;backdrop-filter:blur(3px)}
.drawer-bg.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:100%;max-width:560px;background:var(--bg2);border-left:1px solid var(--border2);z-index:101;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;height:100%;max-height:100dvh}
.drawer.open{transform:translateX(0)}
.drh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg2)}
.drh-left{display:flex;align-items:center;gap:12px}
.dr-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;color:#f5a623}
.dr-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin:0 22px 12px;flex-shrink:0}
.tab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer}
.tab.active{background:var(--card);color:#f5a623}
.dr-body{flex:1;overflow-y:auto;padding:0 22px 22px}
.field{margin-bottom:12px}
.fl{font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.fv{font-size:14px}
.fin{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px}
.comment-ta{width:100%;min-height:72px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;resize:vertical;font-family:'Golos Text',sans-serif}
.citem{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.cauthor{font-size:12px;font-weight:600;color:#f5a623}
.cbody{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5}
.audit-row{font-size:12px;padding:8px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.ach-cell{border-radius:10px;padding:10px;border:1px solid var(--border);text-align:center;font-size:12px}
.ach-cell.locked{opacity:.45}
.ach-cell .ic{font-size:22px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-h{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;color:#f5a623;margin-bottom:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:12px;z-index:500}
.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
.photo-zone{position:relative;width:48px;height:48px;border-radius:50%;cursor:pointer}
.photo-zone img{width:48px;height:48px;border-radius:50%;object-fit:cover}
.photo-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:9px;color:#fff;text-align:center;padding:4px}
.photo-zone:hover .photo-overlay{opacity:1}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="index.html">Photo<span style="color:#f5a623">HR</span></a>
  <div class="nav-links">
    <a class="nav-btn" href="index.html">Фотографы</a>
    <a class="nav-btn active" href="team.html" id="nav-team">Команда</a>
    <a class="nav-btn" href="recruiting.html" id="nav-recruiting">Рекрутинг</a>
    <a class="nav-btn" href="venue.html">Площадка</a>
    <a class="nav-btn" href="stock.html">Склад</a>
    <a class="nav-btn" href="calendar.html">Календарь</a>
    <span id="nav-aquagrim-sep" style="width:1px;height:18px;background:var(--border);margin:0 6px;align-self:center"></span>
    <a class="nav-btn" href="aquagrim.html" id="nav-aquagrim">Аквагрим</a>
  </div>
  <div class="user-pill" id="user-pill"></div>
  <button class="logout-btn" onclick="doLogout()">Выйти</button>
</div>
<div class="toolbar">
  <input class="search-in" id="q" placeholder="Поиск по имени…" oninput="render()"/>
  <select class="fselect" id="dept" onchange="render()"><option value="">Все отделы</option></select>
  <span style="flex:1"></span>
  <button class="btn btn-ghost" id="btn-add" style="display:none" onclick="openNewMember()">+ Член команды</button>
  <button class="btn btn-ghost" onclick="openAchPanel()">🏆 Достижения</button>
  <button class="btn btn-ghost" onclick="openBirthdaysPanel()">🎂 Дни рождения</button>
  <button class="btn btn-ghost" onclick="openLikesPanel()">❤️ Лайки</button>
</div>
<div class="main"><div class="grid" id="grid"><div class="empty">Загрузка…</div></div></div>

<div class="drawer-bg" id="dr-bg" onclick="if(event.target===this)closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drh">
    <div class="drh-left">
      <div class="photo-zone" id="dz-head" style="display:none" onclick="document.getElementById('ph-file').click()"><img alt=""/><div class="photo-overlay">Фото</div></div>
      <div><div class="dr-title" id="dr-name"></div><div style="font-size:12px;color:var(--text3)" id="dr-sub"></div></div>
    </div>
    <button class="dr-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-i="0" onclick="setTab(0)">Информация</button>
    <button class="tab" data-i="1" onclick="setTab(1)">Комментарии</button>
    <button class="tab" data-i="2" onclick="setTab(2)">История</button>
    <button class="tab" data-i="3" onclick="setTab(3)">Достижения</button>
  </div>
  <div class="dr-body" id="dr-body"></div>
  <div style="padding:12px 22px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-primary" id="btn-like" onclick="sendLikeDrawer()">❤️ Лайк</button>
    <button class="btn btn-ghost" id="btn-save" style="display:none" onclick="saveDrawer()">Сохранить</button>
  </div>
</div>
<input type="file" id="ph-file" accept="image/*" style="display:none" onchange="uploadPhoto(this.files[0])"/>

<div class="overlay" id="ov-new"><div class="modal" onclick="event.stopPropagation()">
  <div class="modal-h">Новый член команды</div>
  <div class="field"><div class="fl">Имя *</div><input class="fin" id="nm-name"/></div>
  <div class="field"><div class="fl">Должность</div><input class="fin" id="nm-pos"/></div>
  <div class="field"><div class="fl">Отдел</div><input class="fin" id="nm-dep"/></div>
  <div class="field"><div class="fl">Телефон</div><input class="fin" id="nm-phone"/></div>
  <div class="field"><div class="fl">Email</div><input class="fin" id="nm-email" type="email"/></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
    <button class="btn btn-ghost" onclick="document.getElementById('ov-new').classList.remove('open')">Отмена</button>
    <button class="btn btn-primary" onclick="createMember()">Создать</button>
  </div>
</div></div>

<div class="overlay" id="ov-ach"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h">🏆 Выдать достижение</div>
  <div class="field"><div class="fl">Член команды</div><select class="fselect" id="ga-member" style="width:100%"></select></div>
  <div class="field"><div class="fl">Тип достижения</div><select class="fselect" id="ga-type" style="width:100%"></select></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
    <button class="btn btn-ghost" onclick="document.getElementById('ov-ach').classList.remove('open')">Закрыть</button>
    <button class="btn btn-primary" onclick="grantAchievement()">Выдать</button>
  </div>
</div></div>

<div class="overlay" id="ov-like"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h">❤️ Отправить лайк</div>
  <div class="field"><div class="fl">Количество (1–5)</div><input class="fin" type="number" id="lk-amt" min="1" max="5" value="1"/></div>
  <div class="field"><div class="fl">Категория</div><select class="fselect" id="lk-cat" style="width:100%"></select></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
    <button class="btn btn-ghost" onclick="document.getElementById('ov-like').classList.remove('open')">Отмена</button>
    <button class="btn btn-primary" onclick="confirmSendLike()">Отправить</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3001/api' : 'https://fotohr-server-production.up.railway.app/api';
let accessToken = localStorage.getItem('fhr_access') || null;
let refreshToken = localStorage.getItem('fhr_refresh') || null;
let currentUser = null;
let teamList = [];
let drawerId = null;
let drawerData = null;
let editMode = false;
let tabIdx = 0;
let refreshLock = null;
let likeTargetId = null;

const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const LIKE_CATS = ['help','professional','positive','result','congrats','general'];
const ROLES = { photographer_user:0, aq_user:0, recruiter:1, hr_manager:1, tech_director:1, site_specialist:1, aq_manager:1, cashier:2, hr_director:2, exec_director:3, admin:4 };
const roleNow = () => currentUser?.role || 'photographer_user';
const hasAnyRole = (a) => a.includes(roleNow());
const can = (r) => (ROLES[roleNow()] ?? -1) >= (ROLES[r] ?? 999);

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (accessToken) opts.headers['Authorization'] = 'Bearer ' + accessToken;
  if (body) opts.body = JSON.stringify(body);
  let res = await fetch(API + path, opts);
  if (res.status === 401 && refreshToken) {
    try {
      if (!refreshLock) {
        refreshLock = (async () => {
          const rr = await fetch(API + '/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken }) });
          if (!rr.ok) throw new Error('refresh_failed');
          const d = await rr.json();
          accessToken = d.accessToken; refreshToken = d.refreshToken;
          localStorage.setItem('fhr_refresh', refreshToken);
          localStorage.setItem('fhr_access', accessToken);
        })();
      }
      await refreshLock;
      opts.headers['Authorization'] = 'Bearer ' + accessToken;
      res = await fetch(API + path, opts);
    } catch { doLogout(); return null; }
    finally { refreshLock = null; }
  }
  if (!res.ok) { const e = await res.json().catch(() => ({ error: 'Ошибка' })); throw new Error(e.error || 'Ошибка'); }
  return res.json();
}

function doLogout() { localStorage.removeItem('fhr_refresh'); localStorage.removeItem('fhr_access'); location.href = 'index.html'; }
function showToast(msg, err) { const t = document.getElementById('toast'); t.textContent = msg; t.className = err ? 'toast error' : 'toast'; setTimeout(() => { t.className = 'toast'; }, 2600); }

function photoSrc(url) {
  if (!url) return '';
  if (/^https?:\/\//i.test(url)) return url;
  return API.replace('/api', '') + url;
}

function ageFromBirth(bd) {
  if (!bd) return '—';
  const d = new Date(bd);
  const t = new Date();
  let a = t.getFullYear() - d.getFullYear();
  const m = t.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < d.getDate())) a--;
  return a;
}

function isBirthdayToday(bd) {
  if (!bd) return false;
  const d = new Date(bd);
  const t = new Date();
  return d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function render() {
  const q = (document.getElementById('q').value || '').trim().toLowerCase();
  const dep = document.getElementById('dept').value;
  let rows = teamList.slice();
  if (q) rows = rows.filter((r) => (r.name || '').toLowerCase().includes(q));
  if (dep) rows = rows.filter((r) => (r.department || '') === dep);
  const g = document.getElementById('grid');
  if (!rows.length) { g.innerHTML = '<div class="empty">Никого не найдено</div>'; return; }
  g.innerHTML = rows.map((m) => {
    const bd = m.birth_date;
    const bdStr = bd ? `${new Date(bd).getDate()} ${MONTHS[new Date(bd).getMonth()]}` : '';
    let ach = m.achievements;
    if (ach == null) ach = [];
    else if (typeof ach === 'string') { try { ach = JSON.parse(ach); } catch { ach = []; } }
    if (!Array.isArray(ach)) ach = [];
    const ini = (m.name || '?').split(/\s+/).map((w) => w[0]).join('').slice(0, 2).toUpperCase();
    const bcls = isBirthdayToday(bd) ? ' card birthday-card' : ' card';
    return `<div class="${bcls.trim()}" onclick="openDrawer('${m.id}')">
      <div class="ch">
        <div style="display:flex;gap:12px;align-items:flex-start">
          ${m.photo_url ? `<div class="av"><img src="${photoSrc(m.photo_url)}" alt=""/></div>` : `<div class="av" style="background:rgba(245,166,35,.12)">${esc(ini)}</div>`}
          <div>
            <div class="cn">${esc(m.name)}</div>
            <div class="cd">${ageFromBirth(bd) !== '—' ? esc(String(ageFromBirth(bd))) + ' лет' : ''}</div>
            ${m.position_title ? `<div style="margin-top:8px"><span class="pos-badge">${esc(m.position_title)}</span></div>` : ''}
            ${bdStr ? `<div class="cd" style="margin-top:6px">🎂 ${esc(bdStr)}</div>` : ''}
          </div>
        </div>
      </div>
      ${ach && ach.length ? `<div class="ach-icons">${ach.slice(0, 8).map((a) => `<span title="${esc(a.name || '')}">${esc(a.icon || '⭐')}</span>`).join('')}</div>` : ''}
      ${m.summary ? `<div class="sum">${esc(m.summary)}</div>` : ''}
    </div>`;
  }).join('');
}

async function loadTeam() {
  teamList = await api('GET', '/team');
  const deps = [...new Set(teamList.map((t) => t.department).filter(Boolean))].sort();
  document.getElementById('dept').innerHTML = '<option value="">Все отделы</option>' + deps.map((d) => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
  render();
}

function closeDrawer() {
  document.getElementById('dr-bg').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  drawerId = null;
  drawerData = null;
}

async function openDrawer(id) {
  drawerId = id;
  editMode = can('hr_director');
  document.getElementById('dr-bg').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('btn-save').style.display = editMode ? 'inline-block' : 'none';
  const canPh = hasAnyRole(['hr_director', 'exec_director', 'admin']);
  document.getElementById('dz-head').style.display = canPh ? 'block' : 'none';
  try {
    drawerData = await api('GET', '/team/' + id);
    document.getElementById('dr-name').textContent = drawerData.name || '';
    document.getElementById('dr-sub').textContent = drawerData.position_title || '';
    const img = document.querySelector('#dz-head img');
    if (drawerData.photo_url) { img.src = photoSrc(drawerData.photo_url); img.style.display = 'block'; } else { img.src = ''; img.style.display = 'none'; }
    setTab(tabIdx);
  } catch (e) { showToast(e.message, true); }
}

function setTab(i) {
  tabIdx = i;
  document.querySelectorAll('#tabs .tab').forEach((t, j) => t.classList.toggle('active', j === i));
  if (!drawerData) return;
  const body = document.getElementById('dr-body');
  if (i === 0) {
    if (editMode) {
      body.innerHTML = `
        <div class="field"><div class="fl">Имя</div><input class="fin" id="ed-name" value="${esc(drawerData.name)}"/></div>
        <div class="field"><div class="fl">Должность</div><input class="fin" id="ed-pos" value="${esc(drawerData.position_title || '')}"/></div>
        <div class="field"><div class="fl">Отдел</div><input class="fin" id="ed-dep" value="${esc(drawerData.department || '')}"/></div>
        <div class="field"><div class="fl">Телефон</div><input class="fin" id="ed-phone" value="${esc(drawerData.phone || '')}"/></div>
        <div class="field"><div class="fl">Email</div><input class="fin" id="ed-email" value="${esc(drawerData.email || '')}"/></div>
        <div class="field"><div class="fl">Пол</div><input class="fin" id="ed-gender" value="${esc(drawerData.gender || '')}"/></div>
        <div class="field"><div class="fl">Дата рождения</div><input class="fin" id="ed-bd" type="date" value="${drawerData.birth_date ? String(drawerData.birth_date).slice(0, 10) : ''}"/></div>
        <div class="field"><div class="fl">Начало сотрудничества</div><input class="fin" id="ed-sd" type="date" value="${drawerData.start_date ? String(drawerData.start_date).slice(0, 10) : ''}"/></div>
        <div class="field"><div class="fl">О себе</div><textarea class="comment-ta" id="ed-sum">${esc(drawerData.summary || '')}</textarea></div>
        <label style="font-size:13px;color:var(--text2)"><input type="checkbox" id="ed-active" ${drawerData.is_active !== false ? 'checked' : ''}/> Активен</label>`;
    } else {
      body.innerHTML = `
        <div class="field"><div class="fl">Имя</div><div class="fv">${esc(drawerData.name)}</div></div>
        <div class="field"><div class="fl">Должность</div><div class="fv">${esc(drawerData.position_title || '—')}</div></div>
        <div class="field"><div class="fl">Отдел</div><div class="fv">${esc(drawerData.department || '—')}</div></div>
        <div class="field"><div class="fl">Телефон</div><div class="fv">${esc(drawerData.phone || '—')}</div></div>
        <div class="field"><div class="fl">Email</div><div class="fv">${esc(drawerData.email || '—')}</div></div>
        <div class="field"><div class="fl">Пол</div><div class="fv">${esc(drawerData.gender || '—')}</div></div>
        <div class="field"><div class="fl">Дата рождения</div><div class="fv">${drawerData.birth_date ? esc(String(drawerData.birth_date).slice(0, 10)) : '—'}</div></div>
        <div class="field"><div class="fl">Начало сотрудничества</div><div class="fv">${drawerData.start_date ? esc(String(drawerData.start_date).slice(0, 10)) : '—'}</div></div>
        <div class="field"><div class="fl">О себе</div><div class="fv" style="white-space:pre-wrap">${esc(drawerData.summary || '—')}</div></div>`;
    }
  } else if (i === 1) {
    body.innerHTML = `<div class="field"><textarea class="comment-ta" id="com-new" placeholder="Новый комментарий…"></textarea></div>
      <button class="btn btn-primary" onclick="postComment()">Отправить</button>
      <div style="margin-top:16px">${(drawerData.comments || []).map((c) => `<div class="citem"><div class="cauthor">${esc(c.author_name)} · ${esc(String(c.created_at).slice(0, 16))}</div><div class="cbody">${esc(c.body)}</div></div>`).join('') || '<div style="color:var(--text3);font-size:13px">Нет комментариев</div>'}</div>`;
  } else if (i === 2) {
    body.innerHTML = '<div style="color:var(--text3)">Загрузка…</div>';
    api('GET', '/team/' + drawerId + '/audit').then((rows) => {
      body.innerHTML = rows.length ? rows.map((r) => `<div class="audit-row"><b>${esc(r.action)}</b> ${esc(r.field || '')} · ${esc(String(r.created_at).slice(0, 19))}<br/><span style="color:var(--text3)">${esc(r.old_value || '—')} → ${esc(r.new_value || '—')}</span></div>`).join('') : '<div style="color:var(--text3)">Пусто</div>';
    }).catch(() => { body.innerHTML = '<div style="color:var(--rank3)">Нет доступа к истории</div>'; });
  } else if (i === 3) {
    api('GET', '/achievement-types').then((types) => {
      const allow = new Set(['milestone', 'social']);
      const filtered = types.filter((t) => allow.has(t.category));
      const earned = drawerData.achievements || [];
      body.innerHTML = `
        <div class="ach-grid">${filtered.map((t) => {
          const ok = earned.some((e) => e.code === t.code);
          return `<div class="ach-cell ${ok ? '' : 'locked'}"><div class="ic">${esc(t.icon || '⭐')}</div><div>${esc(t.name)}</div></div>`;
        }).join('')}</div>
        ${can('hr_director') ? `<div style="margin-top:14px"><button class="btn btn-primary" onclick="openGrantAch()">Выдать достижение</button></div>` : ''}`;
    }).catch((e) => { body.innerHTML = '<div style="color:var(--rank3)">' + esc(e.message) + '</div>'; });
  }
}

async function saveDrawer() {
  if (!drawerId || !editMode) return;
  try {
    const body = {
      name: document.getElementById('ed-name').value,
      position_title: document.getElementById('ed-pos').value || null,
      department: document.getElementById('ed-dep').value || null,
      phone: document.getElementById('ed-phone').value || null,
      email: document.getElementById('ed-email').value || null,
      gender: document.getElementById('ed-gender').value || null,
      birth_date: document.getElementById('ed-bd').value || null,
      start_date: document.getElementById('ed-sd').value || null,
      summary: document.getElementById('ed-sum').value || null,
      is_active: document.getElementById('ed-active').checked,
    };
    await api('PATCH', '/team/' + drawerId, body);
    showToast('Сохранено');
    await loadTeam();
    drawerData = await api('GET', '/team/' + drawerId);
    setTab(0);
  } catch (e) { showToast(e.message, true); }
}

async function postComment() {
  const body = document.getElementById('com-new').value.trim();
  if (!body || !drawerId) return;
  try {
    await api('POST', '/team/' + drawerId + '/comments', { body, comment_type: 'general' });
    drawerData = await api('GET', '/team/' + drawerId);
    setTab(1);
    showToast('Комментарий добавлен');
  } catch (e) { showToast(e.message, true); }
}

async function uploadPhoto(file) {
  if (!file || !drawerId) return;
  const fd = new FormData();
  fd.append('photo', file);
  const res = await fetch(API + '/team/' + drawerId + '/photo', { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: fd });
  if (!res.ok) { const e = await res.json().catch(() => ({})); showToast(e.error || 'Ошибка загрузки', true); return; }
  showToast('Фото обновлено');
  await loadTeam();
  drawerData = await api('GET', '/team/' + drawerId);
  const img = document.querySelector('#dz-head img');
  if (drawerData.photo_url) { img.src = photoSrc(drawerData.photo_url); img.style.display = 'block'; }
}

function openNewMember() {
  document.getElementById('nm-name').value = '';
  document.getElementById('nm-pos').value = '';
  document.getElementById('nm-dep').value = '';
  document.getElementById('nm-phone').value = '';
  document.getElementById('nm-email').value = '';
  document.getElementById('ov-new').classList.add('open');
}

async function createMember() {
  const name = document.getElementById('nm-name').value.trim();
  if (!name) { showToast('Укажите имя', true); return; }
  try {
    const row = await api('POST', '/team', {
      name,
      position_title: document.getElementById('nm-pos').value || null,
      department: document.getElementById('nm-dep').value || null,
      phone: document.getElementById('nm-phone').value || null,
      email: document.getElementById('nm-email').value || null,
    });
    document.getElementById('ov-new').classList.remove('open');
    showToast('Создано');
    await loadTeam();
    openDrawer(row.id);
  } catch (e) { showToast(e.message, true); }
}

async function openAchPanel() {
  if (!can('hr_director')) { showToast('Недостаточно прав', true); return; }
  const types = await api('GET', '/achievement-types');
  const allow = new Set(['milestone', 'social']);
  const sel = document.getElementById('ga-type');
  sel.innerHTML = types.filter((t) => allow.has(t.category)).map((t) => `<option value="${t.id}">${esc(t.icon || '')} ${esc(t.name)}</option>`).join('');
  const sm = document.getElementById('ga-member');
  sm.innerHTML = teamList.map((m) => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
  document.getElementById('ov-ach').classList.add('open');
}

async function grantAchievement() {
  const achievement_type_id = document.getElementById('ga-type').value;
  const photographer_id = document.getElementById('ga-member').value;
  try {
    await api('POST', '/achievements', { photographer_id, achievement_type_id });
    showToast('Достижение выдано');
    document.getElementById('ov-ach').classList.remove('open');
    await loadTeam();
    if (drawerId === photographer_id) { drawerData = await api('GET', '/team/' + drawerId); setTab(3); }
  } catch (e) { showToast(e.message, true); }
}

function openGrantAch() {
  if (!drawerId || !can('hr_director')) return;
  document.getElementById('ga-member').innerHTML = `<option value="${drawerId}">${esc(drawerData.name)}</option>`;
  api('GET', '/achievement-types').then((types) => {
    const allow = new Set(['milestone', 'social']);
    const sel = document.getElementById('ga-type');
    sel.innerHTML = types.filter((t) => allow.has(t.category)).map((t) => `<option value="${t.id}">${esc(t.icon || '')} ${esc(t.name)}</option>`).join('');
    document.getElementById('ov-ach').classList.add('open');
  }).catch((e) => showToast(e.message, true));
}

async function openBirthdaysPanel() {
  try {
    const data = await api('GET', '/birthdays');
    const all = [...(data.today || []), ...(data.this_week || []), ...(data.next_week || []), ...(data.last_week || [])];
    const teamLines = all.filter((p) => p.source === 'team');
    const phLines = all.filter((p) => p.source !== 'team');
    const lines = (a) => a.map((p) => `${esc(p.name)} — ${esc(String(p.age))} лет (${p.source === 'team' ? 'команда' : 'фотографы'})`).join('\n');
    alert('🎂 Дни рождения\n\nСегодня и рядом:\n' + (lines(all) || 'Нет данных'));
  } catch (e) { showToast(e.message, true); }
}

async function openLikesPanel() {
  try {
    const topData = await api('GET', '/peer-likes/top');
    const budget = await api('GET', '/peer-likes/my-budget').catch(() => null);
    let msg = '❤️ Топ за ' + (topData.month || '') + '\n\n';
    if (topData.top && topData.top.length) msg += topData.top.map((p, i) => (i + 1) + '. ' + p.name + ' — ' + p.total_likes + ' ❤️').join('\n');
    else msg += 'Пока пусто';
    if (budget) msg += '\n\nОсталось лайков: ' + budget.remaining + ' / ' + budget.total;
    alert(msg);
  } catch (e) { showToast(e.message, true); }
}

function sendLikeDrawer() {
  if (!drawerId) return;
  likeTargetId = drawerId;
  document.getElementById('lk-amt').value = '1';
  const s = document.getElementById('lk-cat');
  s.innerHTML = LIKE_CATS.map((c) => `<option value="${c}">${c}</option>`).join('');
  document.getElementById('ov-like').classList.add('open');
}

async function confirmSendLike() {
  if (!likeTargetId) return;
  try {
    await api('POST', '/peer-likes', {
      to_id: likeTargetId,
      amount: parseInt(document.getElementById('lk-amt').value, 10) || 1,
      category: document.getElementById('lk-cat').value || 'general',
    });
    document.getElementById('ov-like').classList.remove('open');
    showToast('Лайк отправлен');
  } catch (e) { showToast(e.message, true); }
}

(async function init() {
  if (!accessToken && !refreshToken) { location.href = 'index.html'; return; }
  try {
    currentUser = await api('GET', '/auth/me');
    if (currentUser.role === 'photographer_user' || currentUser.role === 'aq_user') { location.href = 'index.html'; return; }
    document.getElementById('user-pill').innerHTML = '<span>' + esc(currentUser.name) + '</span>';
    const aqAllowed = ['aq_manager', 'hr_director', 'exec_director', 'admin', 'cashier'].includes(currentUser.role);
    const aqBtn = document.getElementById('nav-aquagrim');
    const aqSep = document.getElementById('nav-aquagrim-sep');
    if (aqBtn) aqBtn.style.display = aqAllowed ? '' : 'none';
    if (aqSep) aqSep.style.display = aqAllowed ? '' : 'none';
    const rec = document.getElementById('nav-recruiting');
    if (rec) rec.style.display = hasAnyRole(['recruiter', 'hr_manager', 'hr_director', 'exec_director', 'admin']) ? '' : 'none';

    if (hasAnyRole(['exec_director', 'admin'])) document.getElementById('btn-add').style.display = 'inline-block';

    await loadTeam();
    const params = new URLSearchParams(location.search);
    const op = params.get('open');
    if (op) openDrawer(op);
  } catch (e) {
    showToast(e.message, true);
    document.getElementById('grid').innerHTML = '<div class="empty">' + esc(e.message) + '</div>';
  }
})();
</script>
</body>
</html>
