<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>PhotoHR — Мой профиль</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--card-h:#1f1f2a;--border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6cff;--accent2:#9b8dff;--rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
.header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-right:8px}.logo span{color:var(--accent2)}
.header-stats{display:flex;gap:16px;flex:1}
.stat{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.user-pill{padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%}
.nav-links{display:flex;gap:6px;margin-left:12px}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-btn:hover{color:var(--text)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.main{max-width:900px;margin:0 auto;padding:20px 24px}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
.section-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.btn{padding:7px 16px;border-radius:10px;border:none;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.toolbar-unified .btn.btn-ghost{padding:6px 14px;border-radius:20px;font-size:12px}

/* Profile hero */
.profile-hero{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.profile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:24px;font-weight:600;border:3px solid var(--accent)}
.profile-avatar img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.profile-info{flex:1;min-width:200px}
.profile-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;margin-bottom:4px}
.profile-meta{font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-value{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Achievement badges */
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.ach-badge{padding:6px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:4px}
.ach-badge .icon{font-size:16px}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:4px}
.lb-row.me{background:rgba(124,108,255,.1);border:1px solid rgba(124,108,255,.3)}
.lb-pos{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;width:28px;text-align:center}
.lb-name{flex:1;font-size:13px}.lb-value{font-size:13px;font-weight:600;color:var(--accent2)}

/* Payroll */
.pay-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.pay-row:last-child{border-bottom:none}
.pay-amount{font-weight:600}
.pay-positive{color:var(--rank1)}.pay-negative{color:var(--rank3)}
.supp-type{padding:2px 6px;border-radius:4px;font-size:10px;background:rgba(144,144,168,.1);color:var(--text2)}

/* Peer review */
.review-item{padding:8px;background:var(--bg3);border-radius:8px;margin-bottom:6px}
.review-stars{color:#f5a623;font-size:16px}
.review-text{font-size:12px;margin-top:2px;color:var(--text2)}
.review-from{font-size:11px;color:var(--text3);margin-top:2px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
.avail-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
.avail-head{font-size:11px;color:var(--text3);text-align:center}
.avail-day{border:1px solid var(--border);background:var(--bg3);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font-size:12px;min-height:56px;display:flex;flex-direction:column;justify-content:center;gap:3px}
.avail-day .num{font-family:'Unbounded',sans-serif;font-size:12px}
.avail-day .lbl{font-size:10px;color:var(--text3)}
.avail-day.s-full{background:rgba(62,207,142,.16);border-color:rgba(62,207,142,.45)}
.avail-day.s-unavailable{background:rgba(242,85,85,.13);border-color:rgba(242,85,85,.4)}
.avail-day.s-maybe{background:rgba(245,166,35,.16);border-color:rgba(245,166,35,.4)}
.avail-day.s-morning{background:rgba(78,166,232,.17);border-color:rgba(78,166,232,.4)}
.avail-day.s-evening{background:rgba(155,141,255,.18);border-color:rgba(155,141,255,.45)}
.avail-day.sel{outline:2px solid var(--accent2)}
.avail-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-top:10px}
.avail-dot{display:inline-flex;align-items:center;gap:5px}
.avail-dot i{width:10px;height:10px;border-radius:3px;display:inline-block}
.day-menu{position:fixed;z-index:700;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.day-menu .opt{display:block;width:100%;text-align:left;background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;cursor:pointer;font-size:12px;margin-bottom:6px}
.day-menu .opt:last-of-type{margin-bottom:0}
.day-menu .row{display:flex;gap:6px;align-items:center;margin-top:8px}
.day-menu input[type="time"]{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 6px}
.premium-note{font-size:12px;color:var(--text2);margin-bottom:8px}
/* My schedule grid */
.my-sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.my-sched-head{font-size:10px;color:var(--text3);text-align:center;padding:4px;text-transform:uppercase;font-weight:600}
.my-sched-day{background:var(--bg3);border:1px solid var(--border);border-radius:8px;min-height:72px;padding:6px;font-size:11px}
.my-sched-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.my-sched-day.past{opacity:.5}
.my-sched-day .num{font-weight:600;margin-bottom:3px}
.my-sched-day .venue{font-size:10px;color:var(--accent2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-sched-day .times{font-size:9px;color:var(--text2);margin-top:2px}
.my-sched-day .crew{font-size:9px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-sched-day.off{background:var(--bg2)}
.my-sched-day .avail-only-lbl{font-size:9px;color:var(--text2);margin-top:4px;line-height:1.25}
.my-sched-legend{margin-top:10px;font-size:10px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.my-sched-legend .lg-sq{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
.my-sched-day .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px}
.my-sched-day .status-confirmed{background:var(--rank1)}
.my-sched-day .status-pending{background:var(--rank2)}
.loading{text-align:center;padding:40px;color:var(--text3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:400}
.overlay.open{display:flex}
.modal{width:min(560px,92vw);background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px}
.tabs-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.admin-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;display:none;padding:0}
.admin-iframe{width:960px;max-width:96vw;height:90vh;border:none;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
@media(max-width:768px){
  .my-sched-grid{grid-template-columns:repeat(7,1fr);gap:3px}
  .my-sched-day{min-height:56px;padding:4px;font-size:10px}
  .header{padding:10px 14px;gap:8px}
  .nav-links{order:3;width:100%;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
  .nav-links::-webkit-scrollbar{display:none}
  .header-stats{display:none}
  .logo{font-size:16px}
  .toolbar-unified{padding-left:12px;padding-right:12px;flex-wrap:wrap}
  .main{padding:12px}
  .profile-hero{flex-direction:column;text-align:center}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  /* ── my.html mobile v2 ── */
  .profile-hero{flex-direction:column;text-align:center;gap:12px}
  .profile-avatar{width:64px;height:64px}
  .profile-avatar img{width:64px;height:64px}
  .profile-name{font-size:16px}
  .profile-meta{justify-content:center;font-size:11px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:10px}
  .stat-value{font-size:16px}
  .stat-label{font-size:9px}
  .my-sched-grid{gap:3px}
  .my-sched-day{min-height:52px;padding:4px;font-size:9px}
  .my-sched-day .num{font-size:11px}
  .my-sched-day .venue{font-size:9px}
  .my-sched-day .times{font-size:8px}
  .my-sched-day .crew{font-size:8px}
  .my-sched-legend{font-size:9px;gap:8px}
  .avail-grid{gap:3px}
  .avail-day{min-height:48px;padding:4px;font-size:10px}
  .avail-day .num{font-size:11px}
  .avail-day .lbl{font-size:8px}
  .avail-legend{font-size:10px;gap:6px}
  .day-menu{width:min(280px,90vw);left:50%!important;transform:translateX(-50%);bottom:20px;top:auto!important}
  .badge-row{gap:6px}
  .ach-badge{padding:4px 8px;font-size:11px}
  .lb-row{padding:6px 8px;gap:6px}
  .lb-pos{font-size:12px;width:24px}
  .lb-name{font-size:12px}
  .lb-value{font-size:12px}
  .pay-row{font-size:12px;padding:6px 0}
  .section{padding:12px;margin-bottom:12px;border-radius:10px}
  .section-title{font-size:12px;margin-bottom:8px}
  .toolbar-unified{padding:8px 12px!important;gap:6px!important}
  .toolbar-unified .btn{font-size:11px;padding:5px 10px}
  .modal{width:min(400px,94vw);border-radius:18px 18px 0 0;max-height:88vh}
  .overlay{align-items:flex-end;padding:0}
  .tabs-row{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
  .tabs-row::-webkit-scrollbar{display:none}
  .admin-iframe{width:100vw!important;max-width:100vw!important;height:100vh!important;border-radius:0!important}
  .admin-overlay{padding:0!important;align-items:stretch!important}
  /* Safe area для iPhone с notch */
  .header{padding-top:max(10px, env(safe-area-inset-top))}
  .toast{bottom:max(20px, env(safe-area-inset-bottom))}
  body{padding-bottom:env(safe-area-inset-bottom)}
}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="logo" style="text-decoration:none;color:inherit">Photo<span>HR</span></a>
  <div class="nav-links" id="nav-links"></div>
  <div class="header-stats" id="hstats"></div>
  <div class="header-right">
    <button class="btn btn-ghost" id="btn-management" style="display:none;font-size:13px;padding:6px 12px" onclick="openAdmin()">⚙ Управление</button>
    <div class="user-pill" id="user-pill" onclick="openProfile()" style="cursor:pointer" title="Мой профиль"></div>
    <button class="btn btn-ghost" onclick="doLogout()" style="font-size:13px;padding:6px 12px">Выйти</button>
  </div>
</div>
<div class="toolbar-unified" style="padding:10px 28px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center">
  <a href="shift.html" id="btn-toolbar-shift" class="btn btn-primary" style="display:none;font-size:13px;padding:6px 14px;text-decoration:none">📸 Смена</a>
  <button class="btn btn-ghost" onclick="openContestsPanel()">📷 Конкурсы</button>
</div>
<div class="main" id="main"><div class="loading">Загрузка...</div></div>
<div class="overlay" id="decline-modal" onclick="if(event.target===this)closeDeclineModal()">
  <div class="modal">
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">Отклонение смены</div>
    <div id="decline-shift-meta" style="font-size:12px;color:var(--text2);margin-bottom:10px">—</div>
    <div style="font-size:12px;margin-bottom:6px">Причина:</div>
    <label style="display:block;font-size:12px;margin-bottom:4px"><input type="radio" name="decline-reason" value="Занят в этот день" checked> Занят в этот день</label>
    <label style="display:block;font-size:12px;margin-bottom:4px"><input type="radio" name="decline-reason" value="Не могу работать на этой площадке"> Не могу работать на этой площадке</label>
    <label style="display:block;font-size:12px;margin-bottom:4px"><input type="radio" name="decline-reason" value="Проблемы со здоровьем"> Проблемы со здоровьем</label>
    <label style="display:block;font-size:12px;margin-bottom:8px"><input type="radio" name="decline-reason" value="Другое"> Другое</label>
    <div style="font-size:12px;margin-bottom:6px">Комментарий:</div>
    <textarea id="decline-comment" class="fin" style="width:100%;min-height:70px"></textarea>
    <div style="margin-top:10px;display:flex;justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeDeclineModal()">Отменить</button>
      <button class="btn btn-primary" onclick="submitDeclineResponse()">Отклонить смену</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = window.location.hostname==='localhost'?'http://localhost:3001/api':'https://fotohr-server-production.up.railway.app/api';
let accessToken=localStorage.getItem('fhr_access')||null;
let refreshToken=localStorage.getItem('fhr_refresh')||null;
let currentUser=null;
let mgmtNavHasAccess=false;
let refreshLock=null;
let myTab=0;
let declineState={assignmentId:null};

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(accessToken)opts.headers['Authorization']=`Bearer ${accessToken}`;
  if(body)opts.body=JSON.stringify(body);
  let res=await fetch(API+path,opts);
  if(res.status===401&&refreshToken){
    try{
      if(!refreshLock){
        refreshLock=(async()=>{
          const rr=await fetch(API+'/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken})});
          if(!rr.ok)throw new Error('refresh_failed');
          const d=await rr.json();
          accessToken=d.accessToken;refreshToken=d.refreshToken;
          localStorage.setItem('fhr_refresh',refreshToken);
          localStorage.setItem('fhr_access',accessToken);
        })();
      }
      await refreshLock;
      opts.headers['Authorization']=`Bearer ${accessToken}`;
      res=await fetch(API+path,opts);
    }catch{doLogout();return null;}
    finally{refreshLock=null;}
  }
  if(!res.ok){const err=await res.json().catch(()=>({error:'Ошибка'}));throw new Error(err.error||'Ошибка');}
  return res.json();
}
function doLogout(){localStorage.removeItem('fhr_refresh');localStorage.removeItem('fhr_access');window.location.href='index.html';}
function showToast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');setTimeout(()=>t.className='toast',2500);}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function parseDateLocal(v){const s=String(v||'').slice(0,10);const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(!m)return null;return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]),12,0,0);}
function fmtDate(v){const d=parseDateLocal(v);if(!d)return'—';return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});}
function fmtTime(v){const s=String(v||'');if(!s)return'—';return s.slice(0,5);}
async function respondAssignment(assignmentId,response){
  console.log('[respondAssignment] response=', response, 'assignmentId=', assignmentId, 'type=', typeof assignmentId, 'raw=', JSON.stringify(assignmentId));
  if(!assignmentId||String(assignmentId)==='undefined'){ showToast('Ошибка: assignment_id не определён',true); return; }
  try{
    await api('PATCH',`/shift-assignments/${assignmentId}/respond`,{response});
    showToast(response==='accept'?'Смена подтверждена':'Смена отклонена');
    await loadSchedulePanel(availEditor.photographerId||currentUser?.photographer_id);
  }catch(e){ showToast(e.message,true); }
}
const respondUpcomingShift=respondAssignment;
function openDeclineModal(assignmentId, eventDate, venueName){
  console.log('[openDeclineModal] assignmentId=', assignmentId, 'type=', typeof assignmentId, 'eventDate=', eventDate, 'venue=', venueName);
  declineState.assignmentId=assignmentId;
  document.getElementById('decline-shift-meta').textContent=`Смена: ${fmtDate(eventDate)}, ${venueName||'—'}`;
  document.getElementById('decline-comment').value='';
  document.querySelectorAll('input[name="decline-reason"]').forEach((el,i)=>{el.checked=i===0;});
  document.getElementById('decline-modal').classList.add('open');
}
function closeDeclineModal(){
  document.getElementById('decline-modal').classList.remove('open');
  declineState.assignmentId=null;
}
async function submitDeclineResponse(){
  const assignmentId=declineState.assignmentId;
  console.log('[submitDeclineResponse] assignmentId=', assignmentId, 'type=', typeof assignmentId, 'declineState=', JSON.stringify(declineState));
  if(!assignmentId||String(assignmentId)==='undefined'){ showToast('Ошибка: assignment_id не определён',true); return; }
  const reasonEl=document.querySelector('input[name="decline-reason"]:checked');
  const decline_reason=reasonEl?.value||null;
  const decline_comment=(document.getElementById('decline-comment')?.value||'').trim()||null;
  try{
    await api('PATCH',`/shift-assignments/${assignmentId}/respond`,{response:'decline',decline_reason,decline_comment});
    closeDeclineModal();
    showToast('Смена отклонена');
    await loadSchedulePanel(availEditor.photographerId||currentUser?.photographer_id);
  }catch(e){ showToast(e.message,true); }
}

const ROLE_LABELS={admin:'Администратор',super_admin:'Суперадмин',exec_director:'Исполнительный директор',hr_director:'HR-директор',hr_manager:'HR-менеджер',recruiter:'Рекрутер',tech_director:'Тех-директор',site_specialist:'Специалист по сайту',cashier:'Инкассация',photographer_user:'Сотрудник',aq_user:'Аквагримёр',aq_manager:'Менеджер аквагрима',archived:'Архив'};
const ROLE_COLORS={admin:'#ffd700',super_admin:'#c084fc',exec_director:'#f5a623',hr_director:'#3ecf8e',hr_manager:'#4ecb8a',recruiter:'#e86aa6',tech_director:'#8a7aee',site_specialist:'#6aa6e8',cashier:'#e87a6a',photographer_user:'#9090a8',aq_user:'#3ecfb4',aq_manager:'#5ee8d0',archived:'#5a5a72'};

function contestPanelFullUrl(u) {
  if (!u) return '';
  const p = String(u).trim();
  if (/^https?:\/\//i.test(p)) return p;
  const base = API.replace(/\/api\/?$/, '');
  return base + (p.startsWith('/') ? p : '/' + p);
}
function contestPanelZoomFromCard(card) {
  const im = card && card.querySelector('img');
  if (!im || !im.src) return;
  let lb = document.getElementById('contest-panel-lightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'contest-panel-lightbox';
    lb.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999;display:none;align-items:center;justify-content:center';
    lb.onclick = () => { lb.style.display = 'none'; };
    const img = document.createElement('img');
    img.style.cssText = 'max-width:95%;max-height:90vh;object-fit:contain;border-radius:8px';
    img.onclick = (ev) => ev.stopPropagation();
    lb.appendChild(img);
    document.body.appendChild(lb);
  }
  lb.querySelector('img').src = im.src;

async function contestPanelVote(entryId, weight) {
  try {
    await api('POST', `/contest-entries/${entryId}/vote`, { weight });
    openContestsPanel();
  } catch (e) { showToast(e.message, true); }
}
async function contestPanelRemoveVote(entryId) {
  try {
    await api('DELETE', `/contest-entries/${entryId}/vote`);
    openContestsPanel();
  } catch (e) { showToast(e.message, true); }
}
async function contestPanelDeleteEntry(entryId) {
  if (!confirm('Удалить это фото с конкурса?')) return;
  try {
    await api('DELETE', `/contest-entries/${entryId}`);
    showToast('Фото удалено');
    openContestsPanel();
  } catch (e) { showToast(e.message, true); }
}
async function contestPanelBlock(photographerId, eventId) {
  const reason = prompt('Причина блокировки (необязательно):');
  if (reason === null) return;
  try {
    await api('POST', '/contest/block-photographer', { photographer_id: photographerId, event_id: eventId || null, reason: reason || null });
    showToast('Фотограф заблокирован в конкурсе');
    openContestsPanel();
  } catch (e) { showToast(e.message, true); }
}

        const d = e.entry_date ? new Date(e.entry_date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'}) : '—';
        const typeLabels = { sale:'Продажи', bonus:'Бонус', penalty:'Штраф', adjustment:'Корректировка', premium:'Премия', mentor_bonus:'Наставничество', shift_pay:'Смена', daily_bonus:'Дневной бонус', monthly_premium:'Мес. премия' };
        const isNeg = e.entry_type === 'penalty';
        return `<div class="pay-row">
          <span>${d} · ${esc(e.venue_name||'—')} · <span class="supp-type">${esc(typeLabels[e.entry_type]||e.entry_type)}</span></span>

async function loadPayrollBreakdown(phId){
  try{
    const data=await api('GET',`/my/payroll-details?month=${financeMonth}`);
    const wrap=document.getElementById('payroll-breakdown'); if(!wrap)return;
    if(!data.days||!data.days.length){wrap.innerHTML='';return;}
    const EL={salary_per_item:'💼 ЗП',shift_bonus:'🎯 Бонус',bonus_cash_payout:'💵 Нал.',advance:'📤 Аванс',adjustment:'✏️ Корр.',monthly_premium:'⭐ Премия',bonus:'🏆 Бонус',shift_pay:'Смена',daily_bonus:'Дн. бонус',admin_salary:'Админ',admin_bonus:'Бон. адм.',manager_salary:'Менедж.',manager_bonus:'Бон. мен.'};
    let html='<div style="font-size:13px;font-weight:600;margin:14px 0 8px">📊 Детализация по дням</div>';
    for(const day of data.days){
      const dl=new Date(day.date+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',weekday:'short'});
      const dt=Math.round(day.total*100)/100; const c=dt>=0?'var(--rank1)':'var(--rank3)';
      html+=`<div style="background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer" onclick="this.querySelector('.pd-d').style.display=this.querySelector('.pd-d').style.display==='none'?'block':'none'">
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:600">${esc(dl)}</span><span style="font-size:13px;font-weight:600;color:${c}">${dt>=0?'+':''}${dt.toLocaleString('ru-RU')}₽</span></div>
        <div class="pd-d" style="display:none;margin-top:6px;border-top:1px solid var(--border);padding-top:6px">`;
      for(const e of day.entries){const a=parseFloat(e.amount)||0;const ec=a>=0?'var(--rank1)':'var(--rank3)';
        html+=`<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0"><span>${EL[e.entry_type]||e.entry_type}${e.venue_short?' · '+esc(e.venue_short):''}</span><span style="color:${ec}">${a>=0?'+':''}${a.toLocaleString('ru-RU')}₽</span></div>`;}
      html+='</div></div>';
    }
    if(data.by_type&&Object.keys(data.by_type).length){
      html+='<div style="margin-top:12px;padding:10px;background:var(--bg2);border-radius:8px"><div style="font-size:12px;font-weight:600;margin-bottom:6px">Итого по типам:</div>';
      for(const[type,amount]of Object.entries(data.by_type)){const c2=amount>=0?'var(--rank1)':'var(--rank3)';
        html+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span>${EL[type]||type}</span><span style="color:${c2};font-weight:600">${amount>=0?'+':''}${Number(amount).toLocaleString('ru-RU')}₽</span></div>`;}
      html+='</div>';
    }
    wrap.innerHTML=html;
  }catch(e){console.warn('payroll breakdown:',e.message);}
}

function changeFinMonth(delta) {
  const [y, m] = financeMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  financeMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if (currentUser?.photographer_id) loadFinancePanel(currentUser.photographer_id);
}

const AV_LABELS={available_full:'Свободен весь день',unavailable:'Занят',day_off:'Под вопросом',available_morning:'Свободен утром',available_evening:'Свободен вечером'};
let availEditor={period:null,entries:{},payScheme:'standard',submitted:false,photographerId:null,selectedDate:null};
let myPeriods=[];
let mySelectedPeriodId=null;

function buildDateRange(from,to){
  const s=parseDateLocal(from),e=parseDateLocal(to); if(!s||!e||s>e) return [];
  const out=[]; for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){ out.push(new Date(d).toISOString().slice(0,10)); }
  return out;
}
function availClass(st){
  if(st==='available_full') return 's-full';
  if(st==='unavailable') return 's-unavailable';
  if(st==='day_off') return 's-maybe';
  if(st==='available_morning') return 's-morning';
  if(st==='available_evening') return 's-evening';
  return '';
}
function isPremiumSchedule(){ return availEditor.payScheme==='premium'; }
function closeDayMenu(){ const m=document.getElementById('day-menu'); if(m) m.style.display='none'; availEditor.selectedDate=null; }
function setAvailabilityStatus(date,status){
  const cur=availEditor.entries[date]||{};
  availEditor.entries[date]={...cur,status};
  if(status!=='available_morning'&&status!=='available_evening'){ delete availEditor.entries[date].available_from; delete availEditor.entries[date].available_to; }
  closeDayMenu(); renderAvailabilityEditor();
}
function openDayMenu(date,ev){
  if(isPremiumSchedule()) return togglePremiumDay(date);
  availEditor.selectedDate=date;
  const cur=availEditor.entries[date]||{};
  const m=document.getElementById('day-menu'); if(!m) return;
  m.style.display='block';
  m.style.left=Math.min((ev.clientX||120)+8, window.innerWidth-240)+'px';
  m.style.top=Math.min((ev.clientY||120)+8, window.innerHeight-240)+'px';
  const tf=document.getElementById('dm-from'),tt=document.getElementById('dm-to');
  if(tf) tf.value=cur.available_from||'09:00';
  if(tt) tt.value=cur.available_to||'14:00';
}
function applyDayTime(){
  const date=availEditor.selectedDate; if(!date) return;
  const cur=availEditor.entries[date]||{};
  const from=document.getElementById('dm-from')?.value||null;
  const to=document.getElementById('dm-to')?.value||null;
  if(!(cur.status==='available_morning'||cur.status==='available_evening')) return;
  availEditor.entries[date]={...cur,available_from:from,available_to:to};
  closeDayMenu(); renderAvailabilityEditor();
}
function togglePremiumDay(date){
  const dayOff=Object.entries(availEditor.entries).filter(([,v])=>v.status==='day_off').map(([d])=>d);
  const cur=availEditor.entries[date]?.status;
  if(cur==='day_off'){ availEditor.entries[date]={status:'available_full'}; renderAvailabilityEditor(); return; }
  if(dayOff.length>=2){ showToast('Можно выбрать только 2 выходных', true); return; }
  availEditor.entries[date]={status:'day_off'}; renderAvailabilityEditor();
}
function renderAvailabilityEditor(){
  const wrap=document.getElementById('avail-editor'); if(!wrap||!availEditor.period) return;
  const days=buildDateRange(availEditor.period.period_start, availEditor.period.period_end);
  const first=parseDateLocal(days[0]); const pad=first?((first.getDay()+6)%7):0;
  let h='<div class="avail-grid">'+['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="avail-head">${d}</div>`).join('');

      <div style="margin-top:8px;text-align:right"><button class="btn btn-ghost" style="padding:4px 8px" onclick="closeDayMenu()">Закрыть</button></div>

}
async function submitAvailabilityFlow(){
  if(!availEditor.period) return;
  const note=(document.getElementById('avail-note')?.value||'').trim()||null;
  const days=buildDateRange(availEditor.period.period_start, availEditor.period.period_end);
  try{
    if(isPremiumSchedule()){
      const dayOff=days.filter(d=>availEditor.entries[d]?.status==='day_off');
      if(dayOff.length!==2){ showToast('Выберите ровно 2 выходных дня', true); return; }
      await api('POST','/availability/premium-setup',{period_start:availEditor.period.period_start,period_end:availEditor.period.period_end,day_off_dates:dayOff});
      const dates=days.map(d=>({date:d,status:dayOff.includes(d)?'day_off':'available_full',notes:note}));
      if(availEditor.submitted) await api('POST','/availability/correct',{dates});
      else await api('POST','/availability/submit',{period_id:availEditor.period.period_id});
      showToast(availEditor.submitted?'Заявка скорректирована':'Заявка отправлена');
      await loadSchedulePanel(availEditor.photographerId);
      return;
    }
    const dates=days.map(d=>{
      const v=availEditor.entries[d]||{};
      return {date:d,status:v.status||'unavailable',notes:note,available_from:v.available_from||null,available_to:v.available_to||null};
    });
    if(availEditor.submitted) await api('POST','/availability/correct',{dates});
    else { await api('POST','/availability',{dates}); await api('POST','/availability/submit',{period_id:availEditor.period.period_id}); }
    showToast(availEditor.submitted?'Заявка скорректирована':'Заявка отправлена');
    await loadSchedulePanel(availEditor.photographerId);
  }catch(e){ showToast(e.message,true); }
}

function selectMyPeriod(periodId){
  mySelectedPeriodId=periodId;
  renderAvailabilityEditor();
  loadSchedulePanel(availEditor.photographerId);
}

function myAvailCellStyle(status){
  const m={
    available_full:{bg:'rgba(62,207,142,.12)',bd:'rgba(62,207,142,.28)'},
    unavailable:{bg:'rgba(242,85,85,.1)',bd:'rgba(242,85,85,.32)'},
    day_off:{bg:'rgba(245,166,35,.1)',bd:'rgba(245,166,35,.28)'},
    available_morning:{bg:'rgba(106,166,232,.12)',bd:'rgba(106,166,232,.28)'},
    available_evening:{bg:'rgba(155,141,255,.12)',bd:'rgba(155,141,255,.28)'},
  };
  const x=m[status];
  return x?`background:${x.bg};border-color:${x.bd}`:'';
}
function myAvailShortLabel(status){
  if(status==='available_full') return 'Свободен';
  if(status==='unavailable') return 'Занят';
  if(status==='day_off') return 'Под вопросом';
  if(status==='available_morning') return 'Утро';
  if(status==='available_evening') return 'Вечер';
  return '';
}
function ruAvailStatusBrief(x){
  return {available_full:'свободен весь день',unavailable:'занят',day_off:'под вопросом',available_morning:'утро',available_evening:'вечер'}[x]||x||'—';
}
async function respondAvailProposal(historyId,response){

function renderMyScheduleGrid(from, to, assignments, availability, pendingByDate){
  const holder=document.getElementById('my-sched-holder');
  if(!holder) return;
  const days=buildDateRange(from,to);
  if(!days.length){ holder.innerHTML=''; return; }
  const byDate={};
  (assignments||[]).forEach(a=>{
    const ds=String(a.event_date||'').slice(0,10);
    if(!byDate[ds]) byDate[ds]=[];
    byDate[ds].push(a);
  });
  const availBy={};
  (availability||[]).forEach(r=>{
    const ds=String(r.avail_date||'').slice(0,10);
    if(ds) availBy[ds]={status:r.status||'unavailable',pending:!!(pendingByDate&&pendingByDate[ds])};
  });
  const todayStr=new Date().toISOString().slice(0,10);
  const first=parseDateLocal(days[0]);
  const pad=first?((first.getDay()+6)%7):0;
  let h='<div class="my-sched-grid">';
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>{h+=`<div class="my-sched-head">${d}</div>`;});
  for(let i=0;i<pad;i++) h+='<div></div>';
  days.forEach(ds=>{
    const dt=parseDateLocal(ds);
    const isToday=ds===todayStr;
    const isPast=ds<todayStr;
    const items=byDate[ds]||[];
    const av=availBy[ds];
    const avSt=av?.status;
    const cellStyle=avSt?myAvailCellStyle(avSt):'';
    let cls='my-sched-day';
    if(isToday) cls+=' today';
    if(isPast) cls+=' past';
    if(!items.length&&!avSt) cls+=' off';
    let inner=`<div class="num">${dt?dt.getDate():''}</div>`;
    if(items.length){
      items.forEach(a=>{
        const statusCls=a.assignment_status==='confirmed'?'status-confirmed':'status-pending';
        const vName=esc(a.venue_short_name||a.venue_name||'');
        const timeFrom=fmtTime(a.staff_arrival||a.shift_start||a.event_start||'');
        const timeTo=fmtTime(a.event_end||a.shift_end||'');
        const timeStr=timeTo&&timeTo!=='—'?`${timeFrom} → ${timeTo}`:timeFrom;
        const crewParts=[];
        if(a.manager_names) crewParts.push('👔 '+esc(a.manager_names));
        if(a.operator_names) crewParts.push('🖨 '+esc(a.operator_names));
        inner+=`<div class="venue"><span class="status-dot ${statusCls}"></span>${vName}</div>`;
        inner+=`<div class="times">${esc(timeStr)}</div>`;
        if(crewParts.length) inner+=`<div class="crew">${crewParts.join(' · ')}</div>`;
      });
    } else if(avSt){
      inner+=`<div class="avail-only-lbl">${esc(myAvailShortLabel(avSt))}</div>`;
      if(av?.pending) inner+=`<div style="font-size:9px;color:var(--rank2);margin-top:2px">HR · подтвердите</div>`;
    } else {
      inner+='<div style="color:var(--text3);font-size:10px">—</div>';
    }
    h+=`<div class="${cls}"${cellStyle?` style="${cellStyle}"`:''}>${inner}</div>`;
  });
  h+='</div>';
  const legend=`<div class="my-sched-legend">
    <span><span class="lg-sq" style="background:rgba(62,207,142,.25)"></span>Весь день</span>
    <span><span class="lg-sq" style="background:rgba(242,85,85,.2)"></span>Занят</span>
    <span><span class="lg-sq" style="background:rgba(245,166,35,.2)"></span>Под вопросом</span>
    <span><span class="lg-sq" style="background:rgba(106,166,232,.22)"></span>Утро</span>
    <span><span class="lg-sq" style="background:rgba(155,141,255,.22)"></span>Вечер</span>
    <span style="opacity:.6">·</span>
    <span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--rank1);margin-right:4px;vertical-align:middle"></span>Подтверждено</span>
    <span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--rank2);margin-right:4px;vertical-align:middle"></span>Ожидает</span>
  </div>`;
  holder.innerHTML=h+legend;
}

              const o=Math.min(5,Math.max(0,Math.round(Number(r.overall)||0)));
              const stars='★'.repeat(o)+'☆'.repeat(5-o);
              const dt=r.event_date?new Date(r.event_date).toLocaleDateString('ru-RU'):'';
              return`<div style="padding:8px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg3)">
                <div style="color:#f5a623;font-size:13px">${stars} <b>${esc(String(r.overall||'—'))}</b>/5</div>
                <div style="font-size:11px;color:var(--text2)">${esc(r.venue_name||'')} · ${esc(dt)} · ${esc(r.rated_by_name||'')}</div>
                ${r.strengths?`<div style="font-size:11px;margin-top:4px;color:var(--text1)">${esc(r.strengths)}</div>`:''}
                ${r.improvements?`<div style="font-size:11px;margin-top:2px;color:var(--text3)">${esc(r.improvements)}</div>`:''}
              </div>`;
            }).join('');
          }
        }catch(e){ vr.innerHTML='<span style="color:var(--text3)">Не удалось загрузить оценки</span>'; }
      }
      const hold=document.getElementById('my-shift-history');
      if(!hold) return;
      try{
        const hist=await api('GET',`/shift-assignment-history?photographer_id=${encodeURIComponent(phId)}`);
        const actionRu=(a)=>({assigned:'Назначение',reassign_after_decline:'Повторное назначение',forced_confirm:'Подтверждение HR',accept:'Подтвердил смену',decline:'Отклонил',deleted:'Снято',cancelled:'Отменено'}[a]||a);
        hold.innerHTML=(hist||[]).length?(hist||[]).map(h=>{
          const dt=h.event_date?new Date(h.event_date).toLocaleDateString('ru-RU'):'—';
          const when=h.created_at?new Date(h.created_at).toLocaleString('ru-RU'):'';
          const ven=esc(h.venue_name||'');
          const st=[h.old_status,h.new_status].filter(Boolean).join(' → ');
          const dec=(h.action==='decline'||h.action==='reassign_after_decline')&&(h.decline_reason||h.decline_comment)?`<div style="font-size:11px;color:var(--text2);margin-top:4px">${esc(h.decline_reason||'')}${h.decline_comment?` · «${esc(h.decline_comment)}»`:''}</div>`:'';
          return`<div style="padding:8px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg3)"><div style="font-weight:600">${esc(actionRu(h.action))}</div><div style="font-size:11px;color:var(--text3)">${dt}${ven?' · '+ven:''}</div>${st?`<div style="font-size:11px;margin-top:4px">${esc(st)}</div>`:''}${dec}<div style="font-size:10px;color:var(--text3);margin-top:4px">${esc(when)}</div></div>`;
        }).join(''):'<span style="color:var(--text3)">Пока нет записей</span>';
      }catch(e){ hold.innerHTML='<span style="color:var(--rank3)">'+esc(e.message)+'</span>'; }
    })();
  }catch(e){box.innerHTML='<div class="loading" style="color:var(--rank3)">'+esc(e.message)+'</div>';}
}

async function loadMyGradeDetails() {
  const el = document.getElementById('my-grade-section');
  if (!el) return;
  try {
    const data = await api('GET', '/my/grade-details');
    if (!data) { el.innerHTML = ''; return; }

    const { current, history, checklist, nextGrade, kpi } = data;

    let html = '<div class="section"><div class="section-title">📊 Мой грейд</div>';

    if (current) {
      html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="padding:4px 12px;border-radius:8px;font-size:14px;font-weight:600;background:rgba(124,108,255,.15);color:var(--accent2);border:1px solid rgba(124,108,255,.3)">
          ${esc(current.grade_code)} ${esc(current.grade_name)}
        </span>
        <span style="font-size:13px;color:var(--rank1);font-weight:600">+${current.pay_bonus_pct || 0}%</span>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px">
        С ${new Date(current.effective_from).toLocaleDateString('ru-RU')}${current.approved_by_name ? ' · присвоил: ' + esc(current.approved_by_name) : ''}
      </div>`;

      if (checklist && checklist.items.length > 0) {
        const pct = checklist.total > 0 ? Math.round(checklist.passed / checklist.total * 100) : 0;
        html += `<div style="margin-bottom:14px">
          <div style="font-size:12px;font-weight:600;margin-bottom:6px">Чеклист: ${checklist.passed}/${checklist.total} (${pct}%)</div>
          <div style="height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:8px">
            <div style="height:100%;width:${pct}%;border-radius:3px;background:${pct >= 80 ? 'var(--rank1)' : pct >= 50 ? 'var(--rank2)' : 'var(--rank3)'};transition:width .3s"></div>
          </div>`;
        checklist.items.forEach((item, i) => {
          const r = checklist.results.find(x => x.check_item_index === i);
          const ok = r?.passed === true;
          const label = typeof item === 'string' ? item : item.label || item.text || '';
          html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;font-size:11px;margin-bottom:3px;background:${ok ? 'rgba(62,207,142,.08)' : 'rgba(242,85,85,.05)'}">
            <span style="font-size:14px">${ok ? '✅' : '⬜'}</span>
            <span style="color:${ok ? 'var(--rank1)' : 'var(--text2)'}">${esc(label)}</span>
          </div>`;
        });
        html += '</div>';
      }

      if (kpi) {
        html += `<div style="margin-bottom:14px">
          <div style="font-size:12px;font-weight:600;margin-bottom:6px">📈 KPI этого месяца</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px">`;

        const metrics = [];
        if (current.min_total_shifts != null) {
          const pctS = Math.min(100, Math.round((parseInt(kpi.total_shifts, 10) || 0) / current.min_total_shifts * 100));
          metrics.push({ label: 'Смены', value: `${kpi.total_shifts || 0}/${current.min_total_shifts}`, pct: pctS });
        }
        if (current.min_big_shifts != null) {
          const pctB = Math.min(100, Math.round((parseInt(kpi.big_shifts, 10) || 0) / current.min_big_shifts * 100));
          metrics.push({ label: 'Большие', value: `${kpi.big_shifts || 0}/${current.min_big_shifts}`, pct: pctB });
        }
        if (current.min_punctuality_pct != null) {
          const pctP = Math.min(100, Math.round((parseFloat(kpi.punctuality_pct) || 0) / parseFloat(current.min_punctuality_pct) * 100));
          metrics.push({ label: 'Пунктуальность', value: `${kpi.punctuality_pct || 0}%/${current.min_punctuality_pct}%`, pct: pctP });
        }

        metrics.forEach(m => {
          const col = m.pct >= 100 ? 'var(--rank1)' : m.pct >= 70 ? 'var(--rank2)' : 'var(--rank3)';
          html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:10px;color:var(--text3);margin-bottom:2px">${m.label}</div>
            <div style="font-size:14px;font-weight:600;color:${col}">${m.value}</div>
            <div style="height:4px;border-radius:2px;background:var(--bg);overflow:hidden;margin-top:4px">
              <div style="height:100%;width:${m.pct}%;border-radius:2px;background:${col}"></div>
            </div>
          </div>`;
        });

        html += '</div></div>';
      }

      if (nextGrade) {
        html += `<div style="padding:10px;background:rgba(124,108,255,.08);border:1px solid rgba(124,108,255,.2);border-radius:8px;margin-bottom:14px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Следующий грейд</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent2)">${esc(nextGrade.grade_code)} ${esc(nextGrade.grade_name)} (+${nextGrade.pay_bonus_pct || 0}%)</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">
            ${nextGrade.min_total_shifts != null ? 'Смен: ' + nextGrade.min_total_shifts : ''}
            ${nextGrade.min_big_shifts != null ? ' · Больших: ' + nextGrade.min_big_shifts : ''}
            ${nextGrade.min_punctuality_pct != null ? ' · Пункт: ' + nextGrade.min_punctuality_pct + '%' : ''}
          </div>
        </div>`;
      }
    } else {
      html += '<div style="color:var(--text3);font-size:12px;margin-bottom:12px">Грейд пока не назначен</div>';
    }

    if (history && history.length > 0) {
      const AL = { promoted: '↑ Повышение', demoted: '↓ Понижение', assigned: '● Назначен', forced_confirm: '⚡ Подтверждён' };
      const AC = { promoted: 'var(--rank1)', demoted: 'var(--rank3)', assigned: 'var(--accent2)', forced_confirm: 'var(--rank2)' };
      html += '<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;margin-bottom:6px">История грейдов</div>';
      history.forEach(h => {
        html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px">
          <span style="color:${AC[h.action] || 'var(--text3)'};font-weight:600">${AL[h.action] || h.action}</span>
          <span>${esc(h.grade_name || h.grade_code)}</span>
          <span style="color:var(--text3);margin-left:auto">${new Date(h.effective_from).toLocaleDateString('ru-RU')}</span>
        </div>`;
      });
      html += '</div>';
    }

    html += '</div>';
    el.innerHTML = html;
  } catch(e) {
    console.error('loadMyGradeDetails', e);
    el.innerHTML = '';
  }
}

// ═══════ TECH WORKTIME ═══════
let techTimerInterval = null;
let techTimerStarted = null;

async function initTechTimer() {
  if (currentUser.role !== 'tech_director' && currentUser.role !== 'site_specialist') return;
  try {
    const active = await api('GET', '/tech-time/active');
    if (active) {
      techTimerStarted = new Date(active.started_at);
      document.getElementById('tt-activity').value = active.activity_type || 'other';
      document.getElementById('tt-activity').disabled = true;
      showTimerRunning(active);
    }
    await loadTechDayTotal();
    await loadTechPlanToday();
    await loadTechWeekChart();
  } catch (e) { console.error('initTechTimer:', e); }
}

function showTimerRunning(active) {
  const btn = document.getElementById('tt-start-btn');
  btn.textContent = '⏹ Остановить';
  btn.style.background = 'var(--rank3)';
  btn.style.borderColor = 'var(--rank3)';
  const counter = document.getElementById('tt-live-counter');
  counter.style.display = '';
  const info = document.getElementById('tt-active-info');
  const LABELS = {delivery:'🚚 Завоз',setup:'🔧 Монтаж',maintenance:'🛠 ТО',repair:'⚡ Ремонт',pickup:'📦 Вывоз',travel:'🚗 Дорога',office:'🏢 Офис',meeting:'👥 Совещание',planning:'📋 Планирование',development:'💻 Разработка',other:'⚙️ Прочее'};
  info.style.display = '';
  info.textContent = (LABELS[active.activity_type] || active.activity_type) + (active.venue_name ? ' · ' + active.venue_name : '') + (active.task_title ? ' · ' + active.task_title : '');
  if (techTimerInterval) clearInterval(techTimerInterval);
  techTimerInterval = setInterval(updateTimerDisplay, 1000);
  updateTimerDisplay();
}

function updateTimerDisplay() {
  if (!techTimerStarted) return;
  const diff = Math.floor((Date.now() - techTimerStarted.getTime()) / 1000);
  const h = String(Math.floor(diff / 3600)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
  const s = String(diff % 60).padStart(2, '0');
  const el = document.getElementById('tt-live-counter');
  if (el) el.textContent = `${h}:${m}:${s}`;
}

async function toggleTechTimer() {
  try {
    if (techTimerStarted) {
      await api('POST', '/tech-time/stop', {});
      techTimerStarted = null;
      if (techTimerInterval) { clearInterval(techTimerInterval); techTimerInterval = null; }
      document.getElementById('tt-start-btn').textContent = '▶ Начать';
      document.getElementById('tt-start-btn').style.background = '';
      document.getElementById('tt-start-btn').style.borderColor = '';
      document.getElementById('tt-live-counter').style.display = 'none';
      document.getElementById('tt-active-info').style.display = 'none';
      document.getElementById('tt-activity').disabled = false;
      showToast('Таймер остановлен');
      await loadTechDayTotal();
    } else {
      const activity = document.getElementById('tt-activity').value;
      const result = await api('POST', '/tech-time/start', { activity_type: activity });
      techTimerStarted = new Date(result.started_at);
      document.getElementById('tt-activity').disabled = true;
      showTimerRunning(result);
      showToast('Таймер запущен');
    }
  } catch (e) { showToast(e.message, true); }
}

async function loadTechDayTotal() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const entries = await api('GET', `/tech-time/log?from=${today}&to=${today}&user_id=${currentUser.id}`).catch(() => []);
    const total = (entries || []).reduce((s, e) => s + (parseInt(e.duration_minutes) || 0), 0);
    const h = Math.floor(total / 60);
    const m = total % 60;
    const el = document.getElementById('tt-day-total');
    if (el) el.innerHTML = `Сегодня: <b>${h}ч ${m}м</b>`;
  } catch (e) { console.error(e); }
}

        </div>
      </div>`;

}

async function loadTechWeekChart() {
  try {
    const summary = await api('GET', `/tech-time/summary?user_id=${currentUser.id}`).catch(() => null);
    const planWeek = await api('GET', '/tech-plans/my-week').catch(() => []);
    const el = document.getElementById('tech-week-chart');
    if (!el || !summary) return;

    const byDate = {};
    for (const d of summary.by_date || []) {
      const ds = (d.date || '').toString().slice(0, 10);
      byDate[ds] = d.minutes;
    }
    const planByDate = {};
    for (const p of planWeek || []) {
      const ds = (p.plan_date || '').toString().slice(0, 10);
      planByDate[ds] = (planByDate[ds] || 0) + parseFloat(p.planned_hours || 0) * 60;
    }

    const today = new Date();
    const dow = (today.getDay() + 6) % 7;
    const monday = new Date(today); monday.setDate(today.getDate() - dow);
    const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    let html = '<div style="display:flex;gap:4px;align-items:end;height:80px">';
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate() + i);
      const ds = d.toISOString().split('T')[0];
      const fact = byDate[ds] || 0;
      const plan = planByDate[ds] || 480;
      const factPct = Math.min(100, Math.round(fact / 480 * 100));
      const planPct = Math.min(100, Math.round(plan / 480 * 100));
      const isToday = ds === new Date().toISOString().split('T')[0];
      const bg = fact > plan * 1.1 ? 'var(--rank2)' : fact >= plan * 0.9 ? 'var(--rank1)' : 'var(--accent2)';
      html += `<div style="flex:1;text-align:center">
        <div style="position:relative;height:60px;display:flex;align-items:end;justify-content:center;gap:1px">
          <div style="width:8px;height:${planPct * 0.6}px;background:rgba(124,108,255,.2);border-radius:2px" title="План: ${Math.round(plan/60*10)/10}ч"></div>
          <div style="width:8px;height:${factPct * 0.6}px;background:${bg};border-radius:2px" title="Факт: ${Math.round(fact/60*10)/10}ч"></div>
        </div>
        <div style="font-size:10px;color:${isToday ? 'var(--accent2)' : 'var(--text3)'};font-weight:${isToday ? '700' : '400'};margin-top:2px">${dayNames[i]}</div>
      </div>`;
    }
    html += '</div>';
    html += '<div style="display:flex;gap:12px;justify-content:center;margin-top:6px;font-size:10px;color:var(--text3)"><span>▓ План</span> <span>▓ Факт</span></div>';
    el.innerHTML = html;
  } catch (e) { console.error(e); }
}

    const total = entries.reduce((s, e) => s + (parseInt(e.duration_minutes) || 0), 0);
    const old = document.getElementById('end-day-modal');
    if (old) old.remove();

    const modal = document.createElement('div');
    modal.id = 'end-day-modal';

        <div id="end-day-entries" style="display:grid;gap:6px">
          ${entries.map((e, idx) => {
            const st = new Date(e.started_at);

            return `<div style="display:flex;gap:8px;align-items:center;padding:8px;background:var(--bg3);border-radius:8px;font-size:12px" data-entry-id="${e.id}">
              <span style="font-size:16px">${(LABELS[e.activity_type]||'📋').slice(0,2)}</span>
              <div style="flex:1">
                <div>${LABELS[e.activity_type] || e.activity_type}${e.venue_name ? ' · ' + esc(e.venue_name) : ''}</div>
                <div style="color:var(--text3)">${tFrom} — ${tTo}</div>

              <input type="number" class="fin ed-dur" value="${e.duration_minutes || ''}" style="width:50px;text-align:center" data-orig="${e.duration_minutes || ''}">
              <span style="color:var(--text3)">мин</span>

          }).join('')}

      </div>
    `;
    document.body.appendChild(modal);
  }).catch(e => showToast(e.message, true));

async function submitEndDay() {
  try {
    const corrections = [];
    document.querySelectorAll('#end-day-entries [data-entry-id]').forEach(row => {
      const id = row.dataset.entryId;
      const durInput = row.querySelector('.ed-dur');
      const dur = parseInt(durInput?.value);
      const orig = parseInt(durInput?.dataset.orig);
      if (dur && dur !== orig) {
        corrections.push({ id, duration_minutes: dur });
      }
    });
    const notes = document.getElementById('end-day-notes')?.value?.trim() || null;
    await api('POST', '/tech-daily-reports/submit', { corrections, employee_notes: notes });
    document.getElementById('end-day-modal')?.remove();
    showToast('Рабочий день отправлен на проверку');
    await loadTechDayTotal();
  } catch (e) { showToast(e.message, true); }
}
</script>
<div id="admin-overlay" class="admin-overlay" onclick="if(event.target===this)closeAdmin()">
  <iframe id="admin-iframe" class="admin-iframe" src="" title="Управление"></iframe>
</div>
</body>
</html>
