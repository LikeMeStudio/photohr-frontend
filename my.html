<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PhotoHR — Мой профиль</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--card-h:#1f1f2a;--border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6cff;--accent2:#9b8dff;--rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
.header{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600}.logo span{color:var(--accent2)}
.nav-links{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.nav-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Golos Text',sans-serif;transition:all .15s}
.nav-btn:hover{color:var(--text)}.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.user-pill{padding:5px 10px;border-radius:16px;background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;margin-left:auto}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;font-family:'Golos Text',sans-serif}
.main{max-width:900px;margin:0 auto;padding:20px 24px}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
.section-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.btn{padding:7px 16px;border-radius:10px;border:none;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}

/* Profile hero */
.profile-hero{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.profile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:24px;font-weight:600;border:3px solid var(--accent)}
.profile-avatar img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.profile-info{flex:1;min-width:200px}
.profile-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;margin-bottom:4px}
.profile-meta{font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-value{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Achievement badges */
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.ach-badge{padding:6px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:4px}
.ach-badge .icon{font-size:16px}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:4px}
.lb-row.me{background:rgba(124,108,255,.1);border:1px solid rgba(124,108,255,.3)}
.lb-pos{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;width:28px;text-align:center}
.lb-name{flex:1;font-size:13px}.lb-value{font-size:13px;font-weight:600;color:var(--accent2)}

/* Payroll */
.pay-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.pay-row:last-child{border-bottom:none}
.pay-amount{font-weight:600}
.pay-positive{color:var(--rank1)}.pay-negative{color:var(--rank3)}

/* Peer review */
.review-item{padding:8px;background:var(--bg3);border-radius:8px;margin-bottom:6px}
.review-stars{color:#f5a623;font-size:16px}
.review-text{font-size:12px;margin-top:2px;color:var(--text2)}
.review-from{font-size:11px;color:var(--text3);margin-top:2px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
.loading{text-align:center;padding:40px;color:var(--text3)}
@media(max-width:768px){.main{padding:12px}.profile-hero{flex-direction:column;text-align:center}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="index.html">Photo<span>HR</span></a>
  <div class="nav-links">
    <a class="nav-btn" href="index.html">Сотрудники</a>
    <a class="nav-btn active" href="my.html">Мой профиль</a>
  </div>
  <div class="user-pill" id="user-pill"></div>
  <button class="logout-btn" onclick="doLogout()">Выйти</button>
</div>
<div class="main" id="main"><div class="loading">Загрузка...</div></div>
<div class="toast" id="toast"></div>
<script>
const API = window.location.hostname==='localhost'?'http://localhost:3001/api':'https://fotohr-server-production.up.railway.app/api';
let accessToken=localStorage.getItem('fhr_access')||null;
let refreshToken=localStorage.getItem('fhr_refresh')||null;
let currentUser=null;

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(accessToken)opts.headers['Authorization']=`Bearer ${accessToken}`;
  if(body)opts.body=JSON.stringify(body);
  let res=await fetch(API+path,opts);
  if(res.status===401&&refreshToken){
    const rr=await fetch(API+'/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken})});
    if(rr.ok){const d=await rr.json();accessToken=d.accessToken;refreshToken=d.refreshToken;localStorage.setItem('fhr_refresh',refreshToken);localStorage.setItem('fhr_access',accessToken);opts.headers['Authorization']=`Bearer ${accessToken}`;res=await fetch(API+path,opts);}
    else{doLogout();return null;}
  }
  if(!res.ok){const err=await res.json().catch(()=>({error:'Ошибка'}));throw new Error(err.error||'Ошибка');}
  return res.json();
}
function doLogout(){localStorage.removeItem('fhr_refresh');localStorage.removeItem('fhr_access');window.location.href='index.html';}
function showToast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');setTimeout(()=>t.className='toast',2500);}

(async function init(){
  if(!accessToken&&!refreshToken){window.location.href='index.html';return;}
  try{
    currentUser=await api('GET','/auth/me');
    document.getElementById('user-pill').innerHTML=`<span>${currentUser.name}</span>`;
    if(!currentUser.photographer_id){
      document.getElementById('main').innerHTML='<div class="loading">Ваш аккаунт не привязан к карточке сотрудника. Обратитесь к администратору.</div>';
      return;
    }
    await loadProfile();
  }catch(e){document.getElementById('main').innerHTML=`<div class="loading" style="color:var(--rank3)">${e.message}</div>`;}
})();

async function loadProfile(){
  const phId=currentUser.photographer_id;
  const [ph, achSummary, peerSummary, leaderboard, balance]=await Promise.all([
    api('GET',`/photographers/${phId}`),
    api('GET',`/photographers/${phId}/achievements-summary`).catch(()=>({total:0,recent:[],by_category:{},leaderboard_position:0})),
    api('GET',`/photographers/${phId}/peer-summary`).catch(()=>({total_reviews:0,avg_stars:0,recent_public:[]})),
    api('GET','/leaderboard?period=month&metric=revenue&limit=10').catch(()=>({leaders:[]})),
    api('GET',`/payroll/${phId}/balance`).catch(()=>({earned:0,paid:0,month_balance:0,total_balance:0})),
  ]);

  const baseUrl=API.replace('/api','');
  const avatarHtml=ph.photo_url
    ?`<img src="${baseUrl}${ph.photo_url}"/>`
    :`<div style="background:var(--accent);color:#fff;width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px">${(ph.name||'?')[0]}</div>`;

  const myPos=achSummary.leaderboard_position||'—';
  const stars='★'.repeat(Math.round(peerSummary.avg_stars||0))+'☆'.repeat(5-Math.round(peerSummary.avg_stars||0));

  document.getElementById('main').innerHTML=`
    <!-- Profile -->
    <div class="section">
      <div class="profile-hero">
        <div class="profile-avatar">${avatarHtml}</div>
        <div class="profile-info">
          <div class="profile-name">${ph.name}</div>
          <div class="profile-meta">
            ${ph.grade?`<span>📊 ${ph.grade}</span>`:''}
            ${ph.rank?`<span>${'★'.repeat(ph.rank)} ранг</span>`:''}
            <span>📅 ${ph.start_date?'с '+new Date(ph.start_date).toLocaleDateString('ru-RU'):'дата не указана'}</span>
          </div>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" style="color:var(--accent2)">${Math.round(ph.rating_overall||0)}</div><div class="stat-label">Рейтинг</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--rank1)">#${myPos}</div><div class="stat-label">В лидерборде</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--rank2)">${achSummary.total}</div><div class="stat-label">Достижений</div></div>
            <div class="stat-card"><div class="stat-value">${stars.slice(0,5)}</div><div class="stat-label">${peerSummary.total_reviews} отзывов</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Payroll Balance -->
    <div class="section">
      <div class="section-title">💰 Баланс зарплаты</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">
        <div class="stat-card"><div class="stat-value pay-positive">${Number(balance.earned||0).toLocaleString('ru-RU')}₽</div><div class="stat-label">Заработано (месяц)</div></div>
        <div class="stat-card"><div class="stat-value pay-negative">${Number(balance.paid||0).toLocaleString('ru-RU')}₽</div><div class="stat-label">Выплачено</div></div>
        <div class="stat-card"><div class="stat-value" style="color:${(balance.total_balance||0)>=0?'var(--rank1)':'var(--rank3)'}">${Number(balance.total_balance||0).toLocaleString('ru-RU')}₽</div><div class="stat-label">Общий баланс</div></div>
      </div>
    </div>

    <!-- Achievements -->
    <div class="section">
      <div class="section-title">🏆 Достижения (${achSummary.total})</div>
      ${achSummary.recent?.length?`<div class="badge-row">${achSummary.recent.map(a=>`<div class="ach-badge"><span class="icon">${a.icon||'⭐'}</span>${a.name}</div>`).join('')}</div>`:'<div style="color:var(--text3);font-size:13px">Пока нет достижений. Продолжай работать!</div>'}
    </div>

    <!-- Leaderboard -->
    <div class="section">
      <div class="section-title">📈 Лидерборд (месяц)</div>
      ${(leaderboard.leaders||[]).slice(0,10).map((l,i)=>{
        const isMe=l.id===phId;
        return`<div class="lb-row ${isMe?'me':''}">
          <div class="lb-pos" style="color:${i<3?['#ffd700','#c0c0c0','#cd7f32'][i]:'var(--text3)'}">${i+1}</div>
          <div class="lb-name">${l.name}${isMe?' (вы)':''}</div>
          <div class="lb-value">${Number(l.total_revenue||0).toLocaleString('ru-RU')}₽</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Peer Reviews -->
    <div class="section">
      <div class="section-title">⭐ Отзывы коллег (${peerSummary.total_reviews||0})</div>
      ${peerSummary.avg_stars?`<div style="font-size:14px;margin-bottom:8px">Средняя оценка: <span style="color:#f5a623;font-size:18px">${'★'.repeat(Math.round(peerSummary.avg_stars))}</span> ${peerSummary.avg_stars}/5</div>`:''}
      ${(peerSummary.recent_public||[]).slice(0,5).map(r=>`<div class="review-item">
        <div class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
        ${r.comment?`<div class="review-text">${r.comment}</div>`:''}
        <div class="review-from">${r.reviewer_name||'Аноним'} · ${r.venue_name||''} · ${new Date(r.created_at).toLocaleDateString('ru-RU')}</div>
      </div>`).join('')||'<div style="color:var(--text3);font-size:13px">Пока нет отзывов</div>'}
    </div>
  `;
}
</script>
</body>
</html>
