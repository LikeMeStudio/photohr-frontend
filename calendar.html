<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PhotoHR — Календарь</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--card-h:#1f1f2a;--border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6cff;--accent2:#9b8dff;--rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
.header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-right:8px}.logo span{color:var(--accent2)}
.header-stats{display:flex;gap:16px;flex:1}
.stat{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.user-pill{padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%}
.nav-links{display:flex;gap:6px;margin-left:12px}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-btn:hover{color:var(--text)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.main{max-width:1400px;margin:0 auto;padding:20px 24px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:10px;border:none;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.toolbar-unified .btn.btn-ghost{padding:6px 14px;border-radius:20px;font-size:12px}
.btn-sm{padding:4px 10px;font-size:11px}
.fin{padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:12px;outline:none}
.fin:focus{border-color:var(--accent)}
.fselect{padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer}
.spacer{flex:1}
.week-label{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600}
.cal-grid-wrap{overflow-x:auto}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-header{font-size:11px;color:var(--text3);text-align:center;padding:6px;font-weight:600;text-transform:uppercase}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:10px;min-height:100px;padding:8px;cursor:pointer;transition:all .15s}
.cal-day:hover{border-color:var(--border2);background:var(--card-h)}
.cal-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.cal-day.other-month{opacity:.4}
.cal-date{font-size:12px;font-weight:600;margin-bottom:4px}
.cal-date.today{color:var(--accent2)}
.cal-event{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event.has-staff{background:rgba(62,207,142,.15);color:var(--rank1);border:1px solid rgba(62,207,142,.2)}
.cal-event.needs-staff{background:rgba(245,166,35,.15);color:var(--rank2);border:1px solid rgba(245,166,35,.2)}
.cal-event.no-staff{background:rgba(242,85,85,.12);color:var(--rank3);border:1px solid rgba(242,85,85,.2)}
.cal-event.aq-full{background:rgba(62,207,180,.15);color:#3ecfb4;border:1px solid rgba(62,207,180,.25)}
.cal-event.aq-partial{background:rgba(245,166,35,.15);color:var(--rank2);border:1px solid rgba(245,166,35,.2)}
.cal-event.aq-empty{background:rgba(242,85,85,.12);color:var(--rank3);border:1px solid rgba(242,85,85,.2)}

/* Event detail panel */
.event-panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:16px}
.ep-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;margin-bottom:12px}
.ep-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.ep-row:last-child{border-bottom:none}

/* Overlay/Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600}
.modal-footer{display:flex;justify-content:flex-end;gap:6px;margin-top:14px}
.dr-close{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.field{margin-bottom:10px}.fl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
.loading{text-align:center;padding:40px;color:var(--text3)}
@media(max-width:768px){
  .header{padding:10px 14px;gap:8px}
  .nav-links{order:3;width:100%;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
  .nav-links::-webkit-scrollbar{display:none}
  .header-stats{display:none}
  .logo{font-size:16px}
  .toolbar{padding-left:12px;padding-right:12px;flex-wrap:wrap}
  .toolbar-unified{padding-left:12px;padding-right:12px;flex-wrap:wrap}
  .cal-grid-wrap{overflow-x:auto}
  .cal-grid{grid-template-columns:repeat(7,1fr);gap:3px;min-width:560px}
  .cal-day{min-height:60px;padding:4px}
  .cal-event{font-size:9px}
  .overlay{align-items:flex-end;padding:0}
  .modal{border-radius:18px 18px 0 0;max-height:88vh;width:100%;max-width:100%}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Photo<span>HR</span></div>
  <div class="nav-links" id="nav-links"></div>
  <div class="header-stats" id="hstats"></div>
  <div class="header-right">
    <div class="user-pill" id="user-pill" onclick="openProfile()" style="cursor:pointer" title="Мой профиль"></div>
    <button class="btn btn-ghost" onclick="doLogout()" style="font-size:13px;padding:6px 12px">Выйти</button>
  </div>
</div>
<div class="main">
  <div class="toolbar">
    <button class="btn btn-ghost btn-sm" onclick="prevMonth()">◀</button>
    <span class="week-label" id="month-label">Март 2026</span>
    <button class="btn btn-ghost btn-sm" onclick="nextMonth()">▶</button>
    <button class="btn btn-ghost btn-sm" onclick="goToday()">Сегодня</button>
    <span class="spacer"></span>
    <select class="fselect" id="venue-filter" onchange="loadCalendar()" style="width:auto;min-width:150px">
      <option value="">Все площадки</option>
    </select>
    <select class="fselect" id="type-filter" onchange="loadCalendar()" style="width:auto;min-width:100px">
      <option value="all">Все</option>
      <option value="photo">Фото</option>
      <option value="aq">Аквагрим</option>
    </select>
    <button class="btn btn-primary" onclick="openNewEvent()">+ Мероприятие</button>
    <span class="toolbar-unified" style="display:inline-flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-ghost" onclick="openAchievementsPanel()">🏆 Достижения</button>
    <button class="btn btn-ghost" onclick="openBirthdaysPanel()">🎂 Дни рождения</button>
    <button class="btn btn-ghost" onclick="openLikesPanel()">❤️ Лайки</button>
    </span>
  </div>
  <div class="cal-grid-wrap"><div class="cal-grid" id="cal-grid"></div></div>
  <div id="event-detail"></div>
</div>

<!-- New event modal -->
<div class="overlay" id="event-modal" onclick="if(event.target===this)this.classList.remove('open')">
<div class="modal" style="max-width:520px">
  <div class="modal-title">
    <span>Новое мероприятие</span>
    <button class="dr-close" onclick="document.getElementById('event-modal').classList.remove('open')">×</button>
  </div>

  <div class="field"><div class="fl">Площадка *</div><select class="fselect" id="ev-venue" style="width:100%" onchange="loadVenueShiftConfig()"></select></div>
  <div style="display:flex;gap:8px">
    <div class="field" style="flex:1"><div class="fl">Дата *</div><input class="fin" type="date" id="ev-date" style="width:100%" onchange="loadVenueShiftConfig()"/></div>
    <div class="field" style="flex:1"><div class="fl">Тип дня</div>
      <select class="fselect" id="ev-type" style="width:100%" onchange="loadVenueShiftConfig()">
        <option value="regular">Обычное</option>
        <option value="special">Специальное</option>
        <option value="holiday">Праздник</option>
      </select>
    </div>
    <div class="field" style="flex:1" id="ev-block-wrap"><div class="fl">Блок</div>
      <select class="fselect" id="ev-block" style="width:100%" onchange="updateBlockLabels()">
        <option value="photo">Фото</option>
        <option value="aquagrim">Аквагрим</option>
      </select>
    </div>
  </div>

  <div style="display:flex;gap:8px">
    <div class="field" style="flex:1"><div class="fl">Запуск гостей</div><input class="fin" type="time" id="ev-guest-start" style="width:100%"/></div>
    <div class="field" style="flex:1"><div class="fl">Начало работы</div><input class="fin" type="time" id="ev-event-start" style="width:100%"/></div>
    <div class="field" style="flex:1"><div class="fl">Завершение</div><input class="fin" type="time" id="ev-event-end" style="width:100%"/></div>
  </div>

  <div id="ev-shifts-config" style="margin-top:8px">
    <div style="color:var(--text3);font-size:12px">Выберите площадку и дату для загрузки конфигурации смен</div>
  </div>

  <div class="field"><div class="fl">Примечание</div><input class="fin" id="ev-notes" placeholder="Особые условия..." style="width:100%"/></div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="document.getElementById('event-modal').classList.remove('open')">Отмена</button>
    <button class="btn btn-primary" onclick="createEvent()">Создать</button>
  </div>
</div>
</div>

<!-- Assign modal -->
<div class="overlay" id="assign-modal" onclick="if(event.target===this)this.classList.remove('open')">
<div class="modal">
  <div class="modal-title"><span>Назначить на смену</span><button class="dr-close" onclick="document.getElementById('assign-modal').classList.remove('open')">×</button></div>
  <input type="hidden" id="as-shift-id"/>
  <div class="field"><div class="fl">Сотрудник</div><select class="fselect" id="as-photographer" style="width:100%"></select></div>
  <div class="field"><div class="fl">Роль на смене</div>
    <select class="fselect" id="as-role" style="width:100%">
      <option value="photographer">Фотограф</option>
      <option value="print_operator">Оператор печати</option>
      <option value="admin">Администратор</option>
      <option value="mentor">Наставник</option>
      <option value="helper">Помощник</option>
    </select>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="document.getElementById('assign-modal').classList.remove('open')">Отмена</button>
    <button class="btn btn-primary" onclick="assignToShift()">Назначить</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>
<script>
const API=window.location.hostname==='localhost'?'http://localhost:3001/api':'https://fotohr-server-production.up.railway.app/api';
let accessToken=localStorage.getItem('fhr_access')||null,refreshToken=localStorage.getItem('fhr_refresh')||null,currentUser=null;
let venues=[],allEvents=[],currentMonth=new Date().getMonth(),currentYear=new Date().getFullYear();
let aqEvents = [];
let currentEventId = null;
let currentEventDate = null;
let modalShiftsConfig = {};
const AQ_PAGE_ROLES = ['aq_manager','hr_director','exec_director','admin','cashier'];
const canSeeAq = () => AQ_PAGE_ROLES.includes(currentUser?.role || '');
let refreshLock=null;

async function api(m,p,b){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(accessToken)o.headers['Authorization']=`Bearer ${accessToken}`;
  if(b)o.body=JSON.stringify(b);
  let r=await fetch(API+p,o);
  if(r.status===401&&refreshToken){
    try{
      if(!refreshLock){
        refreshLock=(async()=>{
          const rr=await fetch(API+'/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken})});
          if(!rr.ok)throw new Error('refresh_failed');
          const d=await rr.json();
          accessToken=d.accessToken;refreshToken=d.refreshToken;
          localStorage.setItem('fhr_refresh',refreshToken);
          localStorage.setItem('fhr_access',accessToken);
        })();
      }
      await refreshLock;
      o.headers['Authorization']=`Bearer ${accessToken}`;
      r=await fetch(API+p,o);
    }catch{doLogout();return null;}
    finally{refreshLock=null;}
  }
  if(!r.ok){const e=await r.json().catch(()=>({error:'Ошибка'}));throw new Error(e.error||'Ошибка');}
  return r.json();
}
function doLogout(){localStorage.removeItem('fhr_refresh');localStorage.removeItem('fhr_access');window.location.href='index.html';}
function showToast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');setTimeout(()=>t.className='toast',2500);}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const ROLE_LABELS={admin:'Администратор',exec_director:'Исполнительный директор',hr_director:'HR-директор',hr_manager:'HR-менеджер',recruiter:'Рекрутер',tech_director:'Тех-директор',site_specialist:'Специалист по сайту',cashier:'Инкассация',photographer_user:'Сотрудник',aq_user:'Аквагримёр',aq_manager:'Менеджер аквагрима',archived:'Архив'};
const ROLE_COLORS={admin:'#ffd700',exec_director:'#f5a623',hr_director:'#3ecf8e',hr_manager:'#4ecb8a',recruiter:'#e86aa6',tech_director:'#8a7aee',site_specialist:'#6aa6e8',cashier:'#e87a6a',photographer_user:'#9090a8',aq_user:'#3ecfb4',aq_manager:'#5ee8d0',archived:'#5a5a72'};
const ROLES={photographer_user:0,aq_user:0,recruiter:1,hr_manager:1,tech_director:1,site_specialist:1,aq_manager:1,cashier:2,hr_director:2,exec_director:3,admin:4};
const roleNow=()=>currentUser?.role||'photographer_user';
const hasAnyRole=(roles)=>roles.includes(roleNow());
function openProfile(){window.location.href='index.html?profile=1';}
function fillPlaceholderStats(){const hs=document.getElementById('hstats');if(!hs)return;hs.innerHTML='<div class="stat"><div class="stat-num" style="color:var(--accent2)">—</div><div class="stat-lbl">Всего</div></div><div class="stat"><div class="stat-num" style="color:var(--rank1)">—</div><div class="stat-lbl">Топ</div></div><div class="stat"><div class="stat-num" style="color:var(--rank2)">—</div><div class="stat-lbl">Средний балл</div></div>';}
function setupUserPill(){const c=ROLE_COLORS[currentUser.role]||'#9090a8';document.getElementById('user-pill').innerHTML=`<div class="role-dot" style="background:${c}"></div><span>${esc(currentUser.name)}</span><span style="color:var(--text3);font-size:11px">${ROLE_LABELS[currentUser.role]||currentUser.role}</span>`;}
function setupNav(activeKey){const navBtns=[],ns='text-decoration:none;padding:5px 12px;font-size:12px';const a=(key,href,label)=>{const cls=activeKey===key?'f-btn active':'f-btn';return`<a class="${cls}" href="${href}" style="${ns}">${label}</a>`;};navBtns.push(a('index','index.html','Фотографы'));if(currentUser.role!=='photographer_user'&&currentUser.role!=='aq_user')navBtns.push(a('team','team.html','Команда'));if(hasAnyRole(['recruiter','hr_manager','hr_director','exec_director','admin']))navBtns.push(a('recruiting','recruiting.html','Рекрутинг'));if(hasAnyRole(['photographer_user','hr_manager','cashier','hr_director','tech_director','site_specialist','exec_director','admin']))navBtns.push(a('venue','venue.html','Площадка'));if(hasAnyRole(['tech_director','hr_director','exec_director','admin']))navBtns.push(a('stock','stock.html','Склад'));if(hasAnyRole(['hr_manager','hr_director','exec_director','admin','photographer_user']))navBtns.push(a('calendar','calendar.html','Календарь'));if(hasAnyRole(['hr_manager','hr_director','exec_director','admin']))navBtns.push(a('schedule','schedule.html','Расписание'));if(currentUser.role==='photographer_user'&&currentUser.photographer_id)navBtns.push(a('checkin','checkin.html','📍 Чекин'));if(hasAnyRole(['aq_manager','hr_director','exec_director','admin','cashier'])){navBtns.push('<span style="width:1px;height:18px;background:var(--border);margin:0 6px;align-self:center"></span>');navBtns.push(a('aquagrim','aquagrim.html','Аквагрим'));}if(currentUser.role==='photographer_user'&&currentUser.photographer_id)navBtns.push(a('my','my.html','📷 Мой профиль'));document.getElementById('nav-links').innerHTML=navBtns.join('');}
function openAchievementsPanel(){window.location.href='index.html#achievements';}
function openBirthdaysPanel(){window.location.href='index.html#birthdays';}
function openLikesPanel(){window.location.href='index.html#likes';}

const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

(async function init(){
  if(!accessToken&&!refreshToken){window.location.href='index.html';return;}
  try{
    currentUser=await api('GET','/auth/me');
    setupUserPill();
    setupNav('calendar');
    fillPlaceholderStats();
    const typeFilter=document.getElementById('type-filter');
    if(typeFilter) typeFilter.style.display = canSeeAq() ? '' : 'none';
    const evBlockWrap=document.getElementById('ev-block-wrap');
    if(evBlockWrap) evBlockWrap.style.display = canSeeAq() ? '' : 'none';
    venues=await api('GET','/venues');
    const vf=document.getElementById('venue-filter');
    const ev=document.getElementById('ev-venue');
    venues.forEach(v=>{
      vf.innerHTML+=`<option value="${v.id}">${esc(v.name)}</option>`;
      ev.innerHTML+=`<option value="${v.id}">${esc(v.name)}</option>`;
    });
    await loadCalendar();
  }catch(e){document.getElementById('cal-grid').innerHTML=`<div class="loading" style="color:var(--rank3);grid-column:1/-1">${esc(e.message)}</div>`;}
})();

async function loadCalendar(){
  const from=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
  const lastDay=new Date(currentYear,currentMonth+1,0).getDate();
  const to=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${lastDay}`;
  const venueId=document.getElementById('venue-filter').value;
  const vParam=venueId?`&venue_id=${venueId}`:'';

  document.getElementById('month-label').textContent=`${MONTHS[currentMonth]} ${currentYear}`;

  try{
    allEvents=await api('GET',`/events?from=${from}&to=${to}${vParam}&schedule_status=confirmed`);
  }catch{allEvents=[];}

  // AQ events load (parallel stream)
  aqEvents = [];
  if (canSeeAq()) {
    try {
      const venueFilter = document.getElementById('venue-filter').value;
      const aqUrl = `/aq/events?from=${from}&to=${to}` + (venueFilter ? `&venue_id=${venueFilter}` : '');
      aqEvents = await api('GET', aqUrl).catch(() => []);
    } catch(e) { console.warn('AQ events load error:', e.message); }
  }

  renderCalendar();
}

function renderCalendar(){
  const grid=document.getElementById('cal-grid');
  const today=new Date().toISOString().split('T')[0];
  const typeFilter=document.getElementById('type-filter');
  const typeVal=(typeFilter && typeFilter.style.display!=='none') ? (typeFilter.value||'all') : 'photo';
  const firstDay=new Date(currentYear,currentMonth,1);
  let startDow=firstDay.getDay();
  if(startDow===0)startDow=7; // Mon=1
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const prevMonthDays=new Date(currentYear,currentMonth,0).getDate();

  let html=DAYS.map(d=>`<div class="cal-header">${d}</div>`).join('');

  // Previous month fill
  for(let i=startDow-2;i>=0;i--){
    html+=`<div class="cal-day other-month"><div class="cal-date">${prevMonthDays-i}</div></div>`;
  }

  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const dayPhotoEvents=allEvents.filter(e=>e.event_date===dateStr||e.event_date?.split('T')[0]===dateStr);
    const dayAqEvents=aqEvents.filter(e=>e.event_date===dateStr||e.event_date?.split('T')[0]===dateStr);

    html+=`<div class="cal-day ${isToday?'today':''}" onclick="showDayEvents('${dateStr}')">
      <div class="cal-date ${isToday?'today':''}">${d}</div>
      ${typeVal!=='aq' ? dayPhotoEvents.slice(0,3).map(e=>{
        const assigned=e.assigned_count||0;
        const needed=(e.required_photographers||0)+(e.required_operators||0)+(e.required_admins||0);
        const cls=assigned>=needed&&needed>0?'has-staff':assigned>0?'needs-staff':'no-staff';
        const vName=venues.find(v=>v.id===e.venue_id)?.name||'';
        return`<div class="cal-event ${cls}" title="${vName}: ${assigned}/${needed}">${vName.slice(0,12)}${assigned?` (${assigned}/${needed})`:''}</div>`;
      }).join('') : ''}
      ${typeVal!=='photo' ? dayAqEvents.slice(0,3).map(aqEv=>{
        const assigned=aqEv.assigned_count||0;
        const reqTotal=(aqEv.required_aquagrimers||0)+(aqEv.required_senior_aquagrimers||0)+(aqEv.required_aq_managers||0);
        const cls=assigned>=reqTotal&&reqTotal>0?'aq-full':assigned>0?'aq-partial':'aq-empty';
        const vName=aqEv.venue_name || (venues.find(v=>v.id===aqEv.venue_id)?.name||'');
        const shortName=(vName||'').slice(0,12);
        const badge=`${assigned}/${reqTotal}`;
        return`<div class="cal-event ${cls}" title="🎨 ${esc(vName)}: ${badge}" onclick="event.stopPropagation();openAqEvent('${aqEv.id}')">🎨 ${esc(shortName)} (${badge})</div>`;
      }).join('') : ''}
      ${typeVal!=='aq' && dayPhotoEvents.length>3?`<div style="font-size:9px;color:var(--text3)">+${dayPhotoEvents.length-3}</div>`:''}
      ${typeVal!=='photo' && dayAqEvents.length>3?`<div style="font-size:9px;color:var(--text3)">+${dayAqEvents.length-3} 🎨</div>`:''}
    </div>`;
  }

  // Next month fill
  const totalCells=(startDow-1)+daysInMonth;
  const remaining=7-totalCells%7;
  if(remaining<7){
    for(let i=1;i<=remaining;i++){
      html+=`<div class="cal-day other-month"><div class="cal-date">${i}</div></div>`;
    }
  }

  grid.innerHTML=html;
}

async function showDayEvents(dateStr){
  const typeFilter=document.getElementById('type-filter');
  const typeVal=(typeFilter && typeFilter.style.display!=='none') ? (typeFilter.value||'all') : 'photo';
  const dayPhotoEvents=allEvents.filter(e=>e.event_date===dateStr||e.event_date?.split('T')[0]===dateStr);
  const dayAqEvents=aqEvents.filter(e=>e.event_date===dateStr||e.event_date?.split('T')[0]===dateStr);
  const panel=document.getElementById('event-detail');
  const dateLabel=new Date(dateStr).toLocaleDateString('ru-RU',{day:'numeric',month:'long',weekday:'long'});

  const showPhoto=typeVal!=='aq';
  const showAq=typeVal!=='photo' && canSeeAq();
  const photoCount=showPhoto?dayPhotoEvents.length:0;
  const aqCount=showAq?dayAqEvents.length:0;

  if(!photoCount && !aqCount){
    panel.innerHTML=`<div class="event-panel">
      <div class="ep-title">${dateLabel}</div>
      <div style="color:var(--text3);padding:8px 0">Нет мероприятий. <button class="btn btn-primary btn-sm" onclick="openNewEvent('${dateStr}')">+ Создать</button></div>
    </div>`;
    return;
  }

  let html=`<div class="event-panel"><div class="ep-title">${dateLabel} — ${photoCount+aqCount} мероприятий</div>`;

  if(showPhoto){
  for(const ev of dayPhotoEvents){
    const vName=venues.find(v=>v.id===ev.venue_id)?.name||'Площадка';
    const shifts = await loadEventShifts(ev.id).catch(() => []);
    const assignedTotal = shifts.reduce((sum, sh) => {
      const active = (sh.assignments || []).filter(a => a.status !== 'cancelled').length;
      return sum + active;
    }, 0);
    const neededTotal = shifts.reduce((sum, sh) => sum + (parseInt(sh.required_count || 1, 10) || 0), 0);

    html+=`<div style="padding:12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="font-size:14px;font-weight:600;flex:1">${esc(vName)}</div>
        <span style="font-size:11px;color:${assignedTotal>=neededTotal?'var(--rank1)':'var(--rank2)'}">${assignedTotal}/${neededTotal || 0} назначено</span>
        <button class="btn btn-primary btn-sm" onclick="openAssignModal('${ev.id}')">+ Назначить</button>
      </div>
      ${renderShiftsSections(shifts, ev.id)}
    </div>`;
  }
  }

  if(showAq){
    html+=`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Аквагрим</div>
      ${(dayAqEvents||[]).length ? (dayAqEvents||[]).map(aqEv=>{
        const assigned=aqEv.assigned_count||0;
        const reqTotal=(aqEv.required_aquagrimers||0)+(aqEv.required_senior_aquagrimers||0)+(aqEv.required_aq_managers||0);
        const vName=aqEv.venue_name || (venues.find(v=>v.id===aqEv.venue_id)?.name||'Площадка');
        const color = assigned>=reqTotal ? '#3ecfb4' : (assigned>0 ? 'var(--rank2)' : 'var(--rank3)');
        return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:10px;border:1px solid rgba(62,207,180,.25);margin-bottom:6px">
          <div style="flex:1;font-weight:600;color:#3ecfb4">🎨 ${esc(vName)}</div>
          <div style="font-size:11px;color:${color}">${assigned}/${reqTotal}</div>
          <button class="btn btn-ghost btn-sm" onclick="openAqEvent('${aqEv.id}')">Открыть</button>
        </div>`;
      }).join('') : `<div style="color:var(--text3);font-size:12px;padding:6px 0">Нет аквагрим-событий</div>`}
    </div>`;
  }

  html+='</div>';
  panel.innerHTML=html;
  currentEventDate = dateStr;
  if (dayPhotoEvents[0]?.id) currentEventId = dayPhotoEvents[0].id;
}

// Загрузка смен события с назначениями
async function loadEventShifts(eventId) {
  const shifts = await api('GET', `/shifts?event_id=${eventId}`);
  const result = [];
  for (const sh of shifts) {
    const assignments = await api('GET', `/shifts/${sh.id}/assignments`).catch(() => []);
    result.push({ ...sh, assignments });
  }
  return result;
}

function renderShiftsSections(shifts, eventId) {
  const ROLE_ICONS = { photographer:'📸', admin:'🖨️', manager:'👔', mentor:'🎓', helper:'🤝' };
  const ROLE_LABELS_LOCAL = { photographer:'Фотографы', admin:'АдМэны', manager:'Менеджеры', mentor:'Наставники', helper:'Помощники' };
  const ROLE_COLORS_LOCAL = { photographer:'#7c6cff', admin:'#3ecf8e', manager:'#f5a623', mentor:'#9b8dff', helper:'#9090a8' };

  if (!shifts || !shifts.length) return '<div style="color:var(--text3);font-size:12px">Смены не созданы</div>';

  const byRole = {};
  for (const sh of shifts) {
    const role = sh.target_role || 'photographer';
    if (!byRole[role]) byRole[role] = [];
    byRole[role].push(sh);
  }

  let html = '';
  const roleOrder = ['photographer','admin','manager','mentor','helper'];
  for (const role of roleOrder) {
    if (!byRole[role]) continue;
    const color = ROLE_COLORS_LOCAL[role];
    const label = ROLE_LABELS_LOCAL[role] || role;
    const icon = ROLE_ICONS[role] || '👤';
    html += `<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:600;color:${color};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${icon} ${label}</div>`;
    for (const sh of byRole[role]) {
      const activeAssignments = (sh.assignments || []).filter(a => a.status !== 'cancelled');
      const filled = activeAssignments.length || parseInt(sh.assigned_count || 0, 10);
      const needed = parseInt(sh.required_count || 1, 10);
      const gapColor = filled >= needed ? 'var(--rank1)' : filled > 0 ? 'var(--rank2)' : 'var(--rank3)';
      const timeStr = sh.start_time ? `${sh.start_time}–${sh.end_time || '?'}` : '';
      html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:12px;font-weight:500">${esc(sh.shift_name || 'Смена')}</span>
          <span style="font-size:11px;color:var(--text3)">${timeStr}</span>
          <span style="font-size:11px;font-weight:600;color:${gapColor}">${filled}/${needed}</span>
        </div>`;
      if (activeAssignments.length) {
        html += `<div style="display:flex;flex-wrap:wrap;gap:4px">` +
          activeAssignments.map(a =>
            `<span style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px">${esc(a.photographer_name || a.name || '?')}</span>`
          ).join('') + `</div>`;
      }
      html += `<button class="btn btn-ghost" style="font-size:11px;padding:3px 8px;margin-top:4px"
        onclick="currentEventId='${eventId}';openAssignModalForShift('${sh.id}')">+ Назначить</button>`;
      html += `</div>`;
    }
    html += `<button class="btn btn-ghost" style="font-size:11px;padding:3px 8px;color:${color}"
      onclick="currentEventId='${eventId}';addShiftForRole('${eventId}', '${role}')">+ Смена ${label}</button>`;
    html += `</div>`;
  }
  return html;
}

function prevMonth(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}loadCalendar();document.getElementById('event-detail').innerHTML='';}
function nextMonth(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}loadCalendar();document.getElementById('event-detail').innerHTML='';}
function goToday(){currentMonth=new Date().getMonth();currentYear=new Date().getFullYear();loadCalendar();}

function openNewEvent(date){
  document.getElementById('ev-date').value=date||new Date().toISOString().split('T')[0];
  updateBlockLabels();
  modalShiftsConfig = {};
  document.getElementById('ev-shifts-config').innerHTML = '<div style="color:var(--text3);font-size:12px">Выберите площадку и дату для загрузки конфигурации смен</div>';
  const venueFilter = document.getElementById('venue-filter')?.value;
  if (venueFilter) {
    document.getElementById('ev-venue').value = venueFilter;
    loadVenueShiftConfig();
  }
  document.getElementById('event-modal').classList.add('open');
}

function updateBlockLabels() {
  // Labels are static in the new create-event modal.
}

async function createEvent(){
  const venueId=document.getElementById('ev-venue').value;
  const date=document.getElementById('ev-date').value;
  if(!venueId||!date){showToast('Площадка и дата обязательны',true);return;}
  try{
    const block = (canSeeAq() ? (document.getElementById('ev-block')?.value || 'photo') : 'photo');
    const body = {
      venue_id: venueId,
      event_date: date,
      event_type: document.getElementById('ev-type')?.value || 'regular',
      guest_start: document.getElementById('ev-guest-start')?.value || null,
      event_start: document.getElementById('ev-event-start')?.value || null,
      event_end: document.getElementById('ev-event-end')?.value || null,
      schedule_status: 'confirmed',
      notes: document.getElementById('ev-notes')?.value.trim() || null,
      shifts_config: Object.keys(modalShiftsConfig).length ? modalShiftsConfig : undefined,
    };
    if (block === 'aquagrim') {
      await api('POST','/aq/events', body);
    } else {
      await api('POST','/events', body);
    }
    document.getElementById('event-modal').classList.remove('open');
    showToast('Мероприятие создано');
    await loadCalendar();
  }catch(e){showToast(e.message,true);}
}

async function loadVenueShiftConfig() {
  const venueId = document.getElementById('ev-venue').value;
  const dateVal = document.getElementById('ev-date').value;
  const dayType = document.getElementById('ev-type').value;
  const container = document.getElementById('ev-shifts-config');

  if (!venueId) {
    container.innerHTML = '<div style="color:var(--text3);font-size:12px">Выберите площадку</div>';
    return;
  }

  try {
    const venue = venues.find(v => String(v.id) === String(venueId));
    if (!venue) return;

    let config = null;
    const isWeekend = dateVal ? [0,6].includes(new Date(dateVal).getDay()) : false;
    if (dayType === 'holiday' && venue.default_shifts_holiday) config = venue.default_shifts_holiday;
    else if (isWeekend && venue.default_shifts_weekend) config = venue.default_shifts_weekend;
    else if (!isWeekend && venue.default_shifts_weekday) config = venue.default_shifts_weekday;
    else config = venue.default_shifts || { photographer: [{ name:'Основная', start:'09:30', end:'20:00', required:1 }] };

    if (typeof config === 'string') {
      try { config = JSON.parse(config); } catch { config = {}; }
    }
    modalShiftsConfig = JSON.parse(JSON.stringify(config || {}));
    renderModalShiftsConfig();
  } catch(e) {
    container.innerHTML = `<div style="color:var(--rank3);font-size:12px">Ошибка загрузки конфига: ${esc(e.message)}</div>`;
  }
}

function renderModalShiftsConfig() {
  const container = document.getElementById('ev-shifts-config');
  const ROLE_LABELS_LOCAL = { photographer:'📸 Фотографы', admin:'🖨️ АдМэны', manager:'👔 Менеджеры', mentor:'🎓 Наставники', helper:'🤝 Помощники' };
  const ROLE_COLORS_LOCAL = { photographer:'#7c6cff', admin:'#3ecf8e', manager:'#f5a623', mentor:'#9b8dff', helper:'#9090a8' };

  if (!Object.keys(modalShiftsConfig).length) {
    container.innerHTML = '<div style="color:var(--text3);font-size:12px">Нет конфигурации смен для площадки</div>';
    return;
  }

  let html = '';
  const roleOrder = ['photographer','admin','manager','mentor','helper'];
  for (const role of roleOrder) {
    if (!modalShiftsConfig[role]) continue;
    const color = ROLE_COLORS_LOCAL[role] || '#9090a8';
    const label = ROLE_LABELS_LOCAL[role] || role;
    html += `<div style="margin-bottom:10px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px">
      <div style="font-size:11px;font-weight:600;color:${color};margin-bottom:6px">${label}</div>`;
    modalShiftsConfig[role].forEach((sh, idx) => {
      html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
        <input class="fin" style="flex:1.5;font-size:12px;padding:4px 8px" type="text"
          value="${esc(sh.name || '')}" placeholder="Название"
          onchange="modalShiftsConfig['${role}'][${idx}].name=this.value"/>
        <input class="fin" style="width:70px;font-size:12px;padding:4px 6px" type="time"
          value="${sh.start||''}"
          onchange="modalShiftsConfig['${role}'][${idx}].start=this.value"/>
        <span style="color:var(--text3);font-size:11px">—</span>
        <input class="fin" style="width:70px;font-size:12px;padding:4px 6px" type="time"
          value="${sh.end||''}"
          onchange="modalShiftsConfig['${role}'][${idx}].end=this.value"/>
        <input class="fin" style="width:44px;font-size:12px;padding:4px 6px;text-align:center" type="number"
          value="${sh.required||1}" min="1" max="20" title="Кол-во человек"
          onchange="modalShiftsConfig['${role}'][${idx}].required=parseInt(this.value)||1"/>
        <button onclick="removeModalShift('${role}',${idx})" style="background:none;border:none;color:var(--rank3);cursor:pointer;font-size:14px;padding:2px 4px" title="Убрать смену">✕</button>
      </div>`;
    });
    html += `<button class="btn btn-ghost" style="font-size:11px;padding:3px 8px;color:${color};margin-top:2px"
      onclick="addModalShift('${role}')">+ Смена</button>
    </div>`;
  }

  const existingRoles = Object.keys(modalShiftsConfig);
  if (!existingRoles.includes('mentor') || !existingRoles.includes('helper')) {
    html += `<div style="display:flex;gap:6px;flex-wrap:wrap">`;
    if (!existingRoles.includes('mentor')) html += `<button class="btn btn-ghost" style="font-size:11px" onclick="addModalRole('mentor')">+ Наставник</button>`;
    if (!existingRoles.includes('helper')) html += `<button class="btn btn-ghost" style="font-size:11px" onclick="addModalRole('helper')">+ Помощник</button>`;
    html += `</div>`;
  }

  container.innerHTML = html;
}

function removeModalShift(role, idx) {
  modalShiftsConfig[role].splice(idx, 1);
  if (!modalShiftsConfig[role].length) delete modalShiftsConfig[role];
  renderModalShiftsConfig();
}

function addModalShift(role) {
  if (!modalShiftsConfig[role]) modalShiftsConfig[role] = [];
  const prev = modalShiftsConfig[role].slice(-1)[0];
  modalShiftsConfig[role].push({ name: `${modalShiftsConfig[role].length + 1} смена`, start: prev?.start || '09:30', end: prev?.end || '20:00', required: 1 });
  renderModalShiftsConfig();
}

function addModalRole(role) {
  const DEFAULTS = { mentor:{ name:'Наставник',start:'09:30',end:'20:00',required:1 }, helper:{ name:'Помощник',start:'12:00',end:'18:00',required:1 } };
  modalShiftsConfig[role] = [DEFAULTS[role] || { name:'Смена',start:'09:30',end:'20:00',required:1 }];
  renderModalShiftsConfig();
}

async function openAqEvent(eventId) {
  const detail = document.getElementById('event-detail');
  detail.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const ev = aqEvents.find(e => e.id === eventId);
    if (!ev) { detail.innerHTML = ''; return; }

    // Загрузить смены и назначения
    const shifts = await api('GET', `/aq/shifts?event_id=${eventId}`);
    const shift = shifts?.[0] || null;
    let assignments = [];
    if (shift) {
      assignments = await api('GET', `/aq/shifts/${shift.id}/assignments`).catch(() => []);
    }

    const active = (assignments||[]).filter(a => a.status !== 'cancelled');
    const reqTotal = (ev.required_aquagrimers||0) + (ev.required_senior_aquagrimers||0) + (ev.required_aq_managers||0);

    detail.innerHTML = `
    <div class="event-panel" style="border-color:rgba(62,207,180,.3)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;color:#3ecfb4">🎨 ${esc(ev.venue_name || venues.find(v=>v.id===ev.venue_id)?.name || '')}</div>
          <div style="font-size:12px;color:var(--text3)">${esc(ev.event_date)} ${ev.start_time ? '· '+esc(ev.start_time) : ''}</div>
        </div>
        <div style="font-size:12px;color:var(--text2)">${active.length} / ${reqTotal} назначено</div>
      </div>

      <div style="margin-bottom:12px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Назначенные</div>
        ${active.length ? active.map(a => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg3);border-radius:6px;margin-bottom:4px;font-size:12px">
            <span style="flex:1;font-weight:500">${esc(a.aquagrimer_name || a.name || '—')}</span>
            <span style="font-size:10px;color:var(--text3)">${esc(a.role_in_shift||'')}</span>
            <button class="btn btn-ghost" style="font-size:10px;padding:2px 8px;color:var(--rank3)" onclick="removeAqAssign('${a.id}','${eventId}')">✕</button>
          </div>
        `).join('') : '<div style="color:var(--text3);font-size:12px;padding:8px 0">Никто не назначен</div>'}
      </div>

      ${shift ? `
      <div style="padding-top:10px;border-top:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Назначить аквагримёра</div>
        <div style="display:flex;gap:6px">
          <select class="fselect" id="aq-assign-select" style="flex:1"><option value="">Загрузка...</option></select>
          <select class="fselect" id="aq-assign-role" style="width:auto">
            <option value="aquagrim">Аквагример</option>
            <option value="senior_aquagrim">Старший</option>
            <option value="aquagrim_manager">Менеджер</option>
          </select>
          <button class="btn btn-primary" style="background:#3ecfb4" onclick="assignAq('${shift.id}','${eventId}')">Назначить</button>
        </div>
      </div>` : '<div style="color:var(--rank3);font-size:12px">Смена не создана</div>'}

      <div style="margin-top:10px;text-align:right">
        <button class="btn btn-ghost" style="font-size:11px" onclick="document.getElementById('event-detail').innerHTML=''">Закрыть</button>
      </div>
    </div>`;

    // Загрузить доступных аквагримёров
    if (shift) {
      loadAvailableAq(ev.event_date, ev.venue_id);
    }
  } catch(e) {
    detail.innerHTML = `<div class="event-panel" style="color:var(--rank3)">${esc(e.message)}</div>`;
  }
}

async function loadAvailableAq(date, venueId) {
  try {
    const available = await api('GET', `/aq/staffing/available?date=${date}&venue_id=${venueId}`);
    const sel = document.getElementById('aq-assign-select');
    if (!sel) return;
    sel.innerHTML = '<option value="">Выберите...</option>' +
      (available||[]).map(a => `<option value="${a.id}">${esc(a.name)} ${a.rank ? '★'.repeat(a.rank) : ''}</option>`).join('');
  } catch(e) {
    const sel = document.getElementById('aq-assign-select');
    if (sel) sel.innerHTML = '<option value="">Ошибка загрузки</option>';
  }
}

async function assignAq(shiftId, eventId) {
  const aquagrimerId = document.getElementById('aq-assign-select')?.value;
  const role = document.getElementById('aq-assign-role')?.value || 'aquagrim';
  if (!aquagrimerId) { showToast('Выберите аквагримёра', true); return; }
  try {
    await api('POST', `/aq/shifts/${shiftId}/assignments`, {
      aquagrimer_id: aquagrimerId,
      role_in_shift: role
    });
    showToast('Назначен');
    openAqEvent(eventId);
    loadCalendar();
  } catch(e) { showToast(e.message, true); }
}

async function removeAqAssign(assignId, eventId) {
  try {
    await api('DELETE', `/aq/shift-assignments/${assignId}`);
    showToast('Снят');
    openAqEvent(eventId);
    loadCalendar();
  } catch(e) { showToast(e.message, true); }
}

async function openAssignModalForShift(shiftId) {
  try {
    const shifts = await api('GET', `/shifts?event_id=${currentEventId}`);
    const shift = shifts.find(s => String(s.id) === String(shiftId));
    if (!shift) { showToast('Смена не найдена', true); return; }

    document.getElementById('as-shift-id').value = shiftId;

    const roleSelect = document.getElementById('as-role');
    if (roleSelect && shift.target_role) roleSelect.value = shift.target_role;

    const date = shift.event_date || '';
    const available = await api('GET', `/staffing/available?date=${date}&role=${shift.target_role || 'photographer'}`).catch(() => []);
    const sel = document.getElementById('as-photographer');
    if (available.length) {
      sel.innerHTML = available.map(p =>
        `<option value="${p.id}">${esc(p.name)} ${p.venue_attitude === 'loves' ? '❤️' : '✓'} (${p.shifts_this_month || 0} смен)</option>`
      ).join('');
    } else {
      const phs = await api('GET', '/photographers');
      sel.innerHTML = phs.filter(p => p.is_active).map(p =>
        `<option value="${p.id}">${esc(p.name)}</option>`
      ).join('');
    }
    document.getElementById('assign-modal').classList.add('open');
  } catch(e) { showToast(e.message, true); }
}

async function openAssignModal(eventId){
  try{
    currentEventId = eventId;
    const shifts = await api('GET', `/shifts?event_id=${eventId}`);
    if(!shifts.length){showToast('Смена не создана для этого мероприятия',true);return;}
    await openAssignModalForShift(shifts[0].id);
  }catch(e){showToast(e.message,true);}
}

async function addShiftForRole(eventId, role) {
  const ROLE_LABELS_LOCAL = { photographer:'фотографа', admin:'АдМэна', manager:'менеджера', mentor:'наставника', helper:'помощника' };
  const name = prompt(`Название смены для роли "${ROLE_LABELS_LOCAL[role] || role}":`, 'Дополнительная');
  if (!name) return;
  const start = prompt('Начало смены (HH:MM):', '10:00');
  const end = prompt('Конец смены (HH:MM):', '20:00');
  const req = parseInt(prompt('Сколько человек нужно:', '1') || '1', 10);
  try {
    await api('POST', `/events/${eventId}/shifts`, {
      target_role: role,
      shift_name: name,
      start_time: start || null,
      end_time: end || null,
      required_count: req
    });
    showToast('Смена добавлена');
    showDayEvents(currentEventDate);
  } catch(e) { showToast(e.message, true); }
}

async function assignToShift(){
  const shiftId=document.getElementById('as-shift-id').value;
  const phId=document.getElementById('as-photographer').value;
  const role=document.getElementById('as-role').value;
  if(!phId){showToast('Выберите сотрудника',true);return;}
  try{
    await api('POST',`/shifts/${shiftId}/assignments`,{photographer_id:phId,role_in_shift:role});
    document.getElementById('assign-modal').classList.remove('open');
    showToast('Назначен');
    await loadCalendar();
  }catch(e){showToast(e.message,true);}
}

async function removeAssignment(assignId,dateStr){
  if(!confirm('Снять назначение?'))return;
  try{
    await api('DELETE',`/shift-assignments/${assignId}`);
    showToast('Снято');
    await loadCalendar();
    showDayEvents(dateStr);
  }catch(e){showToast(e.message,true);}
}
</script>
