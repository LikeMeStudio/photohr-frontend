<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>PhotoHR — Отчёты</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6cff;--accent2:#9b8dff;--rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}a{color:inherit;text-decoration:none}
.header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-right:8px}.logo span{color:var(--accent2)}
.header-stats{display:flex;gap:16px;flex:1}
.stat{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.user-pill{padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%}
.nav-links{display:flex;gap:6px;margin-left:12px}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-btn:hover{color:var(--text)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.main{max-width:1200px;margin:0 auto;padding:20px 24px}
.table-wrap{overflow-x:auto}
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.sec-t{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.btn{padding:7px 14px;border-radius:10px;border:none;font-family:'Golos Text',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.btn-primary{background:var(--accent);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.toolbar-unified .btn.btn-ghost{padding:6px 14px;border-radius:20px;font-size:12px}
.fin{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:12px;outline:none}.fin:focus{border-color:var(--accent)}
.fselect{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer}
.fl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.qr-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.qr-shift-row{display:flex;gap:16px;align-items:stretch}
.qr-shift-row>.sec{flex:1;min-width:0}
.qr-shift-row>.sec:first-child{flex:0 0 520px;max-width:520px}
.qr-shift-row{align-items:flex-start}
.shift-grid{display:flex;flex-wrap:wrap;gap:0}
.shift-col{flex:1;min-width:160px;max-width:33.3%}
.shift-col .rr{padding:3px 6px;font-size:12px}
.shift-col .rr-name{font-size:12px}
.qr-box{width:100%;max-width:380px;aspect-ratio:1;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}.qr-box canvas,.qr-box img{width:100%!important;height:auto!important;max-height:100%}
.qr-timer{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:600;color:var(--accent2)}
.rr{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border-radius:7px;border:1px solid var(--border);margin-bottom:3px;font-size:12px}
.rr-name{flex:1;font-weight:500}
.rs{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:500}
.rs-ok{background:rgba(62,207,142,.12);color:var(--rank1)}.rs-late{background:rgba(242,85,85,.12);color:var(--rank3)}.rs-wait{background:rgba(144,144,168,.1);color:var(--text3)}
.pr{display:flex;gap:6px;align-items:center;padding:6px 8px;background:var(--bg3);border-radius:7px;margin-bottom:4px;flex-wrap:wrap;font-size:12px}
.pr .fin{width:70px}
.pr-diff{font-weight:600;color:var(--rank1);min-width:40px;text-align:center}
.st{width:100%;border-collapse:collapse;font-size:11px}.st th,.st td{padding:5px 4px;border:1px solid var(--border);text-align:center}
.st th{background:var(--bg3);font-weight:600;color:var(--text3);font-size:10px;text-transform:none;white-space:nowrap;max-width:88px;overflow:hidden;text-overflow:ellipsis}
.st td:first-child{text-align:left;font-weight:500;background:var(--bg2);min-width:90px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st input{width:44px;padding:2px;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;text-align:center;outline:none}.st input:focus{border-color:var(--accent)}
.st .tot{font-weight:600;background:var(--bg3);color:var(--accent2)}
.sb{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:7px;font-size:11px;font-weight:500}
.sb-d{background:rgba(144,144,168,.1);color:var(--text3)}.sb-s{background:rgba(245,166,35,.1);color:var(--rank2)}.sb-a{background:rgba(62,207,142,.1);color:var(--rank1)}.sb-r{background:rgba(242,85,85,.1);color:var(--rank3)}
.foot{display:flex;gap:6px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;flex-wrap:wrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
.loading{text-align:center;padding:40px;color:var(--text3)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.overlay .modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
/* Classes for mobile-overrideable inline elements */
.venue-finance-row{display:flex;gap:12px;flex-wrap:wrap}
.venue-finance-col{flex:1;min-width:200px}
.admin-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;display:none;padding:0}
.admin-iframe{width:960px;max-width:96vw;height:90vh;border:none;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
@media(max-width:768px){
  .header{padding:10px 14px;gap:8px}
  .nav-links{order:3;width:100%;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
  .nav-links::-webkit-scrollbar{display:none}
  .header-stats{display:none}
  .logo{font-size:16px}
  .toolbar-unified{padding-left:12px;padding-right:12px;flex-wrap:wrap}
  .main{padding:10px 12px}
  .qr-wrap{flex-direction:column}
  .st input{width:36px}
  .qr-shift-row{flex-direction:column}
  .shift-col{max-width:100%}
  .pr{flex-direction:column;align-items:stretch}
  .pr .fin{width:100%}
  .table-wrap{overflow-x:auto}
  .foot .btn{width:100%}
  .overlay{align-items:flex-end;padding:0}
  .overlay .modal{border-radius:18px 18px 0 0;max-height:88vh;width:100%;max-width:100%}
  /* ── venue.html mobile v2 ── */
  .qr-shift-row{flex-direction:column}
  .qr-shift-row>.sec:first-child{flex:1 1 auto;max-width:100%}
  .shift-col{max-width:100%;min-width:0}
  .qr-box{max-width:260px;margin:0 auto}
  .qr-timer{font-size:18px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
  .st{min-width:500px}
  .st input{width:40px;font-size:12px;padding:3px 2px}
  .st th{font-size:9px;padding:4px 3px}
  .st td{padding:4px 3px;font-size:11px}
  .st td:first-child{min-width:70px;max-width:90px;font-size:10px}
  .pr{flex-direction:column;align-items:stretch;gap:4px}
  .pr .fin{width:100%}
  .pr-diff{text-align:left;min-width:0}
  .sec{padding:12px;margin-bottom:10px;border-radius:10px}
  .sec-t{font-size:12px;margin-bottom:8px}
  .foot{flex-direction:column}
  .foot .btn{width:100%;text-align:center}
  .toolbar-unified{padding:8px 12px!important;gap:6px!important}
  .toolbar-unified .fselect,.toolbar-unified .fin{font-size:12px;padding:6px 8px}
  .rc-grid{gap:2px}
  .rc-day{min-height:44px;padding:3px}
  .rc-day .rc-num{font-size:10px}
  .rc-badge{font-size:7px;padding:1px 2px}
  .overlay .modal{max-width:100%!important;border-radius:18px 18px 0 0;max-height:88vh}
  .sec div[style*="display:flex"][style*="min-width:200px"]{min-width:0!important;width:100%!important}
  .venue-finance-row{flex-direction:column;gap:8px}
  .venue-finance-col{min-width:0!important;width:100%}
  .admin-iframe{width:100vw!important;max-width:100vw!important;height:100vh!important;border-radius:0!important}
  .admin-overlay{padding:0!important;align-items:stretch!important}
  /* Safe area для iPhone с notch */
  .header{padding-top:max(10px, env(safe-area-inset-top))}
  .toast{bottom:max(20px, env(safe-area-inset-bottom))}
  body{padding-bottom:env(safe-area-inset-bottom)}
}
.zone-cell.live-drop-over,.live-drop-over{outline:2px solid var(--accent);background:rgba(124,108,255,.08)}
.venue-card:hover{border-color:var(--accent)!important}
.rc-wrap{margin-bottom:16px}
.rc-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rc-nav .btn{padding:4px 10px}
.rc-month{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600}
.rc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.rc-head{font-size:10px;color:var(--text3);text-align:center;padding:4px}
.rc-day{border:1px solid var(--border);border-radius:6px;padding:3px 4px;min-height:52px;font-size:10px;cursor:pointer;transition:border-color .15s}
.rc-day:hover{border-color:var(--accent)}
.rc-day .rc-num{font-family:'Unbounded',sans-serif;font-size:11px;margin-bottom:2px}
.rc-day.rc-today{border-color:var(--rank1);border-width:2px}
.rc-day.rc-today .rc-num{color:var(--rank1);font-weight:700}
.rc-day.rc-selected{border-color:var(--accent);background:rgba(124,108,255,.1);border-width:2px}
.rc-day.rc-today.rc-selected{border-color:var(--rank1);background:rgba(62,207,142,.08)}
.rc-day.rc-empty{border-color:transparent;cursor:default;min-height:0}
.rc-day.rc-empty:hover{border-color:transparent}
.rc-badges{display:flex;flex-wrap:wrap;gap:2px}
.rc-badge{font-size:8px;font-weight:600;padding:1px 3px;border-radius:3px;white-space:nowrap;line-height:1.3}
.rc-badge.st-approved{background:rgba(62,207,142,.2);color:var(--rank1)}
.rc-badge.st-submitted{background:rgba(245,166,35,.2);color:#f5a623}
.rc-badge.st-draft,.rc-badge.st-returned,.rc-badge.st-missing{background:rgba(242,85,85,.15);color:var(--rank3)}
.rc-legend{display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--text3);flex-wrap:wrap}
.rc-legend span{display:flex;align-items:center;gap:3px}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="logo" style="text-decoration:none;color:inherit">Photo<span>HR</span></a>
  <div class="nav-links" id="nav-links"></div>
  <div class="header-stats" id="hstats"></div>
  <div class="header-right">
    <button class="btn btn-ghost" id="btn-management" style="display:none;font-size:13px;padding:6px 12px" onclick="openAdmin()">⚙ Управление</button>
    <div class="user-pill" id="user-pill" onclick="openProfile()" style="cursor:pointer" title="Мой профиль"></div>
    <button class="btn btn-ghost" onclick="doLogout()" style="font-size:13px;padding:6px 12px">Выйти</button>
  </div>
</div>
<div class="main">
<div class="toolbar-unified" style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
<input class="fin" type="date" id="sd" onchange="onDateChange()" style="width:auto"/>
<button class="btn btn-ghost" id="btn-settings" onclick="openVenueSettings()" title="Настройки площадки" style="font-size:14px;padding:5px 10px;display:none">⚙️</button>
<button type="button" class="btn btn-primary" id="btn-live" onclick="toggleLiveShiftPanel()" style="display:none;font-size:12px;padding:4px 10px;background:#e74c3c;border-color:#c0392b">🔴 LIVE</button>
<button class="btn btn-ghost" id="btn-back" onclick="backToDashboard()" style="display:none">← К площадкам</button>
<select class="fselect" id="vs" style="display:none" onchange="load()"><option value="">Площадка...</option></select>
<div id="rs"></div><div style="flex:1"></div><div id="rstat"></div>
<button class="btn btn-ghost" id="btn-review" onclick="toggleReviewMode()" style="display:none">📋 На проверке</button>
</div>
<div id="C"><div class="loading">Выберите площадку и дату</div></div>
</div>

<!-- Venue Settings Modal -->
<div class="overlay" id="vs-modal" onclick="if(event.target===this)closeVenueSettings()" style="display:none">
<div class="modal" style="max-width:600px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600">⚙️ Настройки площадки</span>
    <button class="dr-close" onclick="closeVenueSettings()" style="width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="vs-content"><div class="loading">Загрузка...</div></div>
</div>
</div>

<!-- Bonus schemes manager (above venue settings z-index) -->
<div class="overlay" id="bs-modal" onclick="if(event.target===this)closeBsModal()" style="display:none;z-index:210;flex-wrap:wrap">
<div class="modal" style="max-width:860px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600">📝 Бонусные схемы</span>
    <button class="dr-close" onclick="closeBsModal()" style="width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="bs-content"><div class="loading">Загрузка...</div></div>
</div>
</div>

<div class="toast" id="toast"></div>
<script>
const API=window.location.hostname==='localhost'?'http://localhost:3001/api':'https://fotohr-server-production.up.railway.app/api';
let AT=localStorage.getItem('fhr_access')||null,RT=localStorage.getItem('fhr_refresh')||null,U=null,currentUser=null,venues=[],shift=null,allShifts=[],assigns=[],prods=[],report=null,qi=null,viewMode='dashboard',dashboardData=null;
window.__liveEventId=null;
let liveShiftPollTimer=null;
let _liveDashboardCache=null;
let checkinPollInterval=null;
let isDirty=false,settingsChanged=false,autoSaveTimeout=null,venueBonusConfigs=[],_calcLock=false,allSchemes=[],bonusConfigs=[],allPhotographersPool=[],_bonusDebounce=null,_saveDebounce=null;
window.__bonusMeta={};
window.__calcResult=null;
function markDirty(){isDirty=true;}
function bonusAmountForPh(ph){
const m=window.__bonusByPh||{};
const raw=m[ph];
if(raw==null||raw==='')return 0;
if(typeof raw==='object'&&raw!==null&&'total' in raw)return Number(raw.total)||0;
return Number(raw)||0;
}
function bonusCashFromPh(ph){
const meta=window.__bonusMeta?.[ph];
if(meta&&meta.from_cash!=null)return Number(meta.from_cash)||0;
return bonusAmountForPh(ph);
}
function calcBonusLocal(block,revenue){
if(!block||!revenue||revenue<=0)return 0;
let bonus=0;
const thresholds=block.thresholds||[];
const sorted=[...thresholds].sort((a,b)=>(b.from||0)-(a.from||0));
for(const t of sorted){if(revenue>=(t.from||0)){bonus=parseFloat(t.bonus)||0;break;}}
for(const p of (block.progressive||[])){
const above=parseFloat(p.above)||0,every=parseFloat(p.every)||1,add=parseFloat(p.add)||0;
if(revenue>above&&every>0)bonus+=Math.floor((revenue-above)/every)*add;
}
return Math.round(bonus);
}
function getProductPrinterFormatForProduct(p){
if(!p)return null;
const pf=p.printer_format;
if(pf&&String(pf).trim())return normPrinterFmtSaved(pf)||String(pf).trim();
return getProductPrinterFormat(p.product_name||p.name||'');
}
function normPrinterFmtSaved(f){
const x=String(f||'').toLowerCase().replace(/х/g,'x').replace(/\s/g,'');
if(x.includes('15x21'))return'15x20';
if(x.includes('10x15')||x.includes('10х15'))return'10x15';
if(x.includes('15x20')||x.includes('15х20'))return'15x20';
if(x==='a4'||x.includes('a4')||x.includes('а4'))return'A4';
return null;
}
function getProductPrinterFormat(productName){
if(!productName)return null;
const n=String(productName).toLowerCase();
if(n.includes('пластик'))return null;
if(n.includes('а4')||n.includes('a4'))return'A4';
if(n.includes('15x20')||n.includes('15х20')||n.includes('15x21')||n.includes('15х21'))return'15x20';
if(n.includes('10x15')||n.includes('10х15')||n.includes('магнит'))return'10x15';
return null;
}
function resolveDayTypeForBonus(){
const dt=(report&&report.report_date)||document.getElementById('sd')?.value;
if(!dt)return'weekday';
if(report&&report.day_type==='holiday')return'holiday';
const d=new Date(dt+'T12:00:00');
const dow=d.getDay();
return dow===0||dow===6?'weekend':'weekday';
}
function hasPhotographerBonusConfig(){
const dt=resolveDayTypeForBonus();
return(venueBonusConfigs||[]).some(c=>c.day_type===dt&&c.scheme_id);
}
const ROLE_LABELS={admin:'Администратор',exec_director:'Исполнительный директор',hr_director:'HR-директор',hr_manager:'HR-менеджер',recruiter:'Рекрутер',tech_director:'Тех-директор',site_specialist:'Специалист по сайту',cashier:'Инкассация',photographer_user:'Сотрудник',aq_user:'Аквагримёр',aq_manager:'Менеджер аквагрима',archived:'Архив'};
const ROLE_COLORS={admin:'#ffd700',exec_director:'#f5a623',hr_director:'#3ecf8e',hr_manager:'#4ecb8a',recruiter:'#e86aa6',tech_director:'#8a7aee',site_specialist:'#6aa6e8',cashier:'#e87a6a',photographer_user:'#9090a8',aq_user:'#3ecfb4',aq_manager:'#5ee8d0',archived:'#5a5a72'};
const ROLES={photographer_user:0,aq_user:0,recruiter:1,hr_manager:1,tech_director:1,site_specialist:1,aq_manager:1,cashier:2,hr_director:2,exec_director:3,admin:4};
const roleNow=()=>currentUser?.role||'photographer_user';
const can=(r)=>(ROLES[roleNow()]??-1)>=(ROLES[r]??99);
const isEditor=()=>can('hr_manager');
const hasAnyRole=(roles)=>roles.includes(roleNow());
const canLiveShiftUi=()=>hasAnyRole(['cashier','hr_manager','hr_director','exec_director','admin']);
function openProfile(){location.href='photographers.html?profile=1';}
function fillPlaceholderStats(){const hs=document.getElementById('hstats');if(!hs)return;hs.innerHTML='<div class="stat"><div class="stat-num" style="color:var(--accent2)">—</div><div class="stat-lbl">Всего</div></div><div class="stat"><div class="stat-num" style="color:var(--rank1)">—</div><div class="stat-lbl">Топ</div></div><div class="stat"><div class="stat-num" style="color:var(--rank2)">—</div><div class="stat-lbl">Средний балл</div></div>';}
function setupUserPill(){const c=ROLE_COLORS[currentUser.role]||'#9090a8';document.getElementById('user-pill').innerHTML=`<div class="role-dot" style="background:${c}"></div><span>${esc(currentUser.name)}</span><span style="color:var(--text3);font-size:11px">${ROLE_LABELS[currentUser.role]||currentUser.role}</span>`;}

async function api(m,p,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(AT)o.headers.Authorization='Bearer '+AT;if(b)o.body=JSON.stringify(b);let r=await fetch(API+p,o);if(r.status===401&&RT){try{if(!refreshLock){refreshLock=(async()=>{const x=await fetch(API+'/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:RT})});if(!x.ok)throw new Error('refresh_failed');const d=await x.json();AT=d.accessToken;RT=d.refreshToken;localStorage.setItem('fhr_access',AT);localStorage.setItem('fhr_refresh',RT);})();}await refreshLock;o.headers.Authorization='Bearer '+AT;r=await fetch(API+p,o);}catch{doLogout();return null;}finally{refreshLock=null;}}if(!r.ok){const e=await r.json().catch(()=>({error:'Ошибка'}));throw new Error(e.error||'Ошибка');}return r.json();}
function doLogout(){localStorage.removeItem('fhr_refresh');localStorage.removeItem('fhr_access');location.href='index.html';}
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');setTimeout(()=>t.className='toast',2500);}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getRcMonth(){
if(rcMonth)return rcMonth;
const dt=document.getElementById('sd').value;
return dt?dt.slice(0,7):new Date().toISOString().slice(0,7);
}

async function loadReportCalendar(){
const m=getRcMonth();
try{
rcData=await api('GET',`/daily-reports/calendar?month=${m}`);
}catch(e){rcData=[];}
renderReportCalendar();
}

function rcPrevMonth(){
const[y,m]=getRcMonth().split('-').map(Number);
const d=new Date(y,m-2,1);
rcMonth=d.toISOString().slice(0,7);
loadReportCalendar();
}

function rcNextMonth(){
const[y,m]=getRcMonth().split('-').map(Number);
const d=new Date(y,m,1);
rcMonth=d.toISOString().slice(0,7);
loadReportCalendar();
}

function renderReportCalendar(){
const wrap=document.getElementById('rc-calendar');
if(!wrap)return;
const m=getRcMonth();
const[y,mo]=m.split('-').map(Number);
const monthNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const dayNames=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const daysInMonth=new Date(y,mo,0).getDate();
const firstDow=(new Date(y,mo-1,1).getDay()+6)%7;
const todayStr=new Date().toISOString().split('T')[0];
const selectedStr=document.getElementById('sd').value||todayStr;
const STLBL={approved:'Проведён',submitted:'Отправлен',draft:'Черновик',returned:'Возвращён',missing:'Нет отчёта'};
const byDate={};
for(const r of rcData){
if(!byDate[r.date])byDate[r.date]=[];
byDate[r.date].push(r);
}
let html=`<div class="rc-nav">
<button class="btn btn-ghost" onclick="rcPrevMonth()">◀</button>
<span class="rc-month">${monthNames[mo-1]} ${y}</span>
<button class="btn btn-ghost" onclick="rcNextMonth()">▶</button>
</div>`;
html+='<div class="rc-grid">';
dayNames.forEach(d=>{html+=`<div class="rc-head">${d}</div>`;});
for(let i=0;i<firstDow;i++)html+='<div class="rc-day rc-empty"></div>';
for(let d=1;d<=daysInMonth;d++){
const ds=`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const isToday=ds===todayStr;
const isSelected=ds===selectedStr;
const entries=byDate[ds]||[];
const cls=['rc-day'];
if(isToday)cls.push('rc-today');
if(isSelected)cls.push('rc-selected');
const badges=entries.map(e=>{
const label=esc((e.venue_short||e.venue_name||'').slice(0,5));
const stCls='rc-badge st-'+e.status;
const t=esc(e.venue_name)+': '+(STLBL[e.status]||e.status);
return`<div class="${stCls}" title="${t}">${label}</div>`;
}).join('');
html+=`<div class="${cls.join(' ')}" onclick="rcClickDay('${ds}')">
<div class="rc-num">${d}</div>
<div class="rc-badges">${badges}</div>
</div>`;
}
html+='</div>';
html+=`<div class="rc-legend">
<span><div class="rc-badge st-approved" style="position:static;display:inline-block">OK</div> Проведён</span>
<span><div class="rc-badge st-submitted" style="position:static;display:inline-block">OK</div> Отправлен</span>
<span><div class="rc-badge st-missing" style="position:static;display:inline-block">OK</div> Нет / черновик</span>
</div>`;
wrap.innerHTML=html;
}

async function loadReviewData(){
  try {
    const qs=Object.entries(reviewFilters).filter(([,v])=>v).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
    const [data,stats]=await Promise.all([
      api('GET',`/daily-reports/review-list?${qs}&limit=100`),
      api('GET',`/daily-reports/review-stats?from=${reviewFilters.from||''}&to=${reviewFilters.to||''}&venue_id=${reviewFilters.venue_id||''}`),
    ]);
    if(reviewVariant==='tabs') renderReviewTabs(data,stats);
    else renderReviewTable(data,stats);
  } catch(e){ document.getElementById('C').innerHTML=`<div class="loading" style="color:var(--rank3)">${esc(e.message)}</div>`; }
}
function setReviewFilter(k,v){ reviewFilters[k]=v; loadReviewData(); }

async function openReviewDetail(reportId,venueId,dateStr){
  document.getElementById('C').innerHTML='<div class="loading">Загрузка...</div>';
  try {
    const [rpt,history]=await Promise.all([api('GET',`/daily-reports/${reportId}`),api('GET',`/daily-reports/${reportId}/history`).catch(()=>[])]);
    const rd=(rpt.report_date||'').split('T')[0];
    const dl=new Date(rd+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
    const SL2={submitted:'📤 На проверке',approved:'✅ Проведён',returned:'↩ Возвращён',rejected:'❌ Отклонён',draft:'📝 Черновик'};
    const SC3={submitted:'var(--rank2)',approved:'var(--rank1)',returned:'var(--rank3)',rejected:'var(--rank3)',draft:'var(--text3)'};
    let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600">📋 ${esc(rpt.venue_name)} — ${dl}</span>

async function lookupDelivery() {
  let token = (document.getElementById('deliver-token')?.value || '').trim();
  if (!token) { toast('Введите токен', 1); return; }
  if (/guest\.html|[?&]t=/.test(token)) {
    try {
      const u = token.startsWith('http') ? new URL(token) : new URL(token.replace(/^\/+/, ''), 'https://placeholder.invalid/');
      const t = u.searchParams.get('t');
      if (t) token = t;
    } catch (e) {
      const m = token.match(/[?&]t=([^&]+)/);
      if (m) token = decodeURIComponent(m[1]);
    }
  }

  const el = document.getElementById('deliver-result');
  el.innerHTML = '<div style="color:var(--text3);padding:10px">Поиск...</div>';

  try {
    const data = await api('GET', `/photo-sales/by-token/${encodeURIComponent(token)}`);
    deliverQrToken = token;
    renderDeliverCard(data);
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rank3);padding:10px">${esc(e.message)}</div>`;
  }
}

function renderDeliverCard(data) {
  const amt = parseFloat(data.total_amount) || 0;
  const paid = parseFloat(data.paid_amount) || 0;
  const isPaid = data.payment_status === 'paid';
  const isDelivered = data.is_delivered;
  const tok = deliverQrToken;

  let html = `<div style="background:var(--bg2);border-radius:12px;padding:14px;margin-top:10px;border-left:3px solid ${isDelivered ? 'var(--rank1)' : isPaid ? 'var(--accent)' : 'var(--rank2)'}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-weight:600;font-size:14px">${esc(data.venue_name)}</span>
      ${isDelivered ? '<span style="color:var(--rank1);font-size:12px">✅ Уже выдано</span>' : isPaid ? '<span style="color:var(--rank1);font-size:12px">💰 Оплачено</span>' : `<span style="color:var(--rank2);font-size:12px">⚠️ К оплате: ${(amt - paid).toLocaleString('ru-RU')}₽</span>`}
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px">
      📸 ${esc(data.photographer_name)} · ${new Date(data.created_at).toLocaleDateString('ru-RU')}
      ${data.guest_name ? ' · 👤 ' + esc(data.guest_name) : ''}
    </div>`;

  if (data.items && data.items.length) {
    html += `<div style="margin-bottom:8px">`;
    for (const item of data.items) {
      html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">
        <span>${esc(item.product_name)} × ${item.quantity}</span>
        <span>${Number(item.total || 0).toLocaleString('ru-RU')}₽</span>
      </div>`;
    }
    html += `</div>`;
  }

  if (data.series && data.series.length) {
    html += `<div style="font-size:11px;color:var(--text3);margin-bottom:8px">📷 ${data.series.map(s => esc(s.camera_prefix) + s.frame_start + '–' + s.frame_end).join(', ')}</div>`;
  }

  html += `<div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--rank1)">Итого: ${amt.toLocaleString('ru-RU')}₽</div>`;

  if (!data.guest_email && !data.guest_phone) {
    html += `<div style="border-top:1px solid var(--border);padding-top:10px;margin-bottom:10px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">👤 Контакты гостя (для отправки фото)</div>
      <div style="display:grid;gap:6px">
        <input id="deliver-guest-email" class="fin" placeholder="Email" style="font-size:12px;padding:8px">
        <input id="deliver-guest-phone" class="fin" placeholder="Телефон" style="font-size:12px;padding:8px">
      </div>
    </div>`;
  }

  if (!isDelivered) {
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap">
      ${!isPaid ? `<button type="button" class="btn" onclick="markPaidAndDeliver()" style="flex:1;min-width:120px;background:var(--rank2);border:none">💰 Оплачено + Выдать</button>` : ''}
      <button type="button" class="btn btn-primary" onclick="markDelivered()" style="flex:1;min-width:120px">📦 Выдать фото</button>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('deliver-result').innerHTML = html;
}

async function markDelivered() {
  const token = deliverQrToken;
  if (!token) { toast('Сначала найдите заказ', 1); return; }
  try {
    const email = document.getElementById('deliver-guest-email')?.value?.trim();
    const phone = document.getElementById('deliver-guest-phone')?.value?.trim();
    if (email || phone) {
      const data = await api('GET', `/photo-sales/by-token/${encodeURIComponent(token)}`);
      if (data.id) await api('PATCH', `/photo-sales/${data.id}/guest`, { email: email || undefined, phone: phone || undefined }).catch(() => {});
    }
    await api('POST', `/photo-sales/by-token/${encodeURIComponent(token)}/deliver`);
    toast('✅ Фото выданы');
    closeDeliverModal();
  } catch (e) { toast(e.message, 1); }
}

async function markPaidAndDeliver() {
  const token = deliverQrToken;
  if (!token) { toast('Сначала найдите заказ', 1); return; }
  try {
    const data = await api('GET', `/photo-sales/by-token/${encodeURIComponent(token)}`);
    if (data.id) {
      await api('PATCH', `/photo-sales/${data.id}/pay`, { payment_method: 'cash', paid_amount: parseFloat(data.total_amount) || 0 });
    }
    await markDelivered();
  } catch (e) { toast(e.message, 1); }
}

async function pollCheckins(){
if(!shift)return;
try{
const allFreshPromises=(allShifts.length?allShifts:[shift]).map(s=>api('GET',`/shifts/${s.id}/assignments`).catch(()=>[]));
const allFreshArrays=await Promise.all(allFreshPromises);
const freshAssigns=allFreshArrays.flat();
if(!freshAssigns||!freshAssigns.length)return;
let changed=false;
if(freshAssigns.length!==assigns.length)changed=true;
for(const fa of freshAssigns){
const old=assigns.find(a=>a.id===fa.id);
if(!old){changed=true;continue;}
const oldCh=old.checkin_at||old.checked_in;
const newCh=fa.checkin_at||fa.checked_in;
if((!oldCh&&newCh)||(oldCh&&!newCh)||(old.late_status!==fa.late_status)){
changed=true;
break;
}
}
if(changed){
assigns=freshAssigns;
const vid=document.getElementById('vs').value;
const dt=document.getElementById('sd').value;
const ev=await api('GET',`/events?venue_id=${vid}&from=${dt}&to=${dt}&schedule_status=confirmed`).catch(()=>[]);
if(ev.length){
render(ev[0]);
const shiftSec=document.querySelector('.qr-shift-row .sec:nth-child(2)');
if(shiftSec){
shiftSec.style.transition='box-shadow 0.3s';
shiftSec.style.boxShadow='0 0 12px rgba(62,207,142,0.4)';
setTimeout(()=>{shiftSec.style.boxShadow='none';},1500);
}
}
}
}catch(e){}
}

function wasteCellsFromLines(lines,ph){
const forPh=(lines||[]).filter(l=>String(l.photographer_id)===String(ph));
if(!forPh.length)return{w10:0,w20:0};
let w10=0,w20=0,wq=0;
for(const l of forPh){
wq=Math.max(wq,parseInt(l.waste_qty,10)||0);
const t10=parseInt(l.waste_10x15,10);
const t20=parseInt(l.waste_15x20,10);
if(Number.isFinite(t10))w10=Math.max(w10,t10);
if(Number.isFinite(t20))w20=Math.max(w20,t20);
}
if(w10||w20)return{w10,w20};
return{w10:wq,w20:0};
}
function wasteA4FromLines(lines,ph){
const forPh=(lines||[]).filter(l=>String(l.photographer_id)===String(ph));
let a4=0;
for(const l of forPh){
const v=parseInt(l.waste_a4,10);
if(Number.isFinite(v))a4=Math.max(a4,v);
}
return a4;
}

}else{
diffEl.innerHTML+=` <span style="color:var(--rank3);font-size:10px">≠${expectedPhotos} ожид.</span>`;
}
}
}
});
}
if(!skipDirty){
isDirty=true;
if(_bonusDebounce)clearTimeout(_bonusDebounce);
_bonusDebounce=setTimeout(()=>{void calcBonuses(true);},2000);
if(_saveDebounce)clearTimeout(_saveDebounce);
_saveDebounce=setTimeout(()=>{void autoSave();},3000);
}

function collect(){
const bonusMap=window.__bonusByPh||{};
const lines=[];
const phsList=assigns.filter(a=>a.status!=='cancelled');
phsList.forEach(a=>{
const ph=a.photographer_id;
const w10=parseInt(document.querySelector(`.sw10[data-ph="${ph}"]`)?.value)||0;
const w20=parseInt(document.querySelector(`.sw20[data-ph="${ph}"]`)?.value)||0;
const wa4=parseInt(document.querySelector(`.swa4[data-ph="${ph}"]`)?.value)||0;
const wsum=w10+w20+wa4;
const pc=parseFloat(document.querySelector(`.sc[data-ph="${ph}"]`)?.value)||0;
const pk=parseFloat(document.querySelector(`.sk[data-ph="${ph}"]`)?.value)||0;
const pq=parseFloat(document.querySelector(`.sqr[data-ph="${ph}"]`)?.value)||0;
const fine=parseFloat(document.querySelector(`.sfine[data-ph="${ph}"]`)?.value)||0;
let firstWithQ=-1;
prods.forEach((p,i)=>{
const pid=String(p.product_id||p.id);
const q=parseInt(document.querySelector(`.sq[data-ph="${ph}"][data-p="${pid}"]`)?.value)||0;
if(q>0&&firstWithQ<0)firstWithQ=i;
});
const payOn=firstWithQ>=0?firstWithQ:0;
prods.forEach((p,idx)=>{
const pid=String(p.product_id||p.id);
const inp=document.querySelector(`.sq[data-ph="${ph}"][data-p="${pid}"]`);
const q=parseInt(inp?.value)||0;
const pr=parseFloat(p.price)||0;
const payHere=idx===payOn;
const pb=(payHere&&(bonusMap[ph]!=null&&bonusMap[ph]!==''))?bonusAmountForPh(ph):0;
lines.push({
photographer_id:ph,
product_id:pid,
quantity:q,
price:pr,
waste_qty:idx===0?wsum:0,
waste_10x15:idx===0?w10:0,
waste_15x20:idx===0?w20:0,
waste_a4:idx===0?wa4:0,
flash_qty:0,
flash_sum:0,
payment_cash:payHere?pc:0,
payment_card:payHere?pk:0,
payment_qr:payHere?pq:0,
payment_bonus:pb,
fine_amount:idx===0?fine:0,
has_change:false,has_pen:false,check_number:null,photographer_status:null,cash_to_collect:0
});
});
});
const pr=[];
['10x15','15x20','A4'].forEach((fmt,i)=>{
pr.push({
format:fmt,
printer_no:document.querySelector(`.pn[data-i="${i}"]`)?.value||'',
counter_start:parseInt(document.querySelector(`.ps[data-i="${i}"]`)?.value)||0,
counter_end:parseInt(document.querySelector(`.pe[data-i="${i}"]`)?.value)||0
});
});
return{lines,printer_data:pr};}

async function calcBonuses(silent){
if(_calcLock)return;
_calcLock=true;
try{
if(isDirty)await autoSave();
if(!shift){if(!silent)toast('Нет смены',1);return;}
if(!hasPhotographerBonusConfig()){
if(!silent)toast('Бонусная схема не настроена для этой площадки',1);
return;
}
if(!report?.id){
await ensureReportDraftSilent();
if(!report?.id){if(!silent)toast('Нет данных для расчёта',1);return;}
}
const{lines,printer_data}=collect();
await api('PATCH',`/daily-reports/${report.id}/lines`,{
lines,printer_data,
admin_name:getRoleLeadName('print_operator'),
manager_name:getRoleLeadName('venue_manager'),
notes_report:document.getElementById('rn')?.value||null,
advances:collectAdvances(),
petty_cash_expenses:collectPettyCash()
});
isDirty=false;
const result=await api('POST',`/daily-reports/${report.id}/calc-bonuses`);
window.__calcResult=result.scheme_version===2?result:null;
window.__bonusByPh={};
window.__bonusMeta={};
const rows=Array.isArray(result?.results)?result.results:Array.isArray(result)?result:[];
const isV2=result.scheme_version===2;
rows.forEach(r=>{
const pid=r.photographer_id;
if(isV2){
window.__bonusByPh[pid]=r.bonus!=null?r.bonus:0;
window.__bonusMeta[pid]={salary:r.salary||0,bonus:r.bonus||0,from_cash:r.from_cash!=null?r.from_cash:r.bonus,calc_mode:r.calc_mode};
}else{
window.__bonusByPh[pid]=r.total||0;
window.__bonusMeta[pid]={salary:r.salary||0,bonus:r.bonus||0,calc_mode:r.calc_mode};
}
});
recalcAll(true);
renderAccruals();
if(!silent)toast('💰 Бонусы рассчитаны');
}catch(e){if(!silent)toast(e.message,1);console.error('[calcBonuses]',e);}
finally{_calcLock=false;}
}

function applyBonusFromReport(){
window.__calcResult=null;
if(!report)return;
const rl=report.lines||report.sale_lines||[];
if(!Array.isArray(rl))return;
window.__bonusByPh={};
window.__bonusMeta={};
assigns.filter(a=>a.status!=='cancelled').forEach(a=>{
const el=document.getElementById('bon'+a.photographer_id);
if(el){el.textContent='—';el.title='';el.style.color='var(--text3)';}
});
const byPh={};
for(const l of rl){
const ph=l.photographer_id;
const pb=parseFloat(l.payment_bonus)||0;
const se=parseFloat(l.salary_earned)||0;
if(!byPh[ph]||pb>byPh[ph].pb)byPh[ph]={pb,se};
}
for(const ph of Object.keys(byPh)){
const {pb,se}=byPh[ph];
if(pb>0||se>0){
window.__bonusByPh[ph]=pb;
window.__bonusMeta[ph]={salary:se,bonus:pb,from_cash:pb};
}
}
}

function schemeProductsFromRules(s,allProds){
const rules=typeof s.rules==='string'?JSON.parse(s.rules):s.rules||{};
const pr=rules.product_rates;
const catalog=Array.isArray(allProds)?allProds:[];
if(Array.isArray(pr)&&pr.length){
return pr.map(p=>({
pid:String(p.product_id),
name:p.name||'',
price:p.price!=null&&p.price!==''?p.price:'',
salary:p.salary!=null&&p.salary!==''?p.salary:'',
printer:p.printer_format||''
}));
}
if(pr&&typeof pr==='object'&&!Array.isArray(pr)){
return Object.keys(pr).map(k=>{
const rate=pr[k]||{};
const p=catalog.find(x=>String(x.id)===String(k));
return{
pid:k,
name:rate.name||p?.name||'',
price:rate.price!=null&&rate.price!==''?rate.price:(p?.default_price??''),
salary:rate.salary!=null&&rate.salary!==''?rate.salary:(p?.salary_per_unit??''),
printer:rate.printer_format||p?.printer_format||''
};
});
}
return[];
}

const pct=(parseFloat(s.percentage_rate)!=null&&!isNaN(parseFloat(s.percentage_rate)))?(parseFloat(s.percentage_rate)*100):25;
const cm=s.calc_mode==='percentage'?'percentage':'standard';
return`<div style="margin-bottom:10px"><button type="button" class="btn btn-ghost" style="font-size:10px" onclick="backToBsList()">← К списку</button></div>
<div style="display:grid;gap:10px">
<div><div class="fl">Название</div><input class="fin" id="bs-name" value="${esc(s.name||'')}" style="width:100%"/></div>

</div>
<div id="bs-pct-wrap" style="display:${cm==='percentage'?'block':'none'}"><div class="fl">% от выручки (25 = 25%)</div><input class="fin" type="number" id="bs-pct" value="${pct}" step="0.01"/></div>
<div id="bs-std-wrap" style="display:${cm==='percentage'?'none':'block'}">
<div><div class="fl">Фикс. ставка (base_salary)</div><input class="fin" type="number" id="bs-bases" value="${s.base_salary||0}" step="0.01"/></div>

function bsGatherPayload(){
const name=document.getElementById('bs-name').value.trim();
if(!name)throw new Error('Укажите название');
const scheme_type=document.getElementById('bs-stype').value;
const calc_mode=document.getElementById('bs-cmode').value;
const thresholds=[];
document.querySelectorAll('#bs-th .bs-th-row').forEach(row=>{
thresholds.push({from:parseFloat(row.querySelector('.bs-th-from').value)||0,bonus:parseFloat(row.querySelector('.bs-th-bonus').value)||0});
});
const progressive=[];
document.querySelectorAll('#bs-pr .bs-pr-row').forEach(row=>{
progressive.push({above:parseFloat(row.querySelector('.bs-pr-a').value)||0,every:parseFloat(row.querySelector('.bs-pr-e').value)||1,add:parseFloat(row.querySelector('.bs-pr-ad').value)||0});
});
const rules={thresholds,progressive};
let percentage_rate=0.25,base_salary=parseFloat(document.getElementById('bs-bases').value)||0;
if(calc_mode==='percentage'){
const p=parseFloat(document.getElementById('bs-pct').value);
percentage_rate=Number.isFinite(p)?p/100:0.25;
base_salary=0;
}
return{name,description:null,scheme_type,calc_mode,percentage_rate,base_salary,rules};
}

function bsGatherPayloadV2(){
const name=document.getElementById('bs-name').value.trim();
if(!name)throw new Error('Укажите название');
const rules=collectSchemeRulesV2();
if(!rules.photographer||typeof rules.photographer!=='object')throw new Error('Нужны правила фотографа');
return{
name,
description:null,
scheme_version:2,
scheme_type:'unified',
calc_mode:'standard',
percentage_rate:0.25,
base_salary:0,
rules
};
}

async function save(st){
if(autoSaveTimeout){clearTimeout(autoSaveTimeout);autoSaveTimeout=null;}
if(_saveDebounce){clearTimeout(_saveDebounce);_saveDebounce=null;}
if(_bonusDebounce){clearTimeout(_bonusDebounce);_bonusDebounce=null;}
if(!shift){toast('Нет смены',1);return;}
const collected=collect();
const{lines,printer_data}=collected;
if(st==='submitted'&&!lines.some(l=>(parseInt(l.quantity)||0)>0)){toast('Заполните продажи',1);return;}
if(st==='submitted'){
const msgs=[];
if(!lines.some(l=>(parseInt(l.quantity)||0)>0))msgs.push('нет строк продаж с количеством > 0');
const prs=collect().printer_data||[];
if(!prs.some(p=>(parseInt(p.counter_end)||0)>(parseInt(p.counter_start)||0)))msgs.push('не заполнены счётчики принтеров (хотя бы один с печатью)');
const ra=(document.getElementById('ra')?.value||'').trim();
const rm=(document.getElementById('rm')?.value||'').trim();
if(!ra&&!rm)msgs.push('не указаны админ и менеджер');
if(msgs.length&&!confirm('Перед отправкой проверьте:\n• '+msgs.join('\n• ')+'\n\nВсё равно отправить?'))return;
}
const body=buildReportBody();
try{
if(report?.id){
await api('PATCH',`/daily-reports/${report.id}/lines`,body);
if(st==='submitted')await api('POST',`/daily-reports/${report.id}/submit`);
}else{
const created=await api('POST','/daily-reports',body);
report=created;
await api('PATCH',`/daily-reports/${created.id}/lines`,body);
if(st==='submitted')await api('POST',`/daily-reports/${created.id}/submit`);
}
isDirty=false;
toast(st==='submitted'?'📤 Отправлен':'💾 Сохранён');await load();
}catch(e){toast(e.message,1);}}

async function autoSave(){
if(!isDirty)return;
if(!shift)return;
const vid=document.getElementById('vs').value;
const dt=document.getElementById('sd').value;
if(!vid||!dt)return;
if(!report?.id){
try{
const body=buildReportBody();
const r=await api('POST','/daily-reports',body);
report=r;
await api('PATCH',`/daily-reports/${r.id}/lines`,body);
isDirty=false;
showAutoSaveStatus('Черновик создан');
recalcAll(true);
}catch(e){
const msg=(e&&e.message)||'';
if(msg.includes('существует')||msg.includes('409')){
await load();
}else{
console.warn('[autosave create]',msg);
showAutoSaveStatus('Ошибка сохранения');
}
}
return;
}
if(report.status!=='draft'&&report.status!=='returned')return;
try{
const body=buildReportBody();
await api('PATCH',`/daily-reports/${report.id}/lines`,body);
isDirty=false;
showAutoSaveStatus('Сохранено');
}catch(e){
console.warn('[autosave]',e.message);
showAutoSaveStatus('Ошибка сохранения');
}
}

function liveHourSlots(){
  const out=[];
  for(let h=10;h<22;h++){
    const a=String(h).padStart(2,'0')+':00';
    const b=String(h+1).padStart(2,'0')+':00';
    out.push({time_from:a,time_to:b});
  }
  return out;
}

async function loadLiveShiftDashboard(silent){
  const eid=window.__liveEventId;
  const body=document.getElementById('live-shift-body');
  if(!eid||!body)return;
  try{
    const dash=await api('GET',`/events/${eid}/live-dashboard`);
    _liveDashboardCache=dash;
    const slots=liveHourSlots();
    const staffPhoto=(dash.staff||[]).filter(s=>s.role_in_shift==='photographer');
    const zones=dash.zones||[];
    let poolHtml=staffPhoto.map(s=>`<div class="live-drag-ph" draggable="true" data-photographer-id="${esc(s.photographer_id)}" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;margin:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:grab;font-size:11px">
      ${s.photo_url?`<img src="${API.replace('/api','')}${esc(s.photo_url)}" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'">`:''}
      <span>${esc(s.name)}</span>
    </div>`).join('')||'<span style="color:var(--text3)">Нет фотографов на смене</span>';

    let matrix='<table class="st" style="font-size:10px;margin-top:8px"><thead><tr><th>Зона</th>';
    slots.forEach(sl=>{matrix+=`<th>${esc(sl.time_from.slice(0,5))}</th>`;});
    matrix+='</tr></thead><tbody>';
    for(const z of zones){
      matrix+=`<tr><td style="font-weight:600">${esc(z.name)}</td>`;
      for(const sl of slots){
        const assigns=(z.assignments||[]).filter(a=>{
          const tf=String(a.time_from||'').slice(0,5);
          const tt=String(a.time_to||'').slice(0,5);
          return tf<=sl.time_from&&tt>sl.time_from;
        });
        const cellContent=assigns.map(a=>`<div style="font-size:9px;margin-bottom:2px">${esc(a.photographer_name)} <button type="button" class="btn btn-ghost" style="font-size:8px;padding:0 2px" data-za-del="${esc(a.id)}" onclick="deleteZoneAssignmentBtn(this)">✕</button></div>`).join('')||'—';
        matrix+=`<td class="zone-cell" data-zone-id="${esc(z.id)}" data-time-from="${esc(sl.time_from)}" data-time-to="${esc(sl.time_to)}" style="vertical-align:top;min-width:52px">${cellContent}</td>`;
      }
      matrix+='</tr>';
    }
    if(!zones.length) matrix+='<tr><td colspan="'+(slots.length+1)+'" style="color:var(--text3)">Нет зон — добавьте в настройках площадки (⚙️)</td></tr>';
    matrix+='</tbody></table>';

    const pend=(dash.pending_actions||[]).map(a=>`<div style="padding:6px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;background:var(--bg3)">
      <div style="font-weight:600">${esc(a.action_type)}</div>
      <div style="font-size:10px;color:var(--text3)">${esc(a.requested_by_name)}</div>
      <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
        <button type="button" class="btn btn-primary" style="font-size:10px;padding:2px 8px" data-act-id="${esc(a.id)}" data-act-st="approved" onclick="resolveShiftActionBtn(this)">Ок</button>
        <button type="button" class="btn btn-ghost" style="font-size:10px;padding:2px 8px" data-act-id="${esc(a.id)}" data-act-st="rejected" onclick="resolveShiftActionBtn(this)">Отклонить</button>
      </div>
    </div>`).join('')||'<div style="color:var(--text3)">Нет заявок</div>';

    const msgs=(dash.recent_messages||[]).map(m=>`<div style="font-size:10px;margin-bottom:4px"><b>${esc(m.sender_name)}</b> ${esc(m.content)}</div>`).join('')||'';

    body.innerHTML=`<div style="display:grid;grid-template-columns:1fr 280px;gap:12px;align-items:start">
      <div>
        <div class="sec-t">👥 Фотографы — перетащите в ячейку зоны × время</div>
        <div style="margin-bottom:10px">${poolHtml}</div>
        <div class="sec-t">🗺 Матрица зон</div>
        <div id="live-zone-matrix">${matrix}</div>
      </div>
      <div>
        <div class="sec-t">⏳ Заявки</div>${pend}
        <div class="sec-t" style="margin-top:12px">💬 Последние сообщения</div>
        <div style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;background:var(--bg3)">${msgs}</div>
      </div>
    </div>`;
    bindLiveZoneDnD();
  }catch(e){if(!silent)toast(e.message,1);body.innerHTML='<div style="color:var(--rank3)">'+esc(e.message)+'</div>';}
}

function bindLiveZoneDnD(){
  document.querySelectorAll('.live-drag-ph').forEach(el=>{
    el.addEventListener('dragstart',(ev)=>{
      ev.dataTransfer.setData('text/plain',el.getAttribute('data-photographer-id')||'');
      ev.dataTransfer.effectAllowed='copy';
    });
  });
  document.querySelectorAll('#live-zone-matrix .zone-cell').forEach(cell=>{
    cell.addEventListener('dragover',(ev)=>{ev.preventDefault();ev.dataTransfer.dropEffect='copy';cell.classList.add('live-drop-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('live-drop-over'));
    cell.addEventListener('drop',async (ev)=>{
      ev.preventDefault();
      cell.classList.remove('live-drop-over');
      const photographerId=ev.dataTransfer.getData('text/plain');
      const zoneId=cell.getAttribute('data-zone-id');
      const timeFrom=cell.getAttribute('data-time-from');
      const timeTo=cell.getAttribute('data-time-to');
      if(!photographerId||!zoneId||!window.__liveEventId)return;
      try{
        await api('POST',`/events/${window.__liveEventId}/zone-assignments`,{zone_id:zoneId,photographer_id:photographerId,time_from:timeFrom,time_to:timeTo});
        toast('Назначен на зону');
        loadLiveShiftDashboard(true);
      }catch(e){toast(e.message,1);}
    });
  });
}

function renderAqSection() {
  const aqPhs = (aqAssigns||[]).filter(a => a.status !== 'cancelled');
  const s = aqReport?.status || 'new';
  const SM = {new:['📝','sb-d'], draft:['📝 Черновик','sb-d'], submitted:['📤 Отправлен','sb-s'], approved:['✅ Проведён','sb-a'], returned:['↩ Возвращён','sb-r']};
  const [sl, sc] = SM[s] || SM.new;
  const ed = !aqReport || ['draft','returned'].includes(aqReport.status);
  const lines = aqReport?.sale_lines || [];

  let html = `
  <div style="margin:20px 0 14px;padding:12px 16px;background:rgba(62,207,180,.06);border:1px solid rgba(62,207,180,.15);border-radius:10px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;color:#3ecfb4">🎨 Аквагрим</span>
    <span class="sb ${sc}">${sl}</span>
  </div>

  <div class="sec"><div class="sec-t" style="color:#3ecfb4">👥 Смена аквагрим (${aqPhs.length})</div>
  ${aqPhs.map(a => {
    const ch = a.checkin_at || a.checked_in;
    return `<div class="rr"><div class="rr-name">${esc(a.aquagrimer_name || a.name || '—')}</div><span style="font-size:9px;color:var(--text3)">${esc(a.role_in_shift||'')}</span>${ch ? (a.is_late ? `<span class="rs rs-late">⏰+${esc(a.late_minutes||'?')}м</span>` : `<span class="rs rs-ok">✅</span>`) : `<span class="rs rs-wait">⏳</span>`}</div>`;
  }).join('') || '<div style="color:var(--text3);font-size:12px">Нет назначений</div>'}
  </div>`;

  // Таблица продаж аквагрим
  if (aqPhs.length && aqProds.length) {
    html += `<div class="sec"><div class="sec-t" style="color:#3ecfb4">📊 Продажи аквагрим</div>${aqSalesTbl(aqPhs, lines)}</div>`;
  }

  // Итоги
  html += `<div class="sec"><div class="sec-t" style="color:#3ecfb4">📝 Итоги аквагрим</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <div style="flex:1;min-width:140px"><div class="fl">Оператор</div><input class="fin" id="aqa" value="${esc(aqReport?.admin_name||U?.name||'')}" style="width:100%"/></div>
    <div style="flex:1;min-width:140px"><div class="fl">Менеджер</div><input class="fin" id="aqm" value="${esc(aqReport?.manager_name||'')}" style="width:100%"/></div>
  </div>
  <div style="margin-top:6px"><div class="fl">Примечание</div><input class="fin" id="aqn" value="${esc(aqReport?.notes_report||'')}" style="width:100%" placeholder="Комментарий..."/></div>
  ${aqReport?.review_comment ? `<div style="padding:6px;background:rgba(242,85,85,.06);border:1px solid rgba(242,85,85,.15);border-radius:6px;margin-top:6px;font-size:12px"><b style="color:var(--rank3)">Проверяющий:</b> ${esc(aqReport.review_comment)}</div>` : ''}
  </div>

  <div class="foot">
  ${ed ? `<button class="btn btn-ghost" onclick="saveAq('draft')">💾 Черновик</button><button class="btn btn-primary" style="background:#3ecfb4" onclick="saveAq('submitted')">📤 Отправить</button>` : `<span style="font-size:12px;color:var(--text3)">${s==='approved'?'Проведён':'На проверке'}</span>`}
  </div>`;

  return html;
}

function aqSalesTbl(aqPhs, lines){
  let h='<div style="overflow-x:auto"><table class="st"><thead><tr><th>Сотрудник</th>';
  aqProds.forEach(p=>{h+=`<th>${esc(String((p.product_name||p.name)||'').slice(0,10))}<br><span style="font-size:8px">${p.price}₽</span></th>`;});
  h+='<th>Брак</th><th>Фл.шт</th><th>Фл.₽</th><th>Нал</th><th>Карта</th><th>QR</th><th class="tot">Итого</th></tr></thead><tbody>';
  aqPhs.forEach(a=>{
    const ph=a.aquagrimer_id||a.photographer_id||a.id;
    h+=`<tr><td>${esc(String((a.aquagrimer_name||a.name||'')).slice(0,12))}</td>`;
    aqProds.forEach(p=>{
      const pid=p.product_id||p.id,ex=lines.find(l=>l.aquagrimer_id===ph&&l.product_id===pid);
      h+=`<td><input type="number" min="0" value="${ex?.quantity||0}" class="asq" data-ph="${ph}" data-p="${pid}" data-pr="${p.price}" onchange="arc()"/></td>`;
    });
    const x=lines.find(l=>l.aquagrimer_id===ph);
    h+=`<td><input type="number" min="0" value="${x?.waste_qty||0}" class="asw" data-ph="${ph}" style="width:34px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.flash_qty||0}" class="asfq" data-ph="${ph}" style="width:34px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.flash_sum||0}" class="asfs" data-ph="${ph}" style="width:44px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.payment_cash||0}" class="asc" data-ph="${ph}" style="width:50px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.payment_card||0}" class="ask" data-ph="${ph}" style="width:50px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.payment_qr||0}" class="asqr" data-ph="${ph}" style="width:50px" onchange="arc()"/></td>`;
    h+=`<td class="tot" id="art${ph}">0</td></tr>`;
  });
  h+='<tr><td class="tot">ИТОГО</td>';
  aqProds.forEach(p=>{h+=`<td class="tot" id="act${p.product_id||p.id}">0</td>`;});
  h+='<td class="tot" id="atw">0</td><td class="tot" id="atfq">0</td><td class="tot" id="atfs">0</td><td class="tot" id="atc">0</td><td class="tot" id="atk">0</td><td class="tot" id="atq">0</td><td class="tot" id="agt">0</td></tr></tbody></table></div>';
  setTimeout(arc,50);return h;
}

function arc(){
  const i=document.querySelectorAll('.asq');const rt={},ct={};let g=0,atw=0,atfq=0,atfs=0,atc=0,atk=0,atq=0;
  i.forEach(n=>{const ph=n.dataset.ph,p=n.dataset.p,pr=parseFloat(n.dataset.pr),q=parseInt(n.value)||0,s=q*pr;rt[ph]=(rt[ph]||0)+s;ct[p]=(ct[p]||0)+q;g+=s;});
  Object.entries(rt).forEach(([k,v])=>{const e=document.getElementById('art'+k);if(e)e.textContent=v.toLocaleString('ru-RU');});
  Object.entries(ct).forEach(([k,v])=>{const e=document.getElementById('act'+k);if(e)e.textContent=v;});
  document.querySelectorAll('.asw').forEach(n=>atw+=parseInt(n.value)||0);
  document.querySelectorAll('.asfq').forEach(n=>atfq+=parseInt(n.value)||0);
  document.querySelectorAll('.asfs').forEach(n=>atfs+=parseFloat(n.value)||0);
  document.querySelectorAll('.asc').forEach(n=>atc+=parseFloat(n.value)||0);
  document.querySelectorAll('.ask').forEach(n=>atk+=parseFloat(n.value)||0);
  document.querySelectorAll('.asqr').forEach(n=>atq+=parseFloat(n.value)||0);
  const$=id=>document.getElementById(id);
  if($('agt'))$('agt').textContent=g.toLocaleString('ru-RU');
  if($('atw'))$('atw').textContent=atw;
  if($('atfq'))$('atfq').textContent=atfq;
  if($('atfs'))$('atfs').textContent=atfs;
  if($('atc'))$('atc').textContent=atc.toLocaleString('ru-RU');
  if($('atk'))$('atk').textContent=atk.toLocaleString('ru-RU');
  if($('atq'))$('atq').textContent=atq.toLocaleString('ru-RU');
}

function collectAq(){
  const lines=[];
  document.querySelectorAll('.asq').forEach(n=>{
    const q=parseInt(n.value)||0,ph=n.dataset.ph;
    if(q>0)lines.push({
      aquagrimer_id:ph,
      product_id:n.dataset.p,
      quantity:q,
      price:parseFloat(n.dataset.pr),
      waste_qty:parseInt(document.querySelector(`.asw[data-ph="${ph}"]`)?.value)||0,
      flash_qty:parseInt(document.querySelector(`.asfq[data-ph="${ph}"]`)?.value)||0,
      flash_sum:parseFloat(document.querySelector(`.asfs[data-ph="${ph}"]`)?.value)||0,
      payment_cash:parseFloat(document.querySelector(`.asc[data-ph="${ph}"]`)?.value)||0,
      payment_card:parseFloat(document.querySelector(`.ask[data-ph="${ph}"]`)?.value)||0,
      payment_qr:parseFloat(document.querySelector(`.asqr[data-ph="${ph}"]`)?.value)||0
    });
  });
  return { lines };
}

async function saveAq(st){
  if(!aqShift){toast('Нет смены аквагрим',1);return;}
  const { lines } = collectAq();
  if(st==='submitted'&&!lines.length){toast('Заполните продажи аквагрим',1);return;}
  const b={shift_id:aqShift.id,venue_id:document.getElementById('vs').value,report_date:document.getElementById('sd').value,lines,admin_name:document.getElementById('aqa')?.value||null,manager_name:document.getElementById('aqm')?.value||null,notes_report:document.getElementById('aqn')?.value||null};
  try{
    if(aqReport?.id){
      await api('PATCH',`/aq/daily-reports/${aqReport.id}`,b);
      if(st==='submitted')await api('POST',`/aq/daily-reports/${aqReport.id}/submit`);
    } else {
      b.status=st;
      await api('POST','/aq/daily-reports',b);
    }
    toast(st==='submitted'?'📤 Отправлен':'💾 Сохранён');
    load();
  }catch(e){toast(e.message,1);}
}

function openAdmin() {
  const ov = document.getElementById('admin-overlay');
  const fr = document.getElementById('admin-iframe');
  if (!ov || !fr) return;
  fr.src = 'admin.html?v=' + Date.now();
  ov.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeAdmin() {
  const ov = document.getElementById('admin-overlay');
  const fr = document.getElementById('admin-iframe');
  if (ov) ov.style.display = 'none';
  if (fr) fr.src = '';
  document.body.style.overflow = '';
  if (typeof loadVenues === 'function') loadVenues().catch(() => {});
  if (typeof venues !== 'undefined' && typeof api === 'function')
    api('GET', '/venues').then(v => { venues = v; }).catch(() => {});
}
function setupMgmtButton() {
  const b = document.getElementById('btn-management');
  if (b) b.style.display = hasAnyRole(['hr_manager','hr_director','exec_director','admin']) ? '' : 'none';
