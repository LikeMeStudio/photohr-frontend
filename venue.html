<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PhotoHR — Площадка</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a23;--border:#2e2e3d;--border2:#3a3a4f;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6cff;--accent2:#9b8dff;--rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}a{color:inherit;text-decoration:none}
.header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-right:8px}.logo span{color:var(--accent2)}
.header-stats{display:flex;gap:16px;flex:1}
.stat{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.user-pill{padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-btn:hover{color:var(--text)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.main{max-width:1200px;margin:0 auto;padding:20px 24px}
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.sec-t{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.btn{padding:7px 14px;border-radius:10px;border:none;font-family:'Golos Text',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.btn-primary{background:var(--accent);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.toolbar-unified .btn.btn-ghost{padding:6px 14px;border-radius:20px;font-size:12px}
.fin{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Golos Text',sans-serif;font-size:12px;outline:none}.fin:focus{border-color:var(--accent)}
.fselect{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer}
.fl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.qr-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.qr-box{width:160px;height:160px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}.qr-box canvas,.qr-box img{width:160px!important;height:160px!important}
.qr-timer{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:600;color:var(--accent2)}
.rr{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border-radius:7px;border:1px solid var(--border);margin-bottom:3px;font-size:12px}
.rr-name{flex:1;font-weight:500}
.rs{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:500}
.rs-ok{background:rgba(62,207,142,.12);color:var(--rank1)}.rs-late{background:rgba(242,85,85,.12);color:var(--rank3)}.rs-wait{background:rgba(144,144,168,.1);color:var(--text3)}
.pr{display:flex;gap:6px;align-items:center;padding:6px 8px;background:var(--bg3);border-radius:7px;margin-bottom:4px;flex-wrap:wrap;font-size:12px}
.pr .fin{width:70px}
.pr-diff{font-weight:600;color:var(--rank1);min-width:40px;text-align:center}
.st{width:100%;border-collapse:collapse;font-size:11px}.st th,.st td{padding:5px 4px;border:1px solid var(--border);text-align:center;white-space:nowrap}
.st th{background:var(--bg3);font-weight:600;color:var(--text3);font-size:9px;text-transform:uppercase}.st td:first-child{text-align:left;font-weight:500;background:var(--bg2);min-width:90px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st input{width:44px;padding:2px;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;text-align:center;outline:none}.st input:focus{border-color:var(--accent)}
.st .tot{font-weight:600;background:var(--bg3);color:var(--accent2)}
.sb{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:7px;font-size:11px;font-weight:500}
.sb-d{background:rgba(144,144,168,.1);color:var(--text3)}.sb-s{background:rgba(245,166,35,.1);color:var(--rank2)}.sb-a{background:rgba(62,207,142,.1);color:var(--rank1)}.sb-r{background:rgba(242,85,85,.1);color:var(--rank3)}
.foot{display:flex;gap:6px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;flex-wrap:wrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
.loading{text-align:center;padding:40px;color:var(--text3)}
@media(max-width:768px){.main{padding:10px}.qr-wrap{flex-direction:column}.st input{width:36px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Photo<span>HR</span></div>
  <div style="display:flex;gap:6px;margin-left:12px" id="nav-links"></div>
  <div class="header-stats" id="hstats"></div>
  <div class="header-right">
    <div class="user-pill" id="user-pill" onclick="openProfile()" style="cursor:pointer" title="Мой профиль"></div>
    <button class="btn btn-ghost" onclick="doLogout()" style="font-size:13px;padding:6px 12px">Выйти</button>
  </div>
</div>
<div class="main">
<div class="toolbar-unified" style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
<select class="fselect" id="vs" onchange="load()" style="min-width:180px"><option value="">Площадка...</option></select>
<input class="fin" type="date" id="sd" onchange="load()" style="width:auto"/>
<button class="btn btn-ghost" onclick="openVenueSettings()" title="Настройки площадки" style="font-size:14px;padding:5px 10px">⚙️</button>
<div id="rs"></div><div style="flex:1"></div><div id="rstat"></div>
<button class="btn btn-ghost" onclick="openAchievementsPanel()">🏆 Достижения</button>
<button class="btn btn-ghost" onclick="openBirthdaysPanel()">🎂 Дни рождения</button>
<button class="btn btn-ghost" onclick="openLikesPanel()">❤️ Лайки</button>
</div>
<div id="C"><div class="loading">Выберите площадку и дату</div></div>
</div>

<!-- Venue Settings Modal -->
<div class="overlay" id="vs-modal" onclick="if(event.target===this)closeVenueSettings()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center">
<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600">⚙️ Настройки площадки</span>
    <button class="dr-close" onclick="closeVenueSettings()" style="width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="vs-content"><div class="loading">Загрузка...</div></div>
</div>
</div>

<!-- Bonus schemes manager (above venue settings z-index) -->
<div class="overlay" id="bs-modal" onclick="if(event.target===this){this.style.display='none'}" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:210;align-items:center;justify-content:center;flex-wrap:wrap">
<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600">📝 Бонусные схемы</span>
    <button class="dr-close" onclick="document.getElementById('bs-modal').style.display='none'" style="width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="bs-content"><div class="loading">Загрузка...</div></div>
</div>
</div>

<div class="toast" id="toast"></div>
<script>
const API=window.location.hostname==='localhost'?'http://localhost:3001/api':'https://fotohr-server-production.up.railway.app/api';
let AT=localStorage.getItem('fhr_access')||null,RT=localStorage.getItem('fhr_refresh')||null,U=null,currentUser=null,venues=[],shift=null,assigns=[],prods=[],report=null,qi=null;
let isDirty=false,settingsChanged=false,autoSaveTimer=null,venueBonusConfigs=[],calcBonusesRunning=false,calcBonusesPending=false,allSchemes=[],bonusConfigs=[];
function markDirty(){isDirty=true;}
function resolveDayTypeForBonus(){
const dt=(report&&report.report_date)||document.getElementById('sd')?.value;
if(!dt)return'weekday';
if(report&&report.day_type==='holiday')return'holiday';
const d=new Date(dt+'T12:00:00');
const dow=d.getDay();
return dow===0||dow===6?'weekend':'weekday';
}
function hasPhotographerBonusConfig(){
const dt=resolveDayTypeForBonus();
return(venueBonusConfigs||[]).some(c=>c.role_type==='photographer'&&c.day_type===dt&&c.scheme_id);
}
const ROLE_LABELS={admin:'Администратор',exec_director:'Исполнительный директор',hr_director:'HR-директор',hr_manager:'HR-менеджер',recruiter:'Рекрутер',tech_director:'Тех-директор',site_specialist:'Специалист по сайту',cashier:'Инкассация',photographer_user:'Сотрудник',aq_user:'Аквагримёр',aq_manager:'Менеджер аквагрима',archived:'Архив'};
const ROLE_COLORS={admin:'#ffd700',exec_director:'#f5a623',hr_director:'#3ecf8e',hr_manager:'#4ecb8a',recruiter:'#e86aa6',tech_director:'#8a7aee',site_specialist:'#6aa6e8',cashier:'#e87a6a',photographer_user:'#9090a8',aq_user:'#3ecfb4',aq_manager:'#5ee8d0',archived:'#5a5a72'};
const ROLES={photographer_user:0,aq_user:0,recruiter:1,hr_manager:1,tech_director:1,site_specialist:1,aq_manager:1,cashier:2,hr_director:2,exec_director:3,admin:4};
const roleNow=()=>currentUser?.role||'photographer_user';
const hasAnyRole=(roles)=>roles.includes(roleNow());
function openProfile(){location.href='index.html?profile=1';}
function fillPlaceholderStats(){const hs=document.getElementById('hstats');if(!hs)return;hs.innerHTML='<div class="stat"><div class="stat-num" style="color:var(--accent2)">—</div><div class="stat-lbl">Всего</div></div><div class="stat"><div class="stat-num" style="color:var(--rank1)">—</div><div class="stat-lbl">Топ</div></div><div class="stat"><div class="stat-num" style="color:var(--rank2)">—</div><div class="stat-lbl">Средний балл</div></div>';}
function setupUserPill(){const c=ROLE_COLORS[currentUser.role]||'#9090a8';document.getElementById('user-pill').innerHTML=`<div class="role-dot" style="background:${c}"></div><span>${esc(currentUser.name)}</span><span style="color:var(--text3);font-size:11px">${ROLE_LABELS[currentUser.role]||currentUser.role}</span>`;}
function setupNav(activeKey){const navBtns=[],ns='text-decoration:none;padding:5px 12px;font-size:12px';const a=(key,href,label)=>{const cls=activeKey===key?'f-btn active':'f-btn';return`<a class="${cls}" href="${href}" style="${ns}">${label}</a>`;};navBtns.push(a('index','index.html','Фотографы'));if(currentUser.role!=='photographer_user'&&currentUser.role!=='aq_user')navBtns.push(a('team','team.html','Команда'));if(hasAnyRole(['recruiter','hr_manager','hr_director','exec_director','admin']))navBtns.push(a('recruiting','recruiting.html','Рекрутинг'));if(hasAnyRole(['photographer_user','hr_manager','cashier','hr_director','tech_director','site_specialist','exec_director','admin']))navBtns.push(a('venue','venue.html','Площадка'));if(hasAnyRole(['tech_director','hr_director','exec_director','admin']))navBtns.push(a('stock','stock.html','Склад'));if(hasAnyRole(['hr_manager','hr_director','exec_director','admin','photographer_user']))navBtns.push(a('calendar','calendar.html','Календарь'));if(hasAnyRole(['aq_manager','hr_director','exec_director','admin','cashier'])){navBtns.push('<span style="width:1px;height:18px;background:var(--border);margin:0 6px;align-self:center"></span>');navBtns.push(a('aquagrim','aquagrim.html','Аквагрим'));}if(currentUser.role==='photographer_user'&&currentUser.photographer_id)navBtns.push(a('my','my.html','📷 Мой профиль'));document.getElementById('nav-links').innerHTML=navBtns.join('');}
function openAchievementsPanel(){window.location.href='index.html#achievements';}
function openBirthdaysPanel(){window.location.href='index.html#birthdays';}
function openLikesPanel(){window.location.href='index.html#likes';}
let aqEvent=null, aqShift=null, aqAssigns=[], aqProds=[], aqReport=null;
let refreshLock=null;
async function api(m,p,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(AT)o.headers.Authorization='Bearer '+AT;if(b)o.body=JSON.stringify(b);let r=await fetch(API+p,o);if(r.status===401&&RT){try{if(!refreshLock){refreshLock=(async()=>{const x=await fetch(API+'/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:RT})});if(!x.ok)throw new Error('refresh_failed');const d=await x.json();AT=d.accessToken;RT=d.refreshToken;localStorage.setItem('fhr_access',AT);localStorage.setItem('fhr_refresh',RT);})();}await refreshLock;o.headers.Authorization='Bearer '+AT;r=await fetch(API+p,o);}catch{doLogout();return null;}finally{refreshLock=null;}}if(!r.ok){const e=await r.json().catch(()=>({error:'Ошибка'}));throw new Error(e.error||'Ошибка');}return r.json();}
function doLogout(){localStorage.removeItem('fhr_refresh');localStorage.removeItem('fhr_access');location.href='index.html';}
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');setTimeout(()=>t.className='toast',2500);}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

(async()=>{if(!AT&&!RT){location.href='index.html';return;}try{U=await api('GET','/auth/me');currentUser=U;setupUserPill();setupNav('venue');fillPlaceholderStats();document.getElementById('sd').value=new Date().toISOString().split('T')[0];venues=await api('GET','/venues');document.getElementById('vs').innerHTML='<option value="">Площадка...</option>'+venues.map(v=>`<option value="${v.id}">${esc(v.name)}</option>`).join('');}catch{doLogout();}})();

let _prevVid='',_prevSd='';
async function load(){
const vid=document.getElementById('vs').value,dt=document.getElementById('sd').value;if(!vid||!dt)return;
if(isDirty&&(_prevVid&&_prevSd)&&((vid!==_prevVid)||(dt!==_prevSd))){
if(!confirm('Есть несохранённые данные. Перезагрузить?')){
document.getElementById('vs').value=_prevVid;
document.getElementById('sd').value=_prevSd;
return;
}
}
isDirty=false;
document.getElementById('C').innerHTML='<div class="loading">Загрузка...</div>';
try{
const ev=await api('GET',`/events?venue_id=${vid}&from=${dt}&to=${dt}`);
if(!ev.length){document.getElementById('C').innerHTML=`<div class="loading">Нет мероприятий <button class="btn btn-primary" style="margin-left:6px" onclick="mkEvent()">+ Создать</button></div>`;_prevVid=vid;_prevSd=dt;return;}
const sh=await api('GET',`/shifts?event_id=${ev[0].id}`);shift=sh[0]||null;
if(!shift){document.getElementById('C').innerHTML='<div class="loading">Смена не создана</div>';_prevVid=vid;_prevSd=dt;return;}
assigns=await api('GET',`/shifts/${shift.id}/assignments`).catch(()=>[]);
prods=await api('GET',`/venues/${vid}/products`).catch(()=>[]);
venueBonusConfigs=await api('GET',`/venues/${vid}/bonus-config`).catch(()=>[]);
bonusConfigs=venueBonusConfigs;
const reps=await api('GET',`/daily-reports?venue_id=${vid}&from=${dt}&to=${dt}`).catch(()=>[]);
report=reps.length?await api('GET',`/daily-reports/${reps[0].id}`).catch(()=>null):null;

// Найти venue объект
const venue = venues.find(v => v.id === vid);

// Сбросить aq-данные
aqEvent=null; aqShift=null; aqAssigns=[]; aqProds=[]; aqReport=null;

// Если has_aquagrim — загрузить параллельно
if (venue && venue.has_aquagrim) {
  try {
    const aqEvs = await api('GET', `/aq/events?venue_id=${vid}&from=${dt}&to=${dt}`);
    if (aqEvs && aqEvs.length) {
      aqEvent = aqEvs[0];
      const aqSh = await api('GET', `/aq/shifts?event_id=${aqEvent.id}`);
      aqShift = aqSh?.[0] || null;
      if (aqShift) {
        aqAssigns = await api('GET', `/aq/shifts/${aqShift.id}/assignments`).catch(() => []);
      }
      aqProds = await api('GET', `/aq/venues/${vid}/products`).catch(() => []);
      const aqReps = await api('GET', `/aq/daily-reports?venue_id=${vid}&from=${dt}&to=${dt}`).catch(() => []);
      aqReport = aqReps.length ? await api('GET', `/aq/daily-reports/${aqReps[0].id}`).catch(() => null) : null;
    }
  } catch(e) { console.warn('AQ load error:', e.message); }
}

render(ev[0]);
_prevVid=vid;_prevSd=dt;
}catch(e){document.getElementById('C').innerHTML=`<div class="loading" style="color:var(--rank3)">${esc(e.message)}</div>`;}
}

function render(ev){
const phs=assigns.filter(a=>a.status!=='cancelled'),s=report?.status||'new';
const SM={new:['📝','sb-d'],draft:['📝 Черновик','sb-d'],submitted:['📤 Отправлен','sb-s'],approved:['✅ Проведён','sb-a'],returned:['↩ Возвращён','sb-r']};
const[sl,sc]=SM[s]||SM.new;
document.getElementById('rstat').innerHTML=`<span class="sb ${sc}">${sl}</span>`;
const ed=!report||['draft','returned'].includes(report.status);
window.__venueReportEditable=ed;
const pd=report?.printer_data||[{format:'15x21'},{format:'10x15'}];
const lines=report?.sale_lines||[];
const advRows=(report?.advances)||[];
const pettyRows=(report?.petty_cash_expenses)||[];

document.getElementById('C').innerHTML=`
<div class="sec"><div class="sec-t">📱 QR-чекин</div>
<div class="qr-wrap"><div class="qr-box" id="qb"><div style="color:#999;font-size:10px">Нажмите ▶</div></div>
<div><div class="qr-timer" id="qt">--</div><div style="font-size:10px;color:var(--text3);margin-bottom:6px">30 сек ротация</div>
<div style="display:flex;gap:4px"><button class="btn btn-primary" onclick="startQR()">▶</button><button class="btn btn-ghost" onclick="stopQR()">⏹</button></div></div></div></div>

<div class="sec"><div class="sec-t">👥 Смена (${phs.length})</div>
${phs.map(a=>{const ch=a.checkin_at||a.checked_in;return`<div class="rr"><div class="rr-name">${esc(a.photographer_name||'—')}</div><span style="font-size:9px;color:var(--text3)">${esc(a.role_in_shift||'')}</span>${ch?(a.is_late?`<span class="rs rs-late">⏰+${a.late_minutes||'?'}м</span>`:`<span class="rs rs-ok">✅</span>`):`<span class="rs rs-wait">⏳</span><button class="btn btn-ghost" style="font-size:9px;padding:1px 6px" onclick="manCh('${a.id}')">✋</button>`}</div>`;}).join('')||'<div style="color:var(--text3);font-size:12px">Пусто</div>'}
</div>

<div class="sec"><div class="sec-t">🖨 Принтеры</div>
<div id="prl">${pd.map((p,i)=>`<div class="pr"><span style="min-width:40px">${p.format||'#'+(i+1)}</span><div><div class="fl">№</div><input class="fin pn" data-i="${i}" value="${p.printer_no||''}" style="width:60px" oninput="markDirty()"/></div><div><div class="fl">Нач</div><input class="fin ps" type="number" data-i="${i}" value="${p.counter_start||''}" oninput="cpd(${i})"/></div><div><div class="fl">Кон</div><input class="fin pe" type="number" data-i="${i}" value="${p.counter_end||''}" oninput="cpd(${i})"/></div><div class="pr-diff" id="pd${i}">${p.counter_end&&p.counter_start?Math.max(0,p.counter_end-p.counter_start):'-'}</div></div>`).join('')}</div>
<button class="btn btn-ghost" style="font-size:10px;margin-top:4px" onclick="addPr()">+ принтер</button></div>

<div class="sec"><div class="sec-t">📊 Продажи</div>

h+=`<td><input type="number" min="0" value="${x?.flash_qty||0}" class="sfq" data-ph="${ph}" style="width:34px" oninput="rc()"/></td>`;
h+=`<td><input type="number" min="0" value="${x?.flash_sum||0}" class="sfs" data-ph="${ph}" style="width:44px" oninput="rc()"/></td>`;

document.querySelectorAll('.sfq').forEach(n=>tfq+=parseInt(n.value)||0);
document.querySelectorAll('.sfs').forEach(n=>tfs+=parseFloat(n.value)||0);

document.querySelectorAll('.sk').forEach(n=>tk+=parseFloat(n.value)||0);

if($('tfs'))$('tfs').textContent=tfs;if($('tc'))$('tc').textContent=tc.toLocaleString('ru-RU');
if($('tk'))$('tk').textContent=tk.toLocaleString('ru-RU');if($('tq'))$('tq').textContent=tq.toLocaleString('ru-RU');

function collect(){

const firstPayForPh={};
const lines=[];
document.querySelectorAll('.sq').forEach(n=>{const q=parseInt(n.value)||0,ph=n.dataset.ph;
if(q<=0)return;
const isFirst=!firstPayForPh[ph];firstPayForPh[ph]=true;
const pb=(isFirst&&bonusMap[ph])?bonusMap[ph].total:0;
lines.push({photographer_id:ph,product_id:n.dataset.p,quantity:q,price:parseFloat(n.dataset.pr),
waste_qty:parseInt(document.querySelector(`.sw[data-ph="${ph}"]`)?.value)||0,
flash_qty:parseInt(document.querySelector(`.sfq[data-ph="${ph}"]`)?.value)||0,
flash_sum:parseFloat(document.querySelector(`.sfs[data-ph="${ph}"]`)?.value)||0,
payment_cash:parseFloat(document.querySelector(`.sc[data-ph="${ph}"]`)?.value)||0,
payment_card:parseFloat(document.querySelector(`.sk[data-ph="${ph}"]`)?.value)||0,
payment_qr:parseFloat(document.querySelector(`.sqr[data-ph="${ph}"]`)?.value)||0,
payment_bonus:pb,
has_change:false,has_pen:false,check_number:null,photographer_status:null,cash_to_collect:0});});
const pr=[];document.querySelectorAll('.pn').forEach(n=>{const i=n.dataset.i;pr.push({printer_no:n.value,counter_start:parseInt(document.querySelector(`.ps[data-i="${i}"]`)?.value)||0,counter_end:parseInt(document.querySelector(`.pe[data-i="${i}"]`)?.value)||0});});
return{lines,printer_data:pr};}

function updateCashToCollect(bonusOverride){
const tcEl=document.getElementById('tc');
const cashEl=document.getElementById('cash-to-collect');
if(!tcEl||!cashEl)return;
const totalCash=parseFloat(String(tcEl.textContent||'').replace(/\s/g,'').replace(/[^\d.,-]/g,'').replace(',','.')||'0')||0;
const tbonEl=document.getElementById('tbon');
const tbRaw=(tbonEl?.textContent||'').trim();
const totalBonus=bonusOverride!=null?bonusOverride:(tbRaw==='—'||tbRaw===''?0:(parseFloat(tbRaw.replace(/\s/g,'').replace(/[^\d.,-]/g,'').replace(',','.')||'0')||0));
const advances=collectAdvances().reduce((s,a)=>s+a.amount,0);
const petty=collectPettyCash().reduce((s,e)=>s+e.amount,0);
const result=totalCash-totalBonus-advances-petty;
cashEl.textContent=result.toLocaleString('ru-RU')+' ₽';
cashEl.style.color=result<0?'var(--rank3)':'var(--rank1)';
const nh=document.getElementById('cash-negative-hint');
if(nh)nh.style.display=result<0&&totalCash===0&&totalBonus>0?'block':'none';
}

function updateCashDisplay(){updateCashToCollect();}

let _bonusCalcTimer=null;
async function calcBonuses(silent){
if(!shift){if(!silent)toast('Нет смены',1);return;}
if(!hasPhotographerBonusConfig()){
if(!silent)toast('Бонусная схема не настроена для этой площадки',1);
return;
}
if(calcBonusesRunning){calcBonusesPending=true;return;}
calcBonusesRunning=true;
try{
if(!report?.id){
await ensureReportDraftSilent();
if(!report?.id){if(!silent)toast('Не удалось создать черновик',1);return;}
}
const{lines,printer_data}=collect();
await api('PATCH',`/daily-reports/${report.id}/lines`,{
lines,printer_data,
admin_name:document.getElementById('ra')?.value||null,
manager_name:document.getElementById('rm')?.value||null,
notes_report:document.getElementById('rn')?.value||null,
advances:collectAdvances(),
petty_cash_expenses:collectPettyCash()
});
isDirty=false;
const result=await api('POST',`/daily-reports/${report.id}/calc-bonuses`);
const rows=result.results||[];
window.__bonusByPh={};
let totalPayout=0;
rows.forEach(r=>{
window.__bonusByPh[r.photographer_id]={total:r.total||0,salary:r.salary||0,bonus:r.bonus||0};
const el=document.getElementById('bon'+r.photographer_id);
if(el){
el.textContent=(r.total||0).toLocaleString('ru-RU');
el.title=`ЗП: ${r.salary||0}₽ + Бонус: ${r.bonus||0}₽ (${r.calc_mode||''})`;
el.style.color=(r.total>0)?'var(--rank1)':'var(--text3)';
}
totalPayout+=r.total||0;
});
const tbon=document.getElementById('tbon');
if(tbon)tbon.textContent=totalPayout>0?totalPayout.toLocaleString('ru-RU'):'—';
const ctc=document.getElementById('cash-to-collect');
if(ctc&&result.cash_to_collect!=null){
ctc.textContent=Number(result.cash_to_collect).toLocaleString('ru-RU')+' ₽';
ctc.style.color=parseFloat(result.cash_to_collect)<0?'var(--rank3)':'var(--rank1)';
const nh=document.getElementById('cash-negative-hint');
if(nh){const tc=parseFloat(String(document.getElementById('tc')?.textContent||'').replace(/\s/g,'').replace(/[^\d.,-]/g,'').replace(',','.')||'0')||0;nh.style.display=parseFloat(result.cash_to_collect)<0&&tc===0&&totalPayout>0?'block':'none';}
}else updateCashToCollect(totalPayout);
if(!silent)toast('💰 Бонусы рассчитаны');
}catch(e){if(!silent)toast(e.message,1);}
finally{
calcBonusesRunning=false;
if(calcBonusesPending){
calcBonusesPending=false;
setTimeout(()=>calcBonuses(true),500);
}
}
}

function applyBonusFromReport(){
if(!report?.sale_lines)return;
window.__bonusByPh={};
assigns.filter(a=>a.status!=='cancelled').forEach(a=>{
const el=document.getElementById('bon'+a.photographer_id);
if(el){el.textContent='—';el.title='';el.style.color='var(--text3)';}
});
const byPh={};
for(const l of report.sale_lines){
const ph=l.photographer_id;
const pb=parseFloat(l.payment_bonus)||0;
const se=parseFloat(l.salary_earned)||0;
if(!byPh[ph]||pb>byPh[ph].total)byPh[ph]={total:pb,salary:se};
}
let sum=0;
const hadAnyBonus=(report.sale_lines||[]).some(l=>parseFloat(l.payment_bonus)>0||parseFloat(l.salary_earned)>0);
for(const ph of Object.keys(byPh)){
const pb=byPh[ph].total,se=byPh[ph].salary;
if(pb>0||se>0){
window.__bonusByPh[ph]={total:pb,salary:se,bonus:pb-se};
sum+=pb;
const el=document.getElementById('bon'+ph);
if(el){
el.textContent=pb.toLocaleString('ru-RU');
el.title=`ЗП: ${se}₽ + Бонус: ${(pb-se)}₽`;
el.style.color=pb>0?'var(--rank1)':'var(--text3)';
}
}
}
const tbon=document.getElementById('tbon');
if(tbon)tbon.textContent=(sum>0||hadAnyBonus)?(sum.toLocaleString('ru-RU')):'—';
}

function renderBonusVenueSelectors(vid,schemes,cfg){

const roles=[{key:'photographer',label:'Фотографы'},{key:'operator',label:'Оператор печати'},{key:'manager',label:'Менеджер'}];
const pick=(dt,rt)=>cfg.find(c=>c.day_type===dt&&c.role_type===rt);
let html='<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:13px;font-weight:600;margin-bottom:8px">💰 Бонусные схемы</div><button type="button" class="btn btn-ghost" style="font-size:11px;margin-bottom:8px" onclick="openBonusSchemesModal()">📝 Управление схемами</button>';
roles.forEach(({key,label})=>{
html+=`<div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px">${esc(label)}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">`;
dayTypes.forEach((dt,idx)=>{
const cur=pick(dt,key);
const filtered=schemes.filter(s=>s.scheme_type===key);
const options=['<option value="">Не выбрана</option>'].concat(filtered.map(s=>`<option value="${s.id}" ${cur?.scheme_id===s.id?'selected':''}>${esc(s.name)}</option>`)).join('');

});
html+='</div>';
});
html+='</div>';
return html;
}

function bsGatherPayload(){
const name=document.getElementById('bs-name').value.trim();
if(!name)throw new Error('Укажите название');
const scheme_type=document.getElementById('bs-stype').value;
const calc_mode=document.getElementById('bs-cmode').value;
const thresholds=[];
document.querySelectorAll('#bs-th .bs-th-row').forEach(row=>{
thresholds.push({from:parseFloat(row.querySelector('.bs-th-from').value)||0,bonus:parseFloat(row.querySelector('.bs-th-bonus').value)||0});
});
const progressive=[];
document.querySelectorAll('#bs-pr .bs-pr-row').forEach(row=>{
progressive.push({above:parseFloat(row.querySelector('.bs-pr-a').value)||0,every:parseFloat(row.querySelector('.bs-pr-e').value)||1,add:parseFloat(row.querySelector('.bs-pr-ad').value)||0});
});
const rules={thresholds,progressive};
let percentage_rate=0.25,base_salary=parseFloat(document.getElementById('bs-bases').value)||0;
if(calc_mode==='percentage'){
const p=parseFloat(document.getElementById('bs-pct').value);
percentage_rate=Number.isFinite(p)?p/100:0.25;
base_salary=0;
}
return{name,description:null,scheme_type,calc_mode,percentage_rate,base_salary,rules};
}

async function save(st){
if(!shift){toast('Нет смены',1);return;}
const collected=collect();
const{lines,printer_data}=collected;
if(st==='submitted'&&!lines.length){toast('Заполните продажи',1);return;}
if(st==='submitted'){
const msgs=[];
if(!lines.some(l=>(parseInt(l.quantity)||0)>0))msgs.push('нет строк продаж с количеством > 0');
const prs=collect().printer_data||[];
if(!prs.some(p=>(parseInt(p.counter_end)||0)>(parseInt(p.counter_start)||0)))msgs.push('не заполнены счётчики принтеров (хотя бы один с печатью)');
const ra=(document.getElementById('ra')?.value||'').trim();
const rm=(document.getElementById('rm')?.value||'').trim();
if(!ra&&!rm)msgs.push('не указаны админ и менеджер');
if(msgs.length&&!confirm('Перед отправкой проверьте:\n• '+msgs.join('\n• ')+'\n\nВсё равно отправить?'))return;
}
const body=buildReportBody();
try{
if(report?.id){
await api('PATCH',`/daily-reports/${report.id}/lines`,body);
if(st==='submitted')await api('POST',`/daily-reports/${report.id}/submit`);
}else{
const created=await api('POST','/daily-reports',body);
report=created;
await api('PATCH',`/daily-reports/${created.id}/lines`,body);
if(st==='submitted')await api('POST',`/daily-reports/${created.id}/submit`);
}
isDirty=false;
toast(st==='submitted'?'📤 Отправлен':'💾 Сохранён');await load();
}catch(e){toast(e.message,1);}}

function startAutoSave(){
if(autoSaveTimer)clearInterval(autoSaveTimer);
autoSaveTimer=null;
const ed=!report||['draft','returned'].includes(report?.status);
if(!report?.id||!ed)return;
autoSaveTimer=setInterval(async()=>{
if(!isDirty||!report?.id)return;
if(report.status!=='draft'&&report.status!=='returned')return;
const asEl=document.getElementById('autosave-status');
if(asEl)asEl.textContent='Автосохранение...';
try{
const body=buildReportBody();
await api('PATCH',`/daily-reports/${report.id}/lines`,body);
isDirty=false;
if(asEl)asEl.textContent='Сохранено в '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
console.log('[autosave] OK',new Date().toLocaleTimeString());
}catch(e){if(asEl)asEl.textContent='Ошибка автосохранения';console.warn('[autosave] fail:',e.message);}
},30000);
}

          <input type="checkbox" id="vr-has-aq" ${venue.has_aquagrim?'checked':''} onchange="saveVenueHasAq('${vid}')"/>
          🎨 Площадка с аквагримом
        </label>
      </div>

      ${venue.has_aquagrim ? `
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#3ecfb4">🎨 Персонал аквагрим</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div><div class="fl">Аквагримёров</div><input class="fin" type="number" id="vr-aq" value="${venue.required_aquagrimers||0}" style="width:60px" onchange="saveVenueStaff('${vid}')"/></div>
          <div><div class="fl">Старших</div><input class="fin" type="number" id="vr-aq-sr" value="${venue.required_senior_aquagrimers||0}" style="width:60px" onchange="saveVenueStaff('${vid}')"/></div>
          <div><div class="fl">Менеджеров</div><input class="fin" type="number" id="vr-aq-mgr" value="${venue.required_aq_managers||0}" style="width:60px" onchange="saveVenueStaff('${vid}')"/></div>
        </div>
      </div>

      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:#3ecfb4">🎨 Товары аквагрим (${(aqVenueProds||[]).length})</div>
        ${(aqVenueProds||[]).map(p=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg3);border-radius:6px;margin-bottom:4px;font-size:12px">
            <span style="flex:1">${esc(p.product_name||p.name)}</span>
            <span style="color:#3ecfb4;font-weight:600">${p.price}₽</span>
            <button style="background:none;border:none;color:var(--rank3);cursor:pointer;font-size:11px" onclick="removeAqProduct('${vid}','${p.product_id}')">✕</button>
          </div>
        `).join('')||'<div style="color:var(--text3);font-size:12px">Нет товаров аквагрим. Добавьте ниже.</div>'}
      </div>

      <div style="margin-bottom:0;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:#3ecfb4">➕ Добавить товар аквагрим</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <select class="fselect" id="add-aq-prod" style="flex:1;min-width:150px">
            ${aqPool.filter(p=>!aqVpIds.has(p.id)).map(p=>`<option value="${p.id}">${esc(p.name)} (${p.default_price||0}₽)</option>`).join('')}
          </select>
          <input class="fin" type="number" id="add-aq-price" placeholder="Цена" style="width:80px" value="${aqPool[0]?.default_price||0}"/>
          <button class="btn btn-primary" style="font-size:11px;padding:5px 12px;background:#3ecfb4" onclick="addAqProduct('${vid}')">Добавить</button>
        </div>
        ${!aqPool.filter(p=>!aqVpIds.has(p.id)).length?'<div style="font-size:11px;color:var(--text3);margin-top:4px">Все товары аквагрим уже добавлены.</div>':''}
      </div>
      ` : ''}
    `;
  }catch(e){c.innerHTML=`<div style="color:var(--rank3)">${esc(e.message)}</div>`;}
}

function openNewProduct(){document.getElementById('new-prod-form').style.display='block';}

async function addProduct(vid){
  const prodId=document.getElementById('add-prod').value;
  const price=parseFloat(document.getElementById('add-price').value);
  if(!prodId){toast('Выберите товар',1);return;}
  try{
    await api('POST',`/venues/${vid}/products`,{product_id:prodId,price:price||0});
    settingsChanged=true;
    toast('Товар добавлен');
    openVenueSettings();
    prods=await api('GET',`/venues/${vid}/products`).catch(()=>[]);
  }catch(e){toast(e.message,1);}
}

async function removeProduct(vid,pid){
  try{await api('DELETE',`/venues/${vid}/products/${pid}`);settingsChanged=true;toast('Удалён');openVenueSettings();prods=await api('GET',`/venues/${vid}/products`).catch(()=>[]);}catch(e){toast(e.message,1);}
}

async function addAqProduct(vid){
  const prodId=document.getElementById('add-aq-prod')?.value;
  const price=parseFloat(document.getElementById('add-aq-price')?.value);
  if(!prodId){toast('Выберите товар',1);return;}
  try{
    await api('POST',`/aq/venues/${vid}/products`,{product_id:prodId,price:price||0});
    toast('Товар аквагрим добавлен');
    openVenueSettings();
    aqProds=await api('GET',`/aq/venues/${vid}/products`).catch(()=>[]);
  }catch(e){toast(e.message,1);}
}

async function removeAqProduct(vid,pid){
  try{
    await api('DELETE','/aq/venues/'+vid+'/products/'+pid);
    toast('Удалён');
    openVenueSettings();
    aqProds=await api('GET',`/aq/venues/${vid}/products`).catch(()=>[]);
  }catch(e){toast(e.message,1);}
}

async function createProduct(vid){
  const name=document.getElementById('np-name').value.trim();
  const price=parseFloat(document.getElementById('np-price').value);
  if(!name){toast('Введите название',1);return;}
  try{
    const p=await api('POST','/products',{name,category:document.getElementById('np-cat').value,default_price:price||0});
    await api('POST',`/venues/${vid}/products`,{product_id:p.id,price:price||0});
    settingsChanged=true;
    toast('Товар создан и добавлен');
    openVenueSettings();
    prods=await api('GET',`/venues/${vid}/products`).catch(()=>[]);
  }catch(e){toast(e.message,1);}
}

async function saveVenueStaff(vid){
  try{
    await api('PATCH',`/venues/${vid}`,{
      required_photographers:parseInt(document.getElementById('vr-photo').value)||0,
      required_operators:parseInt(document.getElementById('vr-ops').value)||0,
      required_admins:parseInt(document.getElementById('vr-admin').value)||0,
      required_aquagrimers: parseInt(document.getElementById('vr-aq')?.value) || 0,
      required_senior_aquagrimers: parseInt(document.getElementById('vr-aq-sr')?.value) || 0,
      required_aq_managers: parseInt(document.getElementById('vr-aq-mgr')?.value) || 0,
    });
    toast('Сохранено');
  }catch(e){toast(e.message,1);}
}

async function saveVenueHasAq(vid) {
  try {
    await api('PATCH', `/venues/${vid}`, { has_aquagrim: document.getElementById('vr-has-aq').checked });
    // Обновить venues массив
    const v = venues.find(x => x.id === vid);
    if (v) v.has_aquagrim = document.getElementById('vr-has-aq').checked;
    toast('Сохранено');
    openVenueSettings(); // перерисовать
  } catch(e) { toast(e.message, 1); }
}

function renderAqSection() {
  const aqPhs = (aqAssigns||[]).filter(a => a.status !== 'cancelled');
  const s = aqReport?.status || 'new';
  const SM = {new:['📝','sb-d'], draft:['📝 Черновик','sb-d'], submitted:['📤 Отправлен','sb-s'], approved:['✅ Проведён','sb-a'], returned:['↩ Возвращён','sb-r']};
  const [sl, sc] = SM[s] || SM.new;
  const ed = !aqReport || ['draft','returned'].includes(aqReport.status);
  const lines = aqReport?.sale_lines || [];

  let html = `
  <div style="margin:20px 0 14px;padding:12px 16px;background:rgba(62,207,180,.06);border:1px solid rgba(62,207,180,.15);border-radius:10px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;color:#3ecfb4">🎨 Аквагрим</span>
    <span class="sb ${sc}">${sl}</span>
  </div>

  <div class="sec"><div class="sec-t" style="color:#3ecfb4">👥 Смена аквагрим (${aqPhs.length})</div>
  ${aqPhs.map(a => {
    const ch = a.checkin_at || a.checked_in;
    return `<div class="rr"><div class="rr-name">${esc(a.aquagrimer_name || a.name || '—')}</div><span style="font-size:9px;color:var(--text3)">${esc(a.role_in_shift||'')}</span>${ch ? (a.is_late ? `<span class="rs rs-late">⏰+${esc(a.late_minutes||'?')}м</span>` : `<span class="rs rs-ok">✅</span>`) : `<span class="rs rs-wait">⏳</span>`}</div>`;
  }).join('') || '<div style="color:var(--text3);font-size:12px">Нет назначений</div>'}
  </div>`;

  // Таблица продаж аквагрим
  if (aqPhs.length && aqProds.length) {
    html += `<div class="sec"><div class="sec-t" style="color:#3ecfb4">📊 Продажи аквагрим</div>${aqSalesTbl(aqPhs, lines)}</div>`;
  }

  // Итоги
  html += `<div class="sec"><div class="sec-t" style="color:#3ecfb4">📝 Итоги аквагрим</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <div style="flex:1;min-width:140px"><div class="fl">Админ</div><input class="fin" id="aqa" value="${esc(aqReport?.admin_name||U?.name||'')}" style="width:100%"/></div>
    <div style="flex:1;min-width:140px"><div class="fl">Менеджер</div><input class="fin" id="aqm" value="${esc(aqReport?.manager_name||'')}" style="width:100%"/></div>
  </div>
  <div style="margin-top:6px"><div class="fl">Примечание</div><input class="fin" id="aqn" value="${esc(aqReport?.notes_report||'')}" style="width:100%" placeholder="Комментарий..."/></div>
  ${aqReport?.review_comment ? `<div style="padding:6px;background:rgba(242,85,85,.06);border:1px solid rgba(242,85,85,.15);border-radius:6px;margin-top:6px;font-size:12px"><b style="color:var(--rank3)">Проверяющий:</b> ${esc(aqReport.review_comment)}</div>` : ''}
  </div>

  <div class="foot">
  ${ed ? `<button class="btn btn-ghost" onclick="saveAq('draft')">💾 Черновик</button><button class="btn btn-primary" style="background:#3ecfb4" onclick="saveAq('submitted')">📤 Отправить</button>` : `<span style="font-size:12px;color:var(--text3)">${s==='approved'?'Проведён':'На проверке'}</span>`}
  </div>`;

  return html;
}

function aqSalesTbl(aqPhs, lines){
  let h='<div style="overflow-x:auto"><table class="st"><thead><tr><th>Сотрудник</th>';
  aqProds.forEach(p=>{h+=`<th>${esc(String((p.product_name||p.name)||'').slice(0,10))}<br><span style="font-size:8px">${p.price}₽</span></th>`;});
  h+='<th>Брак</th><th>Фл.шт</th><th>Фл.₽</th><th>Нал</th><th>Карта</th><th>QR</th><th class="tot">Итого</th></tr></thead><tbody>';
  aqPhs.forEach(a=>{
    const ph=a.aquagrimer_id||a.photographer_id||a.id;
    h+=`<tr><td>${esc(String((a.aquagrimer_name||a.name||'')).slice(0,12))}</td>`;
    aqProds.forEach(p=>{
      const pid=p.product_id||p.id,ex=lines.find(l=>l.aquagrimer_id===ph&&l.product_id===pid);
      h+=`<td><input type="number" min="0" value="${ex?.quantity||0}" class="asq" data-ph="${ph}" data-p="${pid}" data-pr="${p.price}" onchange="arc()"/></td>`;
    });
    const x=lines.find(l=>l.aquagrimer_id===ph);
    h+=`<td><input type="number" min="0" value="${x?.waste_qty||0}" class="asw" data-ph="${ph}" style="width:34px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.flash_qty||0}" class="asfq" data-ph="${ph}" style="width:34px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.flash_sum||0}" class="asfs" data-ph="${ph}" style="width:44px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.payment_cash||0}" class="asc" data-ph="${ph}" style="width:50px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.payment_card||0}" class="ask" data-ph="${ph}" style="width:50px" onchange="arc()"/></td>`;
    h+=`<td><input type="number" min="0" value="${x?.payment_qr||0}" class="asqr" data-ph="${ph}" style="width:50px" onchange="arc()"/></td>`;
    h+=`<td class="tot" id="art${ph}">0</td></tr>`;
  });
  h+='<tr><td class="tot">ИТОГО</td>';
  aqProds.forEach(p=>{h+=`<td class="tot" id="act${p.product_id||p.id}">0</td>`;});
  h+='<td class="tot" id="atw">0</td><td class="tot" id="atfq">0</td><td class="tot" id="atfs">0</td><td class="tot" id="atc">0</td><td class="tot" id="atk">0</td><td class="tot" id="atq">0</td><td class="tot" id="agt">0</td></tr></tbody></table></div>';
  setTimeout(arc,50);return h;
}

function arc(){
  const i=document.querySelectorAll('.asq');const rt={},ct={};let g=0,atw=0,atfq=0,atfs=0,atc=0,atk=0,atq=0;
  i.forEach(n=>{const ph=n.dataset.ph,p=n.dataset.p,pr=parseFloat(n.dataset.pr),q=parseInt(n.value)||0,s=q*pr;rt[ph]=(rt[ph]||0)+s;ct[p]=(ct[p]||0)+q;g+=s;});
  Object.entries(rt).forEach(([k,v])=>{const e=document.getElementById('art'+k);if(e)e.textContent=v.toLocaleString('ru-RU');});
  Object.entries(ct).forEach(([k,v])=>{const e=document.getElementById('act'+k);if(e)e.textContent=v;});
  document.querySelectorAll('.asw').forEach(n=>atw+=parseInt(n.value)||0);
  document.querySelectorAll('.asfq').forEach(n=>atfq+=parseInt(n.value)||0);
  document.querySelectorAll('.asfs').forEach(n=>atfs+=parseFloat(n.value)||0);
  document.querySelectorAll('.asc').forEach(n=>atc+=parseFloat(n.value)||0);
  document.querySelectorAll('.ask').forEach(n=>atk+=parseFloat(n.value)||0);
  document.querySelectorAll('.asqr').forEach(n=>atq+=parseFloat(n.value)||0);
  const$=id=>document.getElementById(id);
  if($('agt'))$('agt').textContent=g.toLocaleString('ru-RU');
  if($('atw'))$('atw').textContent=atw;
  if($('atfq'))$('atfq').textContent=atfq;
  if($('atfs'))$('atfs').textContent=atfs;
  if($('atc'))$('atc').textContent=atc.toLocaleString('ru-RU');
  if($('atk'))$('atk').textContent=atk.toLocaleString('ru-RU');
  if($('atq'))$('atq').textContent=atq.toLocaleString('ru-RU');
}

function collectAq(){
  const lines=[];
  document.querySelectorAll('.asq').forEach(n=>{
    const q=parseInt(n.value)||0,ph=n.dataset.ph;
    if(q>0)lines.push({
      aquagrimer_id:ph,
      product_id:n.dataset.p,
      quantity:q,
      price:parseFloat(n.dataset.pr),
      waste_qty:parseInt(document.querySelector(`.asw[data-ph="${ph}"]`)?.value)||0,
      flash_qty:parseInt(document.querySelector(`.asfq[data-ph="${ph}"]`)?.value)||0,
      flash_sum:parseFloat(document.querySelector(`.asfs[data-ph="${ph}"]`)?.value)||0,
      payment_cash:parseFloat(document.querySelector(`.asc[data-ph="${ph}"]`)?.value)||0,
      payment_card:parseFloat(document.querySelector(`.ask[data-ph="${ph}"]`)?.value)||0,
      payment_qr:parseFloat(document.querySelector(`.asqr[data-ph="${ph}"]`)?.value)||0
    });
  });
  return { lines };
}

async function saveAq(st){
  if(!aqShift){toast('Нет смены аквагрим',1);return;}
  const { lines } = collectAq();
  if(st==='submitted'&&!lines.length){toast('Заполните продажи аквагрим',1);return;}
  const b={shift_id:aqShift.id,venue_id:document.getElementById('vs').value,report_date:document.getElementById('sd').value,lines,admin_name:document.getElementById('aqa')?.value||null,manager_name:document.getElementById('aqm')?.value||null,notes_report:document.getElementById('aqn')?.value||null};
  try{
    if(aqReport?.id){
      await api('PATCH',`/aq/daily-reports/${aqReport.id}`,b);
      if(st==='submitted')await api('POST',`/aq/daily-reports/${aqReport.id}/submit`);
    } else {
      b.status=st;
      await api('POST','/aq/daily-reports',b);
    }
    toast(st==='submitted'?'📤 Отправлен':'💾 Сохранён');
    load();
  }catch(e){toast(e.message,1);}
}
</script>
