<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>PhotoHR — Чекин</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<!-- QR scanner: native BarcodeDetector API -->
<style>
:root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--border:#2e2e3d;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6cff;--accent2:#9b8dff;--rank1:#3ecf8e;--rank2:#f5a623;--rank3:#f25555}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-right:8px}.logo span{color:var(--accent2)}
.header-stats{display:flex;gap:16px;flex:1}
.stat{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.user-pill{padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%}
.nav-links{display:flex;gap:6px;margin-left:12px}
.f-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-btn:hover{color:var(--text)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.toolbar-unified .btn.btn-ghost{padding:6px 14px;border-radius:20px;font-size:12px}
.content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:8px}
.sub{font-size:13px;color:var(--text2);margin-bottom:20px;max-width:320px}
#qr-video{width:min(94vw,420px);height:min(94vw,420px);border-radius:16px;object-fit:cover;background:#000;display:block;margin:0 auto 12px}
.btn{padding:12px 28px;border-radius:12px;border:none;font-family:'Golos Text',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.result{padding:20px;border-radius:14px;margin-top:16px;max-width:340px;width:100%}
.result-ok{background:rgba(62,207,142,.1);border:2px solid rgba(62,207,142,.4)}
.result-fail{background:rgba(242,85,85,.1);border:2px solid rgba(242,85,85,.4)}
.result-icon{font-size:48px;margin-bottom:8px}
.result-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-bottom:4px}
.result-sub{font-size:12px;color:var(--text2)}
.shift-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;max-width:340px;width:100%;text-align:left}
.shift-venue{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;margin-bottom:4px}
.shift-meta{font-size:12px;color:var(--text2)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}.toast.error{border-color:rgba(242,85,85,.4);color:var(--rank3)}
@media(max-width:768px){
  .header{padding:10px 14px;gap:8px}
  .nav-links{order:3;width:100%;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
  .nav-links::-webkit-scrollbar{display:none}
  .header-stats{display:none}
  .logo{font-size:16px}
  .toolbar-unified{padding-left:12px;padding-right:12px;flex-wrap:wrap}
  .btn{min-height:44px}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Photo<span>HR</span></div>
  <div class="nav-links" id="nav-links"></div>
  <div class="header-stats" id="hstats"></div>
  <div class="header-right">
    <div class="user-pill" id="user-pill" onclick="openProfile()" style="cursor:pointer" title="Мой профиль"></div>
    <button class="btn btn-ghost" onclick="doLogout()" style="font-size:13px;padding:6px 12px">Выйти</button>
  </div>
</div>
<div class="toolbar-unified" style="padding:10px 28px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
  <button class="btn btn-ghost" onclick="openAchievementsPanel()">🏆 Достижения</button>
  <button class="btn btn-ghost" onclick="openBirthdaysPanel()">🎂 Дни рождения</button>
  <button class="btn btn-ghost" onclick="openLikesPanel()">❤️ Лайки</button>
</div>
<div class="content" id="content">
  <div style="color:var(--text3)">Загрузка...</div>
</div>
<div class="toast" id="toast"></div>
<script>
const API=window.location.hostname==='localhost'?'http://localhost:3001/api':'https://fotohr-server-production.up.railway.app/api';
let AT=localStorage.getItem('fhr_access')||null,RT=localStorage.getItem('fhr_refresh')||null,U=null,currentUser=null,myShifts=[],scanner=null,scannerStream=null;
const ROLE_LABELS={admin:'Администратор',exec_director:'Исполнительный директор',hr_director:'HR-директор',hr_manager:'HR-менеджер',recruiter:'Рекрутер',tech_director:'Тех-директор',site_specialist:'Специалист по сайту',cashier:'Инкассация',photographer_user:'Сотрудник',aq_user:'Аквагримёр',aq_manager:'Менеджер аквагрима',archived:'Архив'};
const ROLE_COLORS={admin:'#ffd700',exec_director:'#f5a623',hr_director:'#3ecf8e',hr_manager:'#4ecb8a',recruiter:'#e86aa6',tech_director:'#8a7aee',site_specialist:'#6aa6e8',cashier:'#e87a6a',photographer_user:'#9090a8',aq_user:'#3ecfb4',aq_manager:'#5ee8d0',archived:'#5a5a72'};
const ROLES={photographer_user:0,aq_user:0,recruiter:1,hr_manager:1,tech_director:1,site_specialist:1,aq_manager:1,cashier:2,hr_director:2,exec_director:3,admin:4};
const roleNow=()=>currentUser?.role||'photographer_user';
const hasAnyRole=(roles)=>roles.includes(roleNow());
function openProfile(){location.href='index.html?profile=1';}
function openAchievementsPanel(){window.location.href='index.html#achievements';}
function openBirthdaysPanel(){window.location.href='index.html#birthdays';}
function openLikesPanel(){window.location.href='index.html#likes';}
function fillPlaceholderStats(){const hs=document.getElementById('hstats');if(!hs)return;hs.innerHTML='<div class="stat"><div class="stat-num" style="color:var(--accent2)">—</div><div class="stat-lbl">Всего</div></div><div class="stat"><div class="stat-num" style="color:var(--rank1)">—</div><div class="stat-lbl">Топ</div></div><div class="stat"><div class="stat-num" style="color:var(--rank2)">—</div><div class="stat-lbl">Средний балл</div></div>';}
function setupUserPill(){const c=ROLE_COLORS[currentUser.role]||'#9090a8';document.getElementById('user-pill').innerHTML=`<div class="role-dot" style="background:${c}"></div><span>${esc(currentUser.name)}</span><span style="color:var(--text3);font-size:11px">${ROLE_LABELS[currentUser.role]||currentUser.role}</span>`;}
function setupNav(activeKey){const navBtns=[],ns='text-decoration:none;padding:5px 12px;font-size:12px';const a=(key,href,label)=>{const cls=activeKey===key?'f-btn active':'f-btn';return`<a class="${cls}" href="${href}" style="${ns}">${label}</a>`;};navBtns.push(a('index','index.html','Фотографы'));if(currentUser.role!=='photographer_user'&&currentUser.role!=='aq_user')navBtns.push(a('team','team.html','Команда'));if(hasAnyRole(['recruiter','hr_manager','hr_director','exec_director','admin']))navBtns.push(a('recruiting','recruiting.html','Рекрутинг'));if(hasAnyRole(['photographer_user','hr_manager','cashier','hr_director','tech_director','site_specialist','exec_director','admin']))navBtns.push(a('venue','venue.html','Площадка'));if(hasAnyRole(['tech_director','hr_director','exec_director','admin']))navBtns.push(a('stock','stock.html','Склад'));if(hasAnyRole(['hr_manager','hr_director','exec_director','admin','photographer_user']))navBtns.push(a('calendar','calendar.html','Календарь'));if(currentUser.role==='photographer_user'&&currentUser.photographer_id)navBtns.push(a('checkin','checkin.html','📍 Чекин'));if(hasAnyRole(['aq_manager','hr_director','exec_director','admin','cashier'])){navBtns.push('<span style="width:1px;height:18px;background:var(--border);margin:0 6px;align-self:center"></span>');navBtns.push(a('aquagrim','aquagrim.html','Аквагрим'));}if(currentUser.role==='photographer_user'&&currentUser.photographer_id)navBtns.push(a('my','my.html','📷 Мой профиль'));document.getElementById('nav-links').innerHTML=navBtns.join('');}
let refreshLock=null;

async function api(m,p,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(AT)o.headers.Authorization='Bearer '+AT;if(b)o.body=JSON.stringify(b);let r=await fetch(API+p,o);if(r.status===401&&RT){try{if(!refreshLock){refreshLock=(async()=>{const x=await fetch(API+'/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:RT})});if(!x.ok)throw new Error('refresh_failed');const d=await x.json();AT=d.accessToken;RT=d.refreshToken;localStorage.setItem('fhr_access',AT);localStorage.setItem('fhr_refresh',RT);})();}await refreshLock;o.headers.Authorization='Bearer '+AT;r=await fetch(API+p,o);}catch{doLogout();return null;}finally{refreshLock=null;}}if(!r.ok){const e=await r.json().catch(()=>({error:'Ошибка'}));throw new Error(e.error||'Ошибка');}return r.json();}
function doLogout(){localStorage.removeItem('fhr_refresh');localStorage.removeItem('fhr_access');location.href='index.html';}
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');setTimeout(()=>t.className='toast',3000);}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

(async()=>{
  if(!AT&&!RT){location.href='index.html';return;}
  try{
    U=await api('GET','/auth/me');
    currentUser=U;
    setupUserPill();
    setupNav('checkin');
    fillPlaceholderStats();
    if(!U.photographer_id){
      document.getElementById('content').innerHTML=`<div class="title">Нет карточки</div><div class="sub">Ваш аккаунт не привязан к карточке сотрудника. Обратитесь к администратору.</div><a href="index.html" class="btn btn-ghost">← Назад</a>`;
      return;
    }
    await loadMyShifts();
  }catch(e){document.getElementById('content').innerHTML=`<div style="color:var(--rank3)">${esc(e.message)}</div>`;}
})();

async function loadMyShifts(){
  const c=document.getElementById('content');
  try{
    myShifts=await api('GET','/my-shifts');
  }catch(e){
    c.innerHTML=`<div style="color:var(--rank3)">${esc(e.message)}</div>`;
    return;
  }

  if(!myShifts.length){
    c.innerHTML=`
      <div class="title">📍 Чекин</div>
      <div class="sub">У вас нет смен на сегодня (${new Date().toLocaleDateString('ru-RU')})</div>
      <div style="margin-top:12px">
        <div class="sub">Или отсканируйте QR-код площадки:</div>
        <button class="btn btn-primary" onclick="startScanner()">📷 Сканировать QR</button>
      </div>
      <a href="my.html" class="btn btn-ghost" style="margin-top:12px">← Мой профиль</a>
    `;
    return;
  }

  c.innerHTML=`
    <div class="title">📍 Чекин</div>
    <div class="sub">Ваши смены на сегодня</div>
    ${myShifts.map((s,i)=>`
      <div class="shift-card">
        <div class="shift-venue">📍 ${esc(s.venue_name||'Площадка')}</div>
        <div class="shift-meta">${esc(s.role_in_shift||'фотограф')} · ${s.start_time?s.start_time.slice(0,5):''}</div>
        <div style="margin-top:8px">
          ${s.checkin_at
            ?`<span style="color:var(--rank1);font-size:13px">✅ Отмечен в ${new Date(s.checkin_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}${s.late_status==='late'?' · ⏰ +'+s.late_minutes+'м · штраф':(s.late_status==='almost'?' · ⚡+'+s.late_minutes+'м':'')}</span>`
            :`<button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="startScanForShift(${i})">📷 Сканировать QR</button>`}
        </div>
      </div>
    `).join('')}
    <div style="margin-top:12px"><a href="my.html" class="btn btn-ghost">← Мой профиль</a></div>
  `;
}

let pendingAssignmentId=null;

function startScanForShift(idx){
  pendingAssignmentId=myShifts[idx]?.id||null;
  startScanner();
}

function startScanner(){
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="title">📷 Наведите камеру на QR</div>
    <div class="sub">Расположите QR-код в кадре камеры</div>
    <video id="qr-video" playsinline autoplay muted></video>
    <div style="margin-top:12px;width:min(94vw,420px);margin-left:auto;margin-right:auto">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px;text-align:center">Или введите код вручную:</div>
      <input id="manual-code" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;text-align:center;margin-bottom:8px" placeholder="shift_id:timestamp:hmac"/>
      <button class="btn btn-primary" style="width:100%" onclick="manualScan()">Отправить код</button>
    </div>
    <button class="btn btn-ghost" onclick="stopScanner();loadMyShifts();" style="margin-top:12px">← Отмена</button>
  `;
  startVideoScan();
}

async function startVideoScan(){
  const video=document.getElementById('qr-video');
  if(!video)return;
  
  let detector=null;
  if('BarcodeDetector' in window){
    try{detector=new BarcodeDetector({formats:['qr_code']});}catch(e){detector=null;}
  }
  
  if(!detector){
    const msg=document.createElement('div');
    msg.style.cssText='color:var(--rank2);font-size:12px;text-align:center;margin-bottom:8px';
    msg.textContent='Автосканирование недоступно в этом браузере. Используйте ручной ввод.';
    video.parentNode.insertBefore(msg,video);
    video.style.display='none';
    return;
  }
  
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:960}}
    });
    video.srcObject=stream;
    scannerStream=stream;
    
    const track=stream.getVideoTracks()[0];
    if(track){
      try{
        const caps=track.getCapabilities?.();
        if(caps?.focusMode?.includes('continuous')){
          await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
        }
      }catch(e){}
    }
    
    let scanning=false;
    async function tick(){
      if(!scannerStream||!video.srcObject)return;
      if(video.readyState<video.HAVE_ENOUGH_DATA){requestAnimationFrame(tick);return;}
      if(scanning){requestAnimationFrame(tick);return;}
      scanning=true;
      try{
        const codes=await detector.detect(video);
        if(codes.length>0){
          const result=codes[0].rawValue;
          stopScanner();
          try{navigator.vibrate&&navigator.vibrate(200);}catch{}
          doCheckin(result);
          return;
        }
      }catch(e){}
      scanning=false;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }catch(e){
    video.style.display='none';
    const msg=document.createElement('div');
    msg.style.cssText='color:var(--rank3);font-size:12px;text-align:center;margin-bottom:8px';
    msg.textContent='Камера недоступна: '+e.message+'. Используйте ручной ввод.';
    video.parentNode.insertBefore(msg,video.nextSibling);
  }
}

function stopScanner(){
  if(scanner){try{scanner.stop();}catch(e){}scanner=null;}
  if(scannerStream){scannerStream.getTracks().forEach(t=>t.stop());scannerStream=null;}
  const v=document.getElementById('qr-video');
  if(v)v.srcObject=null;
}

async function onScanSuccess(code){
  stopScanner();
  try{navigator.vibrate&&navigator.vibrate(200);}catch{}
  await doCheckin(code);
}

function manualScan(){
  const code=document.getElementById('manual-code')?.value?.trim();
  if(code)doCheckin(code);
}

async function doCheckin(qrCode){
  const c=document.getElementById('content');
  c.innerHTML='<div style="color:var(--text3)">Отправка...</div>';
  
  // Получаем геопозицию
  let lat=null,lng=null;
  try{
    const pos=await new Promise((res,rej)=>{navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000,enableHighAccuracy:true});});
    lat=pos.coords.latitude;lng=pos.coords.longitude;
  }catch{}

  try{
    const body={qr_code:qrCode,checkin_type:'arrival',latitude:lat,longitude:lng};
    if(pendingAssignmentId)body.assignment_id=pendingAssignmentId;
    
    const result=await api('POST','/checkins',body);
    
    c.innerHTML=`
      <div class="result result-ok">
        <div class="result-icon">✅</div>
        <div class="result-title">Отмечен!</div>
        <div class="result-sub">${result.late_status==='late'?'⏰ Опоздание '+result.late_minutes+' мин · Штраф '+result.fine_amount+'₽':(result.late_status==='almost'?'⚡ Почти вовремя (+'+result.late_minutes+' мин)':'✅ Вовремя')}</div>
        ${result.venue_name?`<div class="result-sub" style="margin-top:4px">📍 ${esc(result.venue_name)}</div>`:''}
        <div class="result-sub" style="margin-top:4px">${new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
        <button class="btn btn-primary" onclick="loadMyShifts()">← К сменам</button>
        <a href="my.html" class="btn btn-ghost">Мой профиль</a>
      </div>
    `;
    pendingAssignmentId=null;
  }catch(e){
    // Обработка 409 — уже отмечен
    const msg=e.message||'Ошибка';
    const isDup=msg.includes('уже отмечен');
    c.innerHTML=`
      <div class="result ${isDup?'result-ok':'result-fail'}">
        <div class="result-icon">${isDup?'ℹ️':'❌'}</div>
        <div class="result-title">${isDup?'Уже отмечены':'Ошибка'}</div>
        <div class="result-sub">${esc(msg)}</div>
      </div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
        ${isDup?'':`<button class="btn btn-primary" onclick="startScanner()">Повторить</button>`}
        <button class="btn btn-ghost" onclick="loadMyShifts()">← К сменам</button>
      </div>
    `;
    pendingAssignmentId=null;
  }
}
</script>
</body>
</html>
